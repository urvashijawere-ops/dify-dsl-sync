\\\"\\\n          ) or \\\"\\\").strip()\\n    mime      = (file.get(\\\"mime_type\\\") or file.get(\\\"\\\n          type\\\") or \\\"\\\").lower().strip()\\n    name_lower = file_name.lower()\\n\\n\\\n          \\    if not file_name:\\n        return {\\\"result\\\": \\\"empty\\\"}\\n\\n    #\\\n          \\ 1. Size calculation\\n    size = file.get(\\\"size\\\") or file.get(\\\"file_size\\\"\\\n          ) or 0\\n    try:\\n        size = int(size)\\n    except (TypeError, ValueError):\\n\\\n          \\        size = 0\\n    \\n    MB = 1024 * 1024\\n    LIMIT = 15 * MB \\n  \\\n          \\  # 2. Magic Byte Check (Strict Security)\\n    # Tries to see if the file\\\n          \\ is actually a hidden ZIP/Archive\\n    file_url = (file.get(\\\"url\\\") or\\\n          \\ file.get(\\\"remote_url\\\") or file.get(\\\"path\\\") or \\\"\\\").strip()\\n    if\\\n          \\ file_url:\\n        try:\\n            req = urllib.request.Request(file_url,\\\n          \\ headers={\\\"Range\\\": \\\"bytes=0-15\\\"})\\n            with urllib.request.urlopen(req,\\\n          \\ timeout=5) as resp:\\n                header = resp.read(16)\\n        \\\n          \\    \\n            is_office_doc = name_lower.endswith((\\\".docx\\\", \\\".xlsx\\\"\\\n          ))\\n            \\n            if is_zip_signature and not is_office_doc:\\n\\\n          \\                return {\\\"result\\\": \\\"zip_blocked\\\"}\\n        except:\\n\\\n          \\            pass \\n\\n    # 3. Specific Allowed Types Filtering\\n    file_type\\\n          \\ = None\\n\\n    if name_lower.endswith(\\\".pdf\\\"):\\n        file_type = \\\"\\\n          pdf\\\" \\n    elif name_lower.endswith((\\\".xlsx\\\", \\\".xls\\\")):\\n        file_type\\\n          \\ = \\\"excel\\\"\\n    elif name_lower.endswith((\\\".doc\\\", \\\".docx\\\")):\\n  \\\n          \\      file_type = \\\"word\\\"\\n    elif name_lower.endswith(\\\".csv\\\"):\\n \\\n          \\       file_type = \\\"csv\\\"\\n    elif name_lower.endswith(\\\".txt\\\"):\\n \\\n          \\       file_type = \\\"text\\\"\\n    else:\\n       \\n        return {\\\"result\\\"\\\n          : \\\"unsupported\\\"}\\n\\n    # 4. Size Limit Check\\n    if size > LIMIT:\\n\\\n          \\        size_mb = round(size / MB, 1)\\n        return {\\\"result\\\": f\\\"\\\n          size_exceeded|{file_type}|{size_mb}|15\\\"}\\n\\n    return {\\\"result\\\": file_type}\"\n        code_language: python3\n        desc: 'this  node will check the file type '\n        outputs:\n          result:\n            children: null\n            type: string\n        selected: true\n        title: Validation logic\n        type: code\n        variables:\n        - value_selector:\n          - '1777288883815'\n          - select_file\n          value_type: array[file]\n          variable: inputs\n      height: 81\n      id: '1777289109504'\n      position:\n        x: 380\n        y: 282\n      positionAbsolute:\n        x: 380\n        y: 282\n      selected: true\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: contains\n            id: a5998896-02ba-441b-a050-116837a7a56b\n            value: pdf\n            varType: string\n            variable_selector:\n            - '1777289109504'\n            - result\n          id: 'true'\n          logical_operator: and\n        - case_id: 11ff9852-ca5c-4cd9-9eb4-e057bb837a26\n          conditions:\n          - comparison_operator: contains\n            id: e5e670aa-25b0-4a7e-8d15-b2ec2625ef1e\n            value: csv\n            varType: string\n            variable_selector:\n            - '1777289109504'\n            - result\n          - comparison_operator: contains\n            id: d59cff2e-7890-4cd7-8dd2-9da41991871c\n            value: xlsx\n            varType: string\n            variable_selector:\n            - '1