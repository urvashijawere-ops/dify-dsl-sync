         new_key = f\\\"{prefix}{k}\\\" if prefix == '' else f\\\"{prefix}.{k}\\\"\\\n          \\n                \\n                if isinstance(v, dict):\\n          \\\n          \\          out.update(flatten_json(v, new_key))\\n                \\n    \\\n          \\            elif isinstance(v, list):\\n                    # \u2705 Handle list\\\n          \\ of dicts (like revision_history)\\n                    if all(isinstance(i,\\\n          \\ dict) for i in v):\\n                        out[new_key] = \\\"; \\\".join(\\n\\\n          \\                            [\\\", \\\".join(f\\\"{k}:{val}\\\" for k, val in i.items())\\\n          \\ for i in v]\\n                        )\\n                    else:\\n  \\\n          \\                      out[new_key] = \\\", \\\".join([str(i) for i in v])\\n\\\n          \\                \\n                else:\\n                    out[new_key]\\\n          \\ = v\\n            \\n            return out\\n\\n        flat_data = [flatten_json(item)\\\n          \\ for item in data]\\n\\n        # \\U0001F539 5. Create headers\\n        headers\\\n          \\ = set()\\n        for item in flat_data:\\n            headers.update(item.keys())\\n\\\n          \\        headers = list(headers)\\n\\n        # \\U0001F539 6. Generate CSV\\n\\\n          \\        output = io.StringIO()\\n        writer = csv.DictWriter(output,\\\n          \\ fieldnames=headers)\\n        writer.writeheader()\\n\\n        for row in\\\n          \\ flat_data:\\n            writer.writerow({k: str(row.get(k, \\\"\\\")) for\\\n          \\ k in headers})\\n\\n        result[\\\"csv_text\\\"] = output.getvalue()\\n \\\n          \\       result[\\\"status\\\"] = \\\"Success\\\"\\n\\n    except Exception as e:\\n\\\n          \\        result[\\\"status\\\"] = f\\\"Error: {str(e)}\\\"\\n        result[\\\"csv_text\\\"\\\n          ] = f\\\"Failed to parse JSON. Error: {str(e)}\\\"\\n\\n    return result\"\n        code_language: pyt