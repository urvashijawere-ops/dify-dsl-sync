e\n          variable_selector:\n          - '1777369260160'\n          - text\n        desc: Extract travel categories, rules, and amounts from this text. Focus\n          on Articles and Appendices. Output in JSON format\n        model:\n          completion_params:\n            temperature: 0.7\n          mode: chat\n          name: gemini-2.5-pro\n          provider: langgenius/gemini/google\n        prompt_config:\n          jinja2_variables: []\n        prompt_template:\n        - edition_type: basic\n          id: 0c65c556-eada-410d-a157-c903e43268a7\n          jinja2_text: \"Extract data from this text: {{{{ text }}}}\\r\\n{{ text }}\\r\\\n            \\n\\r\\n### ROLE\\r\\nYou are a highly precise Data Extraction Specialist.\\\n            \\ Your task is to convert unstructured business policy text into a structured\\\n            \\ JSON format suitable for Excel/CSV conversion.\\r\\n\\r\\n### OBJECTIVE\\r\\\n            \\nExtract all financial rates, categories, and conditions from the provided\\\n            \\ document text. Focus especially on \\\"Appendices\\\" or \\\"Tables\\\" mentioned\\\n            \\ in the text.\\r\\n\\r\\n### EXTRACTION RULES\\r\\n1. **Entity Identification**:\\\n            \\ Identify who the rate applies to (e.g., Executive, Officer, Staff).\\r\\\n            \\n2. **Category Mapping**: Categorize the expense (e.g., Transportation,\\\n            \\ Lodging, Per Diem).\\r\\n3. **Value Standardization**: \\r\\n   - Extract\\\n            \\ numerical values only for the 'Amount' field.\\r\\n   - Capture the currency\\\n            \\ separately (e.g., JPY, Yen).\\r\\n4. **Condition Capture**: Clearly state\\\n            \\ the rule/condition for the rate (e.g., \\\"Distance > 40km\\\", \\\"Overnight\\\n            \\ stay\\\", \\\"Long-term > 11 days\\\").\\r\\n5. **No Data Loss**: Ensure every\\\n            \\ row from every table (Appendix 1 to 4) is captured as a separate object\\\n            \\ in the list.\\r\\n\\r\\n### OUTPUT FORMAT\\r\\nReturn ONLY a valid JSON array\\\n            \\ of objects. Do not include any conversational text or markdown blocks.\\r\\\n            \\n\\r\\n### JSON SCHEMA EXAMPLE\\r\\n[\\r\\n  {\\r\\n    \\\"category\\\": \\\"Transportation\\\"\\\n            ,\\r\\n    \\\"item\\\": \\\"Train/Shinkansen\\\",\\r\\n    \\\"role\\\": \\\"Officer\\\"\\\n            ,\\r\\n    \\\"condition\\\": \\\"Flat rate equivalent to Green Car\\\",\\r\\n   \\\n            \\ \\\"amount\\\": null,\\r\\n    \\\"currency\\\": \\\"JPY\\\"\\r\\n  },\\r\\n  {\\r\\n  \\\n            \\  \\\"category\\\": \\\"Lodging\\\",\\r\\n    \\\"item\\\": \\\"Hotel stay\\\",\\r\\n   \\\n            \\ \\\"role\\\": \\\"Staff\\\",\\r\\n    \\\"condition\\\": \\\"Per night\\\",\\r\\n    \\\"\\\n            amount\\\": 10000,\\r\\n    \\\"currency\\\": \\\"JPY\\\"\\r\\n  }\\r\\n]\"\n          role: system\n          text: You are a document extraction engine. Return ONLY JSON. No fences.\n            No prose.\n        - id: 9f68452b-a39d-4767-a67c-add2098d4b78\n          role: user\n          text: \"Extract data from this text: {{{#1777369260160.text#}}}}\\n\\n\\n###\\\n            \\ ROLE\\nYou are a Policy Data Engineer. Your task is to transform unstructured\\\n            \\ policy text into a highly structured, nested JSON format.\\n\\n### EXTRACTION\\\n            \\ GUIDELINES\\n1. **Precision**: Extract exact values for currency and\\\n            \\ timeframes (e.g., \\\"5 business days\\\", \\\"20,000 yen\\\").\\n2. **Standardization**:\\\n            \\ Convert dates to YYYY-MM-DD format.\\n3. **Completeness**: Ensure all\\\n            \\ Appendices (1-4) are captured within the 'appendices' nested object.\\n\\\n            4. **Logic Mapping**: Map Article rules to their respective categories\\\n            \\ (Transportation, Lodging, Procedures).\\n\\n### JSON OUTPUT SCHEMA\\nReturn\\\n            \\ ONLY a JSON object with the following structure:\\n{\\n  \\\"company_name\\\"\\\n            : \\\"Name of the company\\\",\\n  \\\"policy_name\\\": \\\"Official title of the\\\n            \\ policy\\\",\\n  \\\"effective_date\\\": \\\"YYYY-MM-DD\\\",\\n  \\\"definitions\\\"\\\n            : {\\n    \\\"place_of_employment\\\": \\\"Definition from text\\\",\\n    \\\"business_trip\\\"\\\n            : { \\\"same_day\\\": \\\"Rule\\\", \\\"overnight\\\": \\\"Rule\\\" },\\n    \\\"travel_expenses\\\"\\\n            : [\\\"Item1\\\", \\\"Item2\\\"]\\n  },\\n  \\\"expenses\\\": {\\n    \\\"transportation\\\"\\\n            : { \\\"rule\\\": \\\"General rule\\\", \\\"car_travel\\\": \\\"Auto rule\\\" },\\n   \\\n            \\ \\\"lodging\\\": { \\\"rule\\\": \\\"Hotel rule\\\" },\\n    \\\"per_diem\\\": { \\\"same_day\\\"\\\n            : \\\"Link to appendix\\\", \\\"overnight\\\": \\\"Link to appendix\\\" }\\n  },\\n\\\n            \\  \\\"special_cases\\\": { \\\"long_term_travel\\\": \\\"\\\", \\\"other_expenses\\\"\\\n            : \\\"\\\", \\\"overtime\\\": \\\"\\\" },\\n  \\\"procedures\\\": { \\\"pre_travel\\\": \\\"\\\"\\\n            , \\\"advance_payment\\\": \\\"\\\", \\\"post_travel\\\": \\\"\\\", \\\"settlement\\\": \\\"\\\n            \\\" },\\n  \\\"compliance\\\": { \\\"receipts_required\\\": \\\"Yes/No condition\\\"\\\n            \\ },\\n  \\\"holiday_rules\\\": { \\\"with_work\\\": \\\"\\\", \\\"without_work\\\": \\\"\\\n            \\\" },\\n  \\\"appendices\\\": {\\n    \\\"transportation\\\": { \\\"officers\\\": \\\"\\\n            \\\", \\\"staff\\\": \\\"\\\" },\\n    \\\"lodging\\\": { \\\"executive\\\": \\\"\\\", \\\"staff\\\"\\\n            : \\\"\\\" },\\n    \\\"per_diem_same_day\\\": { \\\"40_100_km\\\": { \\\"executive\\\"\\\n            : \\\"\\\", \\\"staff\\\": \\\"\\\" }, \\\"100_km_plus\\\": { \\\"executive\\\": \\\"\\\", \\\"\\\n            staff\\\": \\\"\\\" } },\\n    \\\"per_diem_overnight\\\": { \\\"executive\\\": \\\"\\\"\\\n            , \\\"staff\\\": \\\"\\\" }\\n  },\\n  \\\"revision_his