  - description: ''
    id: a02167ad-dddf-4007-ba82-f367438eb14c
    name: user_guide
    selector:
    - conversation
    - user_guide
    value:
      en:
        btn_s1: Session 1
        btn_s2: Session 2
        result: English
        text: "Thank you for using our service. The display language is currently\
          \ set to English. \n\n 【User Guide】 \n\n 1. Session Time Limit \n Each chat\
          \ session remains active for approximately 30 minutes. \n If this time limit\
          \ is exceeded, the agent may fail to function correctly or may return unexpected\
          \ results. \n\n 2. Session 1 Task Options \n In Session 1, the following\
          \ three task options are available: \n a) Generate Summary \n b) Display\
          \ Numerical Tables \n c) Generate Questions & Anticipated Answers \n\n Each\
          \ option can be executed only once per session. \n Once you switch to a\
          \ different option, you cannot revert to the previous workflow. \n\n 【Operating\
          \ Procedures】 \n\n ■ Session 1 (Preparation: Pre-Hearing) \n Objective:\
          \ Generate questions for analysis and the BU hearing. \n (Summary, Data,\
          \ Questions & Answers) \n\n 1. Document Upload \n ・BU Materials: Current\
          \ and previous month's data (Excel, PPT, PDF) \n ・Reference Materials: Minutes\
          \ and question lists from past hearing meetings \n ・Numerical Tables: Numerical\
          \ data tables contained within the BU hearing sheets \n\n 2. Currency Standardization\
          \ \n Please review the prompts displayed by the agent. \n Follow the instructions\
          \ to convert numerical values ​​using real-time exchange rates (e.g., USD\
          \ → JPY). 3. Reviewing Outputs \n ・ Qualitative Summary: A summary extracted\
          \ from BU materials and compiled into a designated template. \n ・ Numerical\
          \ Tables: A review of the uploaded tables. \n ・ Proposed Questions & Answers:\
          \ Generated based on data gaps and historical patterns. \n\n ■ Session 2\
          \ (Post-Hearing Processing) \n Objective: To generate a draft of the Final\
          \ Report (in meeting minutes format). \n\n 【Uploading Hearing Data】 \n ・\
          \ Transcript: A text file containing the content of the hearing. \n ・ BU\
          \ Materials: Materials for the current and previous months (Excel, PPT,\
          \ PDF). \n ・ Numerical Tables: Numerical data tables contained within the\
          \ BU hearing sheets. \n ・ Reference Materials: Minutes of Meeting (MOM)\
          \ and question lists from previous hearings. \n ・ Session 1 Outputs: Proposed\
          \ questions/answers and the summary. \n\n 【Integration & Organization】 \n\
          \ The agent will extract the following information from the spoken content:\
          \ \n \"Verbal Commitments & Supplementary Explanations\" and \"Future Action\
          \ Items.\" \n\n 【Reviewing the Final Report】 \n Please review the draft,\
          \ which integrates insights derived from the financial tables and the transcript.\
          \ \n\n If any revisions are required for the generated outputs, please submit\
          \ your requests via the chat function. \n\n Please select the session you\
          \ wish to start:"
      ja:
        btn_s1: セッション1
        btn_s2: セッション2
        result: Japanese
        text: "ご利用ありがとうございます。表示言語は日本語に設定されています。 \n\n 【ご利用案内】 \n\n 1. セッション時間制限  \n\
          \ 各チャットセッションは約30分間有効です。  \n この時間を超過すると、エージェントが正常に動作しなかったり、想定外の結果を返す可能性があります。\
          \ \n\n 2. セッション1の作業オプション  \n セッション1では、以下の3つの作業オプションが利用できます。  \n a) 要約の生成\
          \  \n b) 数値テーブルの表示  \n c) 質問・想定回答の生成  \n\n 各オプションは、1セッションにつき1回のみ実行可能です。\
          \  \n 他のオプションに切り替えた後は、以前のワークフローに戻ることはできません。 \n\n 【操作手順】 \n\n ■ セッション1（事前準備：ヒアリング前）\
          \  \n 目的：分析およびBUヒアリング用の質問を生成する  \n （サマリー、データ、質問・回答）\n\n 1. ドキュメントのアップロード\
          \  \n ・BU資料：当月・前月分（Excel、PPT、PDF）  \n ・参考資料：過去ヒアリング会議の議事録および質問リスト  \n ・数値テーブル：BUヒアリングシート内の数値表\
          \  \n\n 2. 通貨の統一  \n エージェントが表示するプロンプト内容を確認してください。  \n 指示に従い、数値をリアルタイムの為替レートで変換します（例：USD\
          \ → JPY）。 \n\n 3. アウトプットの確認  \n ・定性サマリー：BU資料から抽出し、指定テンプレートにまとめた要約  \n ・数値テーブル：アップロードされた表の確認\
          \  \n ・質問・回答案：データ不足や過去の履歴パターンに基づき生成  \n\n ■ セッション2（事後整理：ヒアリング後）  \n 目的：最終報告書（議事録形式）のドラフトを生成する\
          \ \n\n 【ヒアリングデータのアップロード】  \n ・文字起こし：ヒアリング内容のテキストファイル  \n ・BU資料：当月・前月分（Excel、PPT、PDF）\
          \  \n ・数値テーブル：BUヒアリングシート内の数値表  \n ・参考資料：過去ヒアリングMOMおよび質問リスト  \n ・セッション1のアウトプット：質問・回答、サマリー\
          \  \n\n 【統合・整理】  \n エージェントが発言内容から  \n 「口頭での約束事項・補足説明」および「今後のアクション」を抽出します。\
          \ \n\n 【最終報告書の確認】  \n 財務表とトランスクリプトから得られた洞察を統合したドラフトを確認してください。 \n\n 生成されたアウトプットについて修正が必要な場合は、チャット機能からご依頼ください。\
          \ \n\n 開始するセッションを選択してください。 "
    value_type: object
