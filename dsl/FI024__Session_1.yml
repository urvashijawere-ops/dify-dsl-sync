          \ file_error_message: object, selected_language: str):\n    pattern = r\"\
          ^(0[1-9]|1[0-2])\\/\\d{4}$\"\n    is_valid = bool(re.match(pattern, str(inputs).strip()))\n\
          \    \n    step_rule = file_error_message[current_step]\n    month_format_rule\
          \ = step_rule.get(\"month_format\", {})\n    \n    error_val = month_format_rule.get(selected_language,\
          \ \"Invalid text format.\")\n    error_text = error_val if isinstance(error_val,\
          \ str) else str(error_val.get(\"error\", error_val))\n\n    return {\n \
          \       \"is_valid\": str(is_valid).lower(),\n        \"step\": str(current_step),\n\
          \        \"error_message\": str(error_text)\n    }"
