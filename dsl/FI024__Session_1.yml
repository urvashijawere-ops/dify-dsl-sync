    - data:
        code: "import re\n\ndef main(query: str) -> dict:\n    clean = str(query).strip()\n\
          \n    # basic numeric check (max 6 decimals)\n    if not re.fullmatch(r\"\
          \\d+(\\.\\d{1,6})?\", clean):\n        return {\"result\": \"false\"}\n\n\
          \    val = float(clean)\n\n    if 0 < val < 300:\n        return {\"result\"\
          : clean}\n\n    return {\"result\": \"false\"}"
        code_language: python3
        desc: Validates a numeric input string to ensure it is a positive number between
          0 and 300 with a maximum of 6 decimal places. If the input is valid, it
          returns the cleaned string; otherwise, it returns "false"
