          \ str, generate_questions: str, generate_number_table: str) -> dict:\n \
          \   # List of phrases to check for in the 'result' string\n    termination_phrases\
          \ = [\n        \"Thank you for using Session 1.\\n\\nKindly close this chat\
          \ and start a new conversation to continue.\",\n        \"セッション1 をご利用いただきありがとうございます。\\\
          n\\nこのチャットを終了し、新しい会話を開始して続行してください。\"\n    ]\n    \n    # Condition 1: Check\
          \ if any termination phrase exists within 'result'\n    phrase_found = any(phrase\
          \ in result for phrase in termination_phrases)\n    \n    # Condition 2:\
          \ Check if parameters match the specific 2, 1, 1, 1 pattern\n    params_match\
          \ = (\n        generate_summary_modification == \"2\" and\n        generate_summary\
          \ == \"1\" and\n        generate_questions == \"1\" and\n        generate_number_table\
          \ == \"1\"\n    )\n    \n    # Final check: Both conditions must be True\n\
          \    is_session_end = phrase_found and params_match\n    \n    return {\n\
          \        \"is_terminated\": str(is_session_end),\n    }"
