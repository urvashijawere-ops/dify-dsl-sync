            Evidence: For every USD found, output exactly: FOUND: Page: [Page Number]
            - [Snippet of the sentence containing the currency].


            Summary Table: At the end of the report, provide a table listing:

            | Page: [Page Number] | Count: [Total Count of USD occurrences found on
            this page] | (Ensure each page is on a new line).'
