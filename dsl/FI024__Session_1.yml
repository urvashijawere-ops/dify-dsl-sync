    - data:
        code: "def main(generate_summary: str, generate_questions: str, generate_number_table:\
          \ str, prompt_text: dict, query: str, selected_language: str, generate_summary_modification:\
          \ str, selected_session: str) -> dict:\n    # 1. Normalize Inputs (Treating\
          \ \"1\" as True/Active)\n    s = str(generate_summary) if generate_summary\
          \ else \"0\"\n    t = str(generate_number_table) if generate_number_table\
          \ else \"0\"\n    q = str(generate_questions) if generate_questions else\
          \ \"0\"\n    m = str(generate_summary_modification) if generate_summary_modification\
          \ else \"0\"\n    \n    session = str(selected_session)\n    lang = str(selected_language)\
          \ if selected_language else \"en\"\n    user_input = str(query).strip()\n\
          \n    if session == \"2\":\n        t = \"1\"\n        q = \"1\"# --- NEW:\
          \ Calculate OLD RESULT based on initial state ---\n    def get_prompt_from_state(curr_s,\
          \ curr_t, curr_q, curr_m):\n        rem = []\n        if curr_s == \"0\"\
          : rem.append(\"1\")\n        if curr_t == \"0\": rem.append(\"2\")\n   \
          \     if curr_q == \"0\": rem.append(\"3\")\n        suffix = \"_\".join(rem)\n\
          \        \n        base = \"select_report_type\"\n        if curr_s == \"\
          1\" and curr_t == \"1\" and curr_q == \"1\" and curr_m == \"2\":\n     \
          \       pk = f\"{base}_finish\"\n        elif curr_m == \"1\":\n       \
          \     pk = f\"{base}_eos\" if not suffix else f\"{base}_eos_{suffix}\"\n\
          \        else:\n            if not suffix: pk = base\n            elif suffix\
          \ == \"1_2_3\": pk = base\n            else: pk = f\"{base}_{suffix}\"\n\
          \        \n        entry = prompt_text.get(pk, prompt_text.get(base, {}))\n\
          \        return entry.get(lang, entry.get(\"en\", \"\"))\n\n    # Capture\
          \ the result before processing user_input\n    old_result = get_prompt_from_state(s,\
          \ t, q, m)\n    # -------------------------------------------------------\n\
          \    \n    # 2. Update States based on User Action (Current Logic)\n   \
          \ if user_input == \"1\":\n        s = \"1\"\n        if m != \"2\":\n \
          \           m = \"1\"\n    elif user_input == \"2\":\n        t = \"1\"\n\
          \        if s == \"1\":\n            m = \"2\"\n    elif user_input == \"\
          3\":\n        q = \"1\"\n        if s == \"1\":\n            m = \"2\"\n\
          \    elif user_input == \"end_of_summary\" or user_input == \"要約終了\":\n\
          \        m = \"2\"\n\n    # 3. Calculate NEW RESULT\n    final_result =\
          \ get_prompt_from_state(s, t, q, m)\n\n    return {\n        \"result\"\
          : str(final_result),\n        \"old_result\": str(old_result), # Added this\
          \ as requested\n        \"generate_summary\": s,\n        \"generate_number_table\"\
          : t,\n        \"generate_questions\": q,\n        \"generate_summary_modification\"\
          : m\n    }"
        code_language: python3
