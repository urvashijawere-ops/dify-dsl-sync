            grids, or visual charts, even if the table specifies a unit at the top.

            Exclude ALL Table Content: Ignore all text and numbers located within
            any table, including "Remarks", "Notes", or "Bullet points" inside a grid.


            Exclude Standalone Numbers: Ignore years (e.g., 2024, 2025), quantities,
            or percentages that do not have a currency identifier attached to the
