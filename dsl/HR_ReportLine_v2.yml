    - data:
        code: "\ndef main(manager_id: str):\n    \"\"\"\n    Consolidated validation\
          \ for Manager LDAP.\n    Returns a single FAIL for any format or database\
          \ error.\n    \"\"\"\n    # 1. Sanitize input\n    clean_id = str(manager_id).strip()\n\
          \    manager_id_int = int(clean_id)\n    \n    # 2. Authorized Manager Database\n\
          \    authorized_managers = {\n        \"20001001\", \"20001002\", \"20001003\"\
          , \"20001004\", \"20001005\"\n    }\n    \n    # 3. Merged Logic: Format\
          \ -> Length -> Existence\n    if not clean_id.isdigit():\n        msg =\
          \ \"Please enter an LDAP entry containing only numbers.\"\n    elif len(clean_id)\
          \ != 8:\n        msg = \"Please enter the 8-digit LDAP.\"\n    elif clean_id\
          \ not in authorized_managers:\n        msg = \"The Manager LDAP you entered\
          \ is invalid. Please enter your own LDAP.\"\n    else:\n        # All checks\
          \ passed\n        return {\n            \"status\": \"PASS\",\n        \
          \    \"message\": \"Manager LDAP is verified. Now proceed with transferee\
          \ LDAP.\",\n            \"id\" : manager_id_int\n        }\n    \n    #\
          \ Unified return for all failed cases\n    return {\n        \"status\"\
          : \"FAIL\",\n        \"message\": msg,\n        \"id\": -1\n    }\n"
