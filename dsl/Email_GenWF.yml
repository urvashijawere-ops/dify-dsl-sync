          markdown headers) inside the email.\n\n            2. No Code Blocks: Present the email as clean, raw text so it can be copied\n            directly.\n\n            3. Spacing: Use a single empty line between the Subject, Salutation, Paragraphs,\n            and Closing.\n\n            4. Placeholders: Use [Square Brackets] for variables the user must fill\n            manually.\n\n\n            # Output Format\n\n            Subject: [Clear and concise subject line]\n\n\n            Dear [Contact Name],\n\n\n            [Body Paragraph 1: State the purpose of the email based on the context\n            provided.]\n\n\n            [Body Paragraph 2: Detail the specific action items or requests needed\n            from the recipient.]\n\n\n            [Body Paragraph 3: Mention deadlines or follow-up expectations if applicable.]\n\n\n            Best regards,\n\n\n            [Your Name]\n\n            Procurement Department\n\n\n            ---\n\n            # Staff Instructions & Recommendations\n\n            - Provide a brief bulleted list of tips for the BPO staff member regarding\n            this specific email based on the context.\n\n\n            # Context\n\n            The following instruction has been retrieved from the procurement database:\n\n            {instructions_context} {{#context#}}'\n        - id: 3e1904df-1715-49ba-acc0-9c8b05a4660b\n          role: user\n          text: 'user_input : {{#1776666492956.user_input#}}\n\n            error_history: {{#1776666492956.error_history#}}\n\n            preferred_language : {{#1776666492956.preferred_lang#}} {en:english, jp:\n            japanese}\n\n            '\n        selected: true\n        title: LLM 2\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 90\n      id: '1777926876649'\n      position:\n        x: 538.7136460169303\n        y: 354.9826806119898\n      positionAbsolute:\n        x: 538.7136460169303\n        y: 354.982680611