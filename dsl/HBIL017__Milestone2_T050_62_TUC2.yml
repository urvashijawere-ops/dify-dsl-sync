enius/gemini/google\n              vector_weight: 0.7\n        query_variable_selector:\n        - '1767946689753'\n        - CUSTOMER_NUMBER\n        retrieval_mode: multiple\n        selected: false\n        title: Report Retreival\n        type: knowledge-retrieval\n      height: 119\n      id: '1767947504394'\n      position:\n        x: 4179.822834950612\n        y: 418.3421229274063\n      positionAbsolute:\n        x: 4179.822834950612\n        y: 418.3421229274063\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\n\\ndef main(report_data) -> dict:\\n    if not report_data:\\n\\\n          \\        return {\\n            \\\"report_records\\\": []\\n        }\\n\\n   \\\n          \\ # Ensure list\\n    if not isinstance(report_data, list):\\n        report_data\\\n          \\ = [report_data]\\n\\n    normalized_records = []\\n\\n    for item in report_data:\\n\\\n          \\        # Case 1: {\\\"content\\\": {...}}\\n        if isinstance(item, dict)\\\n          \\ and isinstance(item.get(\\\"content\\\"), dict):\\n            normalized_records.append(item[\\\"\\\n          content\\\"])\\n\\n        # Case 2: {\\\"data\\\": {...}}\\n        elif isinstance(item,\\\n          \\ dict) and isinstance(item.get(\\\"data\\\"), dict):\\n            normalized_records.append(item[\\\"\\\n          data\\\"])\\n\\n        # Case 3: already a row object\\n        elif isinstance(item,\\\n          \\ dict):\\n            normalized_records.append(item)\\n\\n    # Convert to\\\n          \\ JSON strings (Array[String] for downstream)\\n    report_records_strings\\\n          \\ = [\\n        json.dumps(r, ensure_ascii=False)\\n        for r in normalized_records\\n\\\n          \\    ]\\n\\n    return {\\n        \\\"report_records\\\": report_records_strings\\n\\\n          \\    }\\n\"\n        code_language: python3\n        desc: This node uses regex to extract key-value pairs from the text and converts\n          them into a JSON array, providing structured Report records for further\n          processing.\n        outputs:\n          report_records:\n            children: null\n            type: array[string]\n        selected: false\n        title: 'Button 2 Structured Context Extractor '\n        type: code\n        variables:\n        - value_selector:\n          - '1767947504394'\n          - result\n          value_type: array[object]\n          variable: report_data\n      height: 145\n      id: '17679557554340'\n      position:\n        x: 4451.117468973534\n        y: 432.49236350122226\n      positionAbsolute:\n        x: 4451.117468973534\n        y: 432.49236350122226\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\nimport re\\nfrom datetime import datetime\\nfrom calendar\\\n          \\ import monthrange\\nfrom collections import defaultdict\\n\\n# ------------------\\\n          \\ CONFIGURATION ------------------\\n\\nBASE_URL = \\\"https://your-server-domain.com/files\\\"\\\n          \\n\\nREPORT_CATEGORY_MAP = {\\n    \\\"1\\\": \\\"\u30e1\u30f3\u30c6\u30ca\u30f3\u30b9\u30ec\u30dd\u30fc\u30c8\\\",\\n    \\\"2\\\": \\\"\u30d8\u30ea\u30aa\u30b9\u30ec\u30dd\u30fc\u30c8\\\"\\\n          ,\\n    \\\"3\\\": \\\"\u70b9\u691c\u30ec\u30dd\u30fc\u30c8\\\"\\n}\\n\\nPRODUCT_SERVICE_CATEGORY_MAP = {\\n    \\\"\\\n          1\\\": \\\"\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\\\",\\n    \\\"2\\\": \\\"\u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\\\",\\n    \\\"3\\\": \\\"\u7a7a\u8abf\u8a2d\u5099\\\",\\n    \\\"\\\n          4\\\": \\\"\u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\\\"\\n}\\n\\n# ------------------ NORMALIZATION ------------------\\n\\\n          \\ndef normalize_str(v):\\n    if v is None:\\n        return \\\"\\\"\\n    s =\\\n          \\ str(v).strip().replace(\\\"\\\\u3000\\\", \\\"\\\")\\n    return \\\"\\\" if s.lower()\\\n          \\ == \\\"nan\\\" else s\\n\\ndef normalize_key(k):\\n    return normalize_str(k).lower().replace(\\\"\\\n          _\\\", \\\"\\\").replace(\\\" \\\", \\\"\\\")\\n\\ndef parse_content(content_str):\\n   \\\n          \\ data = {}\\n    if not content_str:\\n        return data\\n    for k, v\\\n          \\ in re.findall(r'([^:;]+):\\\\s*([^;]+);', content_str):\\n        data[normalize_key(k)]\\\n          \\ = normalize_str(v)\\n    return data\\n\\n# ------------------ DATE HELPERS\\\n          \\ ------------------\\n\\ndef parse_record_date(date_str):\\n    if not date_str:\\n\\\n          \\        return None\\n\\n    for f in (\\\"%m/%d/%Y\\\", \\\"%Y-%m-%d\\\", \\\"%Y/%m/%d\\\"\\\n          ,\\n              \\\"%d/%m/%Y\\\", \\\"%Y\u5e74%m\u6708%d\u65e5\\\"):\\n        try:\\n         \\\n          \\   return datetime.strptime(str(date_str).strip(), f)\\n        except:\\n\\\n          \\            continue\\n    return None\\n\\ndef format_work_month(date_str):\\n\\\n          \\    dt = parse_record_date(date_str)\\n    return \\\"N/A\\\" if not dt else\\\n          \\ dt.strftime(\\\"%Y/%m\\\")\\n\\n# ------------------ DATE FILTER LOGIC ------------------\\n\\\n          \\ndef is_date_in_scope(rec_dt, scope, formatted_date,\\n                \\\n          \\     start_date, end_date, discrete_dates):\\n\\n    if not rec_dt:\\n   \\\n          \\     return False\\n\\n    # ------------------ RANGE ------------------\\n\\\n          \\    if scope == \\\"RANGE\\\":\\n\\n        # YEAR RANGE\\n        if \\\"/\\\" not\\\n          \\ in start_date and \\\"/\\\" not in end_date:\\n            try:\\n         \\\n          \\       return int(start_date) <= rec_dt.year <= int(end_date)\\n       \\\n          \\     except:\\n                return False\\n\\n        # MONTH RANGE\\n \\\n          \\       try:\\n            s_month, s_year = map(int, start_date.split(\\\"\\\n          /\\\"))\\n            e_month, e_year = map(int, end_date.split(\\\"/\\\"))\\n \\\n          \\       except:\\n            return False\\n\\n        start_dt = datetime(s_year,\\\n          \\ s_month, 1)\\n        last_day = monthrange(e_year, e_month)[1]\\n     \\\n          \\   end_dt = datetime(e_year, e_month, last_day, 23, 59, 59)\\n\\n       \\\n          \\ return start_dt <= rec_dt <= end_dt\\n\\n    # ------------------ MULTI\\\n          \\ (Exact Discrete OR) ------------------\\n    if scope == \\\"MULTI\\\":\\n \\\n          \\       for d in discrete_dates or []:\\n\\n            # Year-only\\n    \\\n          \\        if \\\"/\\\" not in d:\\n                try:\\n                    if\\\n          \\ rec_dt.year == int(d):\\n                        return True\\n        \\\n          \\        except:\\n                    continue\\n\\n            # Month/year\\n\\\n          \\            else:\\n                try:\\n                    m, y = d.split(\\\"\\\n          /\\\")\\n                    if rec_dt.month == int(m) and rec_dt.year == int(y):\\n\\\n          \\                        return True\\n                except:\\n        \\\n          \\            continue\\n\\n        return False\\n\\n    # ------------------\\\n          \\ YEAR ------------------\\n    if scope == \\\"YEAR\\\":\\n        try:\\n   \\\n          \\         return rec_dt.year == int(formatted_date)\\n        except:\\n \\\n          \\           return False\\n\\n    # ------------------ MONTH ------------------\\n\\\n          \\    if scope == \\\"MONTH\\\":\\n        try:\\n            m, y = formatted_date.split(\\\"\\\n          /\\\")\\n            return rec_dt.month == int(m) and rec_dt.year == int(y)\\n\\\n          \\        except:\\n            return False\\n\\n    # ------------------ LATEST\\\n          \\ ------------------\\n    if scope == \\\"LATEST\\\":\\n        return True\\n\\\n          \\n    return True\\n\\n# ------------------ LATEST GROUPING ------------------\\n\\\n          \\ndef select_latest_per_group(records):\\n    latest = {}\\n\\n    for r in\\\n          \\ records:\\n        dt = parse_record_date(r.get(\\\"workenddate\\\"))\\n\\n \\\n          \\       key = (\\n            r.get(\\\"customernumber\\\"),\\n            r.get(\\\"\\\n          officecode\\\"),\\n            r.get(\\\"productservicecategory\\\"),\\n       \\\n          \\     r.get(\\\"reportcategory\\\")\\n        )\\n\\n        if key not in latest:\\n\\\n          \\            latest[key] = (dt, r)\\n        else:\\n            prev_dt =\\\n          \\ latest[key][0]\\n            if dt and (not prev_dt or dt > prev_dt):\\n\\\n          \\                latest[key] = (dt, r)\\n\\n    return [v[1] for v in latest.values()]\\n\\\n          \\n# ------------------ MAIN ------------------\\n\\ndef main(report_records,\\\n          \\ customer_number, office_code, query_input):\\n\\n    target_cust = normalize_str(customer_number)\\n\\\n          \\    target_office = normalize_str(office_code)\\n\\n    try:\\n        params\\\n          \\ = query_input if isinstance(query_input, dict) else json.loads(str(query_input))\\n\\\n          \\    except:\\n        params = {}\\n\\n    target_equip_codes = set(map(str,\\\n          \\ params.get(\\\"equipment_codes\\\", [])))\\n    target_report_codes = set(map(str,\\\n          \\ params.get(\\\"report_type_codes\\\", [])))\\n\\n    formatted_date = params.get(\\\"\\\n          formatted_date\\\", \\\"\\\")\\n    start_date = params.get(\\\"start_date\\\", \\\"\\\"\\\n          )\\n    end_date = params.get(\\\"end_date\\\", \\\"\\\")\\n    scope = params.get(\\\"\\\n          date_scope\\\", \\\"LATEST\\\")\\n    discrete_dates = params.get(\\\"discrete_dates\\\"\\\n          , [])\\n\\n    parsed_reports = []\\n    kb_customers = set()\\n\\n    for rec\\\n          \\ in report_records or []:\\n        try:\\n            obj = json.loads(rec)\\\n          \\ if isinstance(rec, str) else rec\\n\\n            full = {normalize_key(k):\\\n          \\ normalize_str(v)\\n                    for k, v in obj.items()}\\n\\n   \\\n          \\         full.update(parse_content(obj.get(\\\"content\\\", \\\"\\\")))\\n     \\\n          \\       full[\\\"_raw\\\"] = obj\\n\\n            parsed_reports.append(full)\\n\\\n          \\n            if full.get(\\\"customernumber\\\"):\\n                kb_customers.add(full.get(\\\"\\\n          customernumber\\\"))\\n\\n        except:\\n            continue\\n\\n    # ------------------\\\n          \\ PRIORITY 1: CUSTOMER ------------------\\n\\n    if target_cust not in kb_customers:\\n\\\n          \\        return {\\n            \\\"aggregated_result\\\": json.dumps([], ensure_ascii=False),\\n\\\n          \\            \\\"pdf_list\\\": [],\\n            \\\"matching_reports\\\": [],\\n\\\n          \\            \\\"count\\\": 0,\\n            \\\"customer_number_present\\\": \\\"\\\n          false\\\",\\n            \\\"office_code_present\\\": \\\"false\\\",\\n            \\\"\\\n          equipment_present\\\": \\\"false\\\",\\n            \\\"report_present\\\": \\\"false\\\"\\\n          \\n        }\\n\\n    cust_filtered = [\\n        r for r in parsed_reports\\n\\\n          \\        if r.get(\\\"customernumber\\\") == target_cust\\n    ]\\n\\n    # ------------------\\\n          \\ PRIORITY 2: BRANCH ------------------\\n\\n    office_filtered = [\\n   \\\n          \\     r for r in cust_filtered\\n        if r.get(\\\"officecode\\\") == target_office\\n\\\n          \\    ]\\n\\n    if not office_filtered:\\n        return {\\n            \\\"\\\n          aggregated_result\\\": json.dumps([], ensure_ascii=False),\\n            \\\"\\\n          pdf_list\\\": [],\\n            \\\"matching_reports\\\": [],\\n            \\\"count\\\"\\\n          : 0,\\n            \\\"customer_number_present\\\": \\\"true\\\",\\n            \\\"\\\n          office_code_present\\\": \\\"false\\\",\\n            \\\"equipment_present\\\": \\\"\\\n          false\\\",\\n            \\\"report_present\\\": \\\"false\\\"\\n        }\\n\\n    #\\\n          \\ ------------------ PRIORITY 3: EQUIPMENT + REPORT ------------------\\n\\\n          \\n    er_filtered = [\\n        r for r in office_filtered\\n        if (not\\\n          \\ target_equip_codes or\\n            r.get(\\\"productservicecategory\\\") in\\\n          \\ target_equip_codes)\\n        and\\n        (not target_report_codes or\\n\\\n          \\            r.get(\\\"reportcategory\\\") in target_report_codes)\\n    ]\\n\\n\\\n          \\    # ------------------ DATE FILTERING ------------------\\n\\n    if scope\\\n          \\ == \\\"LATEST\\\":\\n        scoped = select_latest_per_group(er_filtered)\\n\\\n          \\n    else:\\n        scoped = [\\n            r for r in er_filtered\\n  \\\n          \\          if is_date_in_scope(\\n                parse_record_date(r.get(\\\"\\\n          workenddate\\\")),\\n                scope,\\n                formatted_date,\\n\\\n          \\                start_date,\\n                end_date,\\n              \\\n          \\  discrete_dates\\n            )\\n        ]\\n\\n        # For single month/year\\\n          \\ we still return latest per group\\n        if scope in [\\\"YEAR\\\", \\\"MONTH\\\"\\\n          ]:\\n            scoped = select_latest_per_group(scoped)\\n\\n    if not scoped:\\n\\\n          \\        return {\\n            \\\"aggregated_result\\\": json.dumps([], ensure_ascii=False),\\n\\\n          \\            \\\"pdf_list\\\": [],\\n            \\\"matching_reports\\\": [],\\n\\\n          \\            \\\"count\\\": 0,\\n            \\\"customer_number_present\\\": \\\"\\\n          true\\\",\\n            \\\"office_code_present\\\": \\\"true\\\",\\n            \\\"\\\n          equipment_present\\\": \\\"true\\\",\\n            \\\"report_present\\\": \\\"false\\\"\\\n          \\n        }\\n\\n    # ------------------ SUCCESS RESPONSE ------------------\\n\\\n          \\n    grouped = {}\\n\\n    pdf_list = []\\n\\n    for r in scoped:\\n\\n    \\\n          \\    w_month = format_work_month(r.get(\\\"workenddate\\\"))\\n\\n        report_label\\\n          \\ = REPORT_CATEGORY_MAP.get(\\n            r.get(\\\"reportcategory\\\"), \\\"\\\n          Unknown\\\"\\n        )\\n\\n        product_label = PRODUCT_SERVICE_CATEGORY_MAP.get(\\n\\\n          \\            r.get(\\\"productservicecategory\\\"), \\\"Unknown\\\"\\n        )\\n\\\n          \\n        building_name = (\\n            r.get(\\\"fncdecryptaes256\\\")\\n \\\n          \\           or r.get(\\\"buildingname\\\")\\n            or r.get(\\\"building_name\\\"\\\n          )\\n            or r.get(\\\"propertyname\\\")\\n            or \\\"\\\"\\n       \\\n          \\ )\\n\\n        key = w_month\\n\\n        if key not in grouped:\\n       \\\n          \\     grouped[key] = {\\n                \\\"\u652f\u793e\u30b3\u30fc\u30c9\\\": r.get(\\\"officecode\\\"\\\n          ),\\n                \\\"\u304a\u5ba2\u3055\u307e\u756a\u53f7\\\": r.get(\\\"customernumber\\\"),\\n           \\\n          \\     \\\"\u30d3\u30eb\u540d\\\": building_name,\\n                \\\"\u4f5c\u696d\u6708\\\": w_month,\\n     \\\n          \\           \\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\": set(),\\n                \\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\": set()\\n \\\n          \\           }\\n\\n        grouped[key][\\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\"].add(report_label)\\n  \\\n          \\      grouped[key][\\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\"].add(product_label)\\n\\n        fname =\\\n          \\ (\\n            r.get(\\\"reportfilename\\\")\\n            or f\\\"report_{r.get('customernumber')}_{w_month.replace('/',\\\n          \\ '')}.pdf\\\"\\n        )\\n\\n        pdf_list.append({\\n            \\\"filename\\\"\\\n          : fname,\\n            \\\"content\\\": fname\\n        })\\n\\n    # Sort months\\n\\\n          \\    sorted_months = sorted(\\n    grouped.keys(),\\n    key=lambda x: datetime.strptime(x,\\\n          \\ \\\"%Y/%m\\\") if x != \\\"N/A\\\" else datetime.min\\n)\\n\\n    final_output =\\\n          \\ []\\n\\n    for month in sorted_months:\\n        data = grouped[month]\\n\\\n          \\        final_output.append({\\n            \\\"\u652f\u793e\u30b3\u30fc\u30c9\\\": data[\\\"\u652f\u793e\u30b3\u30fc\u30c9\\\"],\\n\\\n          \\            \\\"\u304a\u5ba2\u3055\u307e\u756a\u53f7\\\": data[\\\"\u304a\u5ba2\u3055\u307e\u756a\u53f7\\\"],\\n            \\\"\u30d3\u30eb\u540d\\\": data[\\\"\\\n          \u30d3\u30eb\u540d\\\"],\\n            \\\"\u4f5c\u696d\u6708\\\": data[\\\"\u4f5c\u696d\u6708\\\"],\\n            \\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\": \\\"\\\n          , \\\".join(sorted(data[\\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\"])),\\n            \\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\": \\\", \\\"\\\n          .join(sorted(data[\\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\"]))\\n        })\\n\\n    return {\\n       \\\n          \\ \\\"aggregated_result\\\": json.dumps(\\n        final_output,\\n        ensure_ascii=False,\\n\\\n          \\        indent=2\\n    ),\\n        \\\"pdf_list\\\": pdf_list,\\n        \\\"matching_reports\\\"\\\n          : [\\n            json.dumps(r[\\\"_raw\\\"], ensure_ascii=False)\\n         \\\n          \\   for r in scoped\\n        ],\\n        \\\"count\\\": len(scoped),\\n     \\\n          \\   \\\"customer_number_present\\\": \\\"true\\\",\\n        \\\"office_code_present\\\"\\\n          : \\\"true\\\",\\n        \\\"equipment_present\\\": \\\"true\\\",\\n        \\\"report_present\\\"\\\n          : \\\"true\\\"\\n    }\"\n        code_language: python3\n        desc: This node filters report records by customer number, officecode, equipment\n          type, report type, and date scope; detects future-date requests; selects\n          the latest applicable reports; and returns formatted report details, PDFs,\n          match counts, and presence flags for downstream logic.\n        outputs:\n          aggregated_result:\n            children: null\n            type: string\n          count:\n            children: null\n            type: number\n          customer_number_present:\n            children: null\n            type: string\n          equipment_present:\n            children: null\n            type: string\n          matching_reports:\n            children: null\n            type: array[string]\n          office_code_present:\n            children: null\n            type: string\n          pdf_list:\n            children: null\n            type: array[object]\n          report_present:\n            children: null\n            type: string\n        selected: false\n        title: 'Button 2 Data Formatter '\n        type: code\n        variables:\n        - value_selector:\n          - '17679557554340'\n          - report_records\n          value_type: array[string]\n          variable: report_records\n        - value_selector:\n          - '1765447295919'\n          - branch_code\n          value_type: string\n          variable: office_code\n        - value_selector:\n          - '1765447295919'\n          - customer_number\n          value_type: string\n          variable: customer_number\n        - value_selector:\n          - '1768387673605'\n          - result\n          value_type: string\n          variable: query_input\n      height: 193\n      id: '17679567286580'\n      position:\n        x: 4732.203448144466\n        y: 308.84438662616617\n      positionAbsolute:\n        x: 4732.203448144466\n        y: 308.84438662616617\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\n\\ndef main(\\n    customer_number_present: str,\\n    office_code_present:\\\n          \\ str,\\n    matching_reports: list,\\n    equipment_present: str,\\n    report_present:\\\n          \\ str\\n) -> dict:\\n\\n    error_message_out = \\\"\\\"\\n    is_validation_success\\\n          \\ = True\\n    next_step = 5\\n\\n    # Normalize flags\\n    customer_flag\\\n          \\ = customer_number_present.lower() == \\\"true\\\"\\n    office_flag = office_code_present.lower()\\\n          \\ == \\\"true\\\"\\n    equipment_flag = equipment_present.lower() == \\\"true\\\"\\\n          \\n    report_flag = report_present.lower() == \\\"true\\\"\\n    has_matching\\\n          \\ = bool(matching_reports)\\n\\n    \\n\\n    # --------------------------------------------------\\n\\\n          \\    # 1. CUSTOMER NUMBER NOT FOUND IN KB\\n    # --------------------------------------------------\\n\\\n          \\    if customer_flag is False:\\n        return {\\n            \\\"error_message\\\"\\\n          : (\\n                \\\"There is no applicable customer number. \\\"\\n    \\\n          \\            \\\"\\\\nPlease enter your branch code to confirm your customer\\\n          \\ information:\\\"\\n            ),\\n            \\\"is_validation_success\\\"\\\n          : \\\"false\\\",\\n            \\\"next_step\\\": 1\\n        }\\n\\n    # --------------------------------------------------\\n\\\n          \\    # 2. CUSTOMER FOUND BUT OFFICE CODE NOT FOUND\\n    # --------------------------------------------------\\n\\\n          \\    if customer_flag is True and office_flag is False:\\n        return\\\n          \\ {\\n            \\\"error_message\\\": (\\n                \\\"There is no branch\\\n          \\ code that corresponds to the target customer number. \\\"\\n            \\\n          \\    \\\"\\\\nPlease enter your branch code to confirm your customer information:\\\"\\\n          \\n            ),\\n            \\\"is_validation_success\\\": \\\"false\\\",\\n  \\\n          \\          \\\