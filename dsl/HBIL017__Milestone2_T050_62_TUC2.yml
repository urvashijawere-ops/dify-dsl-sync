        except ValueError:\\n\\\n          \\                    data[key] = value\\n            else:\\n            \\\n          \\    data[key] = value\\n                \\n        return data\\n\\n\\n    #\\\n          \\ --- Main Execution ---\\n\\n    gms_dicts = []\\n\\n    # kb_data is now Array[object]\\n\\\n          \\    # Assuming each object contains a 'content' field\\n    for item in\\\n          \\ kb_data:\\n        content = item.get(\\\"content\\\")\\n        if content:\\n\\\n          \\            parsed_data = parse_content_to_dict(content)\\n            gms_dicts.append(parsed_data)\\n\\\n          \\n    # Convert dictionaries into JSON strings\\n    gms_records_strings\\\n          \\ = [json.dumps(d) for d in gms_dicts]\\n\\n    return {\\n        \\\"gms_records\\\"\\\n          : gms_records_strings\\n    }\\n\\n\"\n        code_language: python3\n        desc: This node uses regex to extract key-value pairs from the text and converts\n          them into JSON array, providing structured GMS Schedule Data for further\n          processing.\n        outputs:\n          gms_records:\n            children: null\n            type: array[string]\n        selected: false\n        title: Button 3 Structured Context Extractor\n        type: code\n        variables:\n        - value_selector:\n          - '1770714924806'\n          - result\n          value_type: array[object]\n          variable: kb_data\n      height: 145\n      id: '1770715322534'\n      position:\n        x: 2736.9893687040676\n        y: 1085.6439951054824\n      positionAbsolute:\n        x: 2736.9893687040676\n        y: 1085.6439951054824\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\nfrom datetime import datetime\\n\\n# --- Utility Functions\\\n          \\ ---\\n\\ndef format_date_jp(date_str):\\n    try:\\n        dt = datetime.strptime(date_str,\\\n          \\ \\\"%m/%d/%Y\\\")\\n        return dt.strftime(\\\"%Y\u5e74%m\u6708%d\u65e5\\\")\\n    except Exception:\\n\\\n          \\        return \\\"\u65e5\u4ed8\u4e0d\u660e\\\"\\n\\ndef format_time_jp(dt_str):\\n    if not dt_str:\\n\\\n          \\        return \\\"\\\"\\n    try:\\n        # Handling Dify/ISO date formats\\n\\\n          \\        if isinstance(dt_str, str):\\n            if dt_str.endswith(\\\"\\\n          +00\\\"):\\n                dt_str = dt_str + \\\":00\\\"\\n            if \\\"T\\\"\\\n          \\ not in dt_str and \\\" \\\" in dt_str:\\n                dt_str = dt_str.replace(\\\"\\\n          \\ \\\", \\\"T\\\")\\n        dt = datetime.fromisoformat(dt_str)\\n        return\\\n          \\ dt.strftime(\\\"%H\u6642%M\u5206\\\")\\n    except Exception:\\n        return \\\"\\\"\\n\\n\\\n          # --- MAIN FUNCTION ---\\n\\ndef main(gms_records, kanri_no, jigyou_cd):\\n\\\n          \\    try:\\n        kanri_no = str(kanri_no).strip()\\n        jigyou_cd =\\\n          \\ str(jigyou_cd).strip()\\n\\n        gms = [json.loads(g) for g in gms_records\\\n          \\ if g]\\n\\n        model_map = {\\n            \\\"1\\\": \\\"\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\\\",\\n     \\\n          \\       \\\"2\\\": \\\"\u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\\\",\\n            \\\"3\\\": \\\"\u7a7a\u8abf\u8a2d\u5099\\\",\\n            \\\"\\\n          4\\\": \\\"\u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\\\"\\n        }\\n\\n        today = datetime.now().date()\\n  \\\n          \\      inspections = []\\n\\n        for g in gms:\\n            try:\\n   \\\n          \\             # Normalize customer number (removing decimals like .0)\\n\\\n          \\                g_kanri = str(int(float(g.get(\\\"okyakusamabango\\\", 0))))\\n\\\n          \\                g_shisha = str(g.get(\\\"shishacode\\\", \\\"\\\")).strip()\\n \\\n          \\           except (TypeError, ValueError):\\n                continue\\n\\n\\\n          \\            if g_kanri == kanri_no and g_shisha == jigyou_cd:\\n       \\\n          \\         try:\\n                    work_date_str = g.get(\\\"scheduledworkdate\\\"\\\n          , \\\"\\\")\\n                    if not work_date_str: continue\\n          \\\n          \\          work_date = datetime.strptime(work_date_str, \\\"%m/%d/%Y\\\").date()\\n\\\n          \\                except (TypeError, ValueError):\\n                    continue\\n\\\n          \\n                if work_date >= today:\\n                    inspections.append(g)\\n\\\n          \\n        if not inspections:\\n            return {\\\"result\\\": [\\\"\u6b21\u56de\u70b9\u691c\u4e88\u5b9a\u306f\u3042\u308a\u307e\u305b\u3093\u3002\\\"\\\n          ]}\\n\\n        # Sort by date\\n        inspections.sort(key=lambda x: datetime.strptime(x.get(\\\"\\\n          scheduledworkdate\\\"), \\\"%m/%d/%Y\\\"))\\n\\n\\n        # Using a dictionary to\\\n          \\ group equipment by the same DateTime header\\n        grouped_data = {}\\n\\\n          \\        # We also keep a list of keys to preserve the sorted date order\\n\\\n          \\        ordered_keys = []\\n\\n        for g in inspections:\\n          \\\n          \\  date_part = format_date_jp(g.get(\\\"scheduledworkdate\\\"))\\n          \\\n          \\  start_time = format_time_jp(g.get(\\\"begindatetime\\\"))\\n            end_time\\\n          \\ = format_time_jp(g.get(\\\"enddatetime\\\"))\\n            \\n            #\\\n          \\ Header acts as the unique key for grouping\\n            header = f\\\"{date_part}\u3000{start_time}\uff5e{end_time}\\\"\\\n          \\n            \\n            model = model_map.get(str(g.get(\\\"modelcode\\\"\\\n          )), \\\"\u8a2d\u5099\\\")\\n            raw_goki = g.get('goki', 'N/A')\\n            try:\\n\\\n          \\                unit = f\\\"{int(raw_goki):0>2}\u53f7\u6a5f\\\"\\n            except:\\n\\\n          \\                unit = f\\\"{raw_goki}\u53f7\u6a5f\\\"\\n                \\n          \\\n          \\  inspection_label = \\\"\u5b9a\u671f\u70b9\u691c\\\"\\n            equipment_detail = f\\\"{model}\\\n          \\ / {unit} / {inspection_label}\\\"\\n\\n            if header not in grouped_data:\\n\\\n          \\                grouped_data[header] = [equipment_detail]\\n           \\\n          \\     ordered_keys.append(header)\\n            else:\\n                grouped_data[header].append(equipment_detail)\\n\\\n          \\n        # Build final strings: \\\"Header | Equip1 | Equip2\\\"\\n        final_results\\\n          \\ = []\\n        for key in ordered_keys:\\n            details = \\\" | \\\"\\\n          .join(grouped_data[key])\\n            final_results.append(f\\\"{key} | {details}\\\"\\\n          )\\n\\n        return {\\n            \\\"result\\\": final_results\\n        }\\n\\\n          \\n    except Exception as e:\\n        return {\\n            \\\"result\\\":\\\n          \\ [f\\\"Error: {str(e)}\\\"]\\n        }\"\n        code_language: python3\n        desc: This node retrieves and cross-checks GMS records using kanri_no and\n          jigyou_cd, formats dates, time slots and equipment list details for display.\n        outputs:\n          result:\n            children: null\n            type: array[string]\n        selected: false\n        title: Button 3 Data Formatter\n        type: code\n        variables:\n        - value_selector:\n          - '1770715322534'\n          - gms_records\n          value_type: array[string]\n          variable: gms_records\n        - value_selector:\n          - '1765447295919'\n          - branch_code\n          value_type: string\n          variable: jigyou_cd\n        - value_selector:\n          - '1765447295919'\n          - customer_number\n          value_type: string\n          variable: kanri_no\n      height: 129\n      id: '1770715471535'\n      position:\n        x: 3265.8080287118637\n        y: 1114.716774773327\n      positionAbsolute:\n      