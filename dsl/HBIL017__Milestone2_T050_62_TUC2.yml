ight\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: contains\n            id: b6644cfa-78da-4385-866a-70ab79ebb9c7\n            value: 'True'\n            varType: string\n            variable_selector:\n            - '1769520574387'\n            - is_valid_option\n          - comparison_operator: not empty\n            id: 0bd3c676-6fe2-413a-b94f-4485f9330ac7\n            value: ''\n            varType: string\n            variable_selector:\n            - conversation\n            - option_selected\n          id: 'true'\n          logical_operator: or\n        desc: This node checks whether the previous node marked the input as valid\n          (is_valid_option contains \"True\") and ensures that an option_selected value\n          is present. The node proceeds only when the input is either valid or non-empty.\n        selected: false\n        title: OPTION VALIDATOR\n        type: if-else\n      height: 259\n      id: '1769520770301'\n      position:\n        x: 579.3644665757678\n        y: 756.1157414863023\n      positionAbsolute:\n        x: 579.3644665757678\n        y: 756.1157414863023\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"\\ndef main(user_input: str, llm_output: str) -> dict:\\n\\n    # Determine\\\n          \\ which source to use; prioritize user_input, fallback to llm_output\\n \\\n          \\   raw_text = llm_output if llm_output and llm_output.strip() else user_input.strip()\\n\\\n          \\    \\n    # Clean the text for comparison\\n    cleaned_text = raw_text.strip()\\\n          \\ if raw_text else \\\"\\\"\\n    return {\\n        \\\"input_value\\\": cleaned_text,\\n\\\n          \\    }\"\n        code_language: python3\n        desc: This node selects the effective input text by prioritizing a non-empty\n          llm_output and falling back to user_input when necessary. It trims whitespace\n          and outputs the final cleaned text as input_value for downstream processing.\n        outputs:\n          input_value:\n            children: null\n            type: string\n        selected: false\n        title: INPUT SEGREGATOR\n        type: code\n        variables:\n        - value_selector:\n          - '1769520574387'\n          - input_value\n          value_type: string\n          variable: user_input\n        - value_selector:\n          - '1769163996583'\n          - text\n          value_type: string\n          variable: llm_output\n      height: 161\n      id: '1769520919238'\n      position:\n        x: 1165.0640957786716\n        y: 631.5341473691681\n      positionAbsolute:\n        x: 1165.0640957786716\n        y: 631.5341473691681\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: contains\n            id: 1dfab1dc-8f54-4d34-9557-8ff295377300\n            value: no records\n            varType: string\n            variable_selector:\n            - '17679646511050'\n            - error_message\n          id: 'true'\n          logical_operator: or\n        desc: ''\n        selected: false\n        title: Rating Output Segregator\n        type: if-else\n      height: 125\n      id: '1770118438200'\n      position:\n        x: 5613.978073691001\n        y: 597.6631982241332\n      positionAbsolute:\n        x: 5613.978073691001\n        y: 597.6631982241332\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        desc: This node updates the workflow\u2019s current_step using the next_step from\n          the validation router and clears the selected option to prepare for the\n          next user interaction.\n        items:\n        - input_type: variable\n          operation: over-write\n          value:\n          - '17679646511050'\n          - next_step\n          variable_selector:\n          - conversation\n          - current_step\n          write_mode: over-write\n        selected: false\n        title: Button 2 Step Assigner 1\n        type: assigner\n        version: '2'\n      height: 177\n      id: '17701185044470'\n      position:\n        x: 5986.9000291877555\n        y: 571.646242438604\n      positionAbsolute:\n        x: 5986.9000291877555\n        y: 571.646242438604\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: '='\n            id: 5773c340-92c0-44f8-8b2f-0d4585924ff7\n            value: '1'\n            varType: number\n            variable_selector:\n            - conversation\n            - button4_step\n          id: 'true'\n          logical_operator: and\n        desc: This node checks whether button4_step is 1 or not.\n        selected: false\n        title: Button4 click step\n        type: if-else\n      height: 169\n      id: '1770179997403'\n      position:\n        x: 1845.11881700428\n        y: 1617.820770707633\n      positionAbsolute:\n        x: 1845.11881700428\n        y: 1617.820770707633\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"def main(user_input: str) -> dict:\\n   \\n    valid_options = [\\n  \\\n          \\      \\\"\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\uff0f\u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\\\", \\n        \\\"\u9632\u72af\u30ab\u30e1\u30e9\uff0f\u81ea\u52d5\u30c9\u30a2\\\", \\n        \\\"\u5165\u9000\u51fa\u7ba1\u7406\uff0f\uff29\uff34\uff2d\uff33\uff0f\uff22\uff29\uff36\uff21\uff2c\uff25\\\"\\\n          , \\n        \\\"\u6d88\u9632\uff0f\u7d66\u6392\u6c34\\\", \\n        \\\"\u51b7\u71b1\u6a5f\u5668\u30fb\u51b7\u51cd\u6a5f\u30fb\u51b7\u6e29\u6c34\\\"\\n        \\n    ]\\n  \\\n          \\  \\n   \\n    cleaned_input = user_input.strip() if user_input else \\\"\\\"\\\n          \\n    \\n    if cleaned_input in valid_options:\\n        \\n        return\\\n          \\ {\\n            \\\"is_valid_option\\\": \\\"True\\\",\\n            \\\"input_value\\\"\\\n          : cleaned_input\\n        }\\n    else:\\n       \\n        return {\\n     \\\n          \\       \\\"is_valid_option\\\": \\\"False\\\",\\n            \\\"input_value\\\": cleaned_input\\n\\\n          \\        }\"\n        code_language: python3\n        desc: 'This node validates the user\u2019s input against a predefined list of valid\n          options.\n\n          It trims whitespace, checks whether the input exactly matches one of the\n          allowed options, and returns whether the input is valid along with the cleaned\n          input value.'\n        outputs:\n          input_value:\n            children: null\n            type: string\n          is_valid_option:\n            children: null\n            type: string\n        selected: false\n        title: option selector button4\n        type: code\n        variables:\n        - value_selector:\n          - sys\n          - query\n          value_type: string\n          variable: user_input\n      height: 177\n      id: '1770180032785'\n      position:\n        x: 2207.827605810525\n        y: 1809.8539397042996\n      positionAbsolute:\n        x: 2207.827605810525\n        y: 1809.8539397042996\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: is\n            id: aeabe9f7-babc-45dd-ac33-7d02daf26c4a\n            value: 'True'\n            varType: string\n  