   width: 244\n    - data:\n        answer: '{{#17689161871780.output#}}'\n        desc: This node is used to display the error message for invalid rating input/\n        selected: false\n        title: 'Button 2 Rating Message Presenter '\n        type: answer\n        variables: []\n      height: 148\n      id: '17689162675130'\n      position:\n        x: 3565.046466033667\n        y: 836.7946410868366\n      positionAbsolute:\n        x: 3565.046466033667\n        y: 836.7946410868366\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        desc: This node overwrites the workflow\u2019s current_step with the next_step\n          determined by the validation router, advancing the flow according to validation\n          outcomes.\n        items:\n        - input_type: variable\n          operation: over-write\n          value:\n          - '17679646511050'\n          - next_step\n          variable_selector:\n          - conversation\n          - current_step\n          write_mode: over-write\n        selected: false\n        title: Step Updater\n        type: assigner\n        version: '2'\n      height: 177\n      id: '17689905479150'\n      position:\n        x: 5628.7007831737965\n        y: 224.97244084626197\n      positionAbsolute:\n        x: 5628.7007831737965\n        y: 224.97244084626197\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        desc: This node maps the next_step value from the button handler to the workflow\u2019s\n          current_step, updating the flow state to move to the designated next step.\n        items:\n        - input_type: variable\n          operation: over-write\n          value:\n          - '1769024041258'\n          - next_step\n          variable_selector:\n          - conversation\n          - current_step\n          write_mode: over-write\n        selected: false\n        title: 'Button 2 Next Step Assigner '\n        type: assigner\n        version: '2'\n      height: 177\n      id: '17690238498820'\n      position:\n        x: 4104.820358437226\n        y: 702.1047836155512\n      positionAbsolute:\n        x: 4104.820358437226\n        y: 702.1047836155512\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"\\ndef main() -> int:\\n    return {\\n        \\\"next_step\\\": 4,\\n   \\\n          \\ }\\n\"\n        code_language: python3\n        desc: This node returns a fixed control value (next_step = 4) to direct the\n          workflow to the next predefined step.\n        outputs:\n          next_step:\n            children: null\n            type: number\n        selected: false\n        title: Next Step Handler\n        type: code\n        variables: []\n      height: 113\n      id: '1769024041258'\n      position:\n        x: 3838.163044219957\n        y: 664.4927663947565\n      positionAbsolute:\n        x: 3838.163044219957\n        y: 664.4927663947565\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        context:\n          enabled: true\n          variable_selector:\n          - sys\n          - query\n        desc: This normalizes free-text equipment input into a strict, canonical Japanese\n          equipment name with an optional unit number (\u53f7\u6a5f), ensuring exact string\n          matching with UI buttons and the Knowledge Base.\n        model:\n          completion_params:\n            temperature: 0\n          mode: chat\n          name: gemini-3-pro-preview\n          provider: langgenius/gemini/google\n        prompt_template:\n        - id: 01e421f6-83c2-478c-8421-4f445512bbb1\n          role: system\n          text: 'You are a Japanese Equipment & Unit Normalization Agent.\n\n            Your task is to normalize the user\u2019s equipment selection input {{#context#}}\n            so that it exactly matches the equipment + unit format used by the UI\n            buttons and the Knowledge Base (KB).\n\n            The normalized output will be passed unchanged to a downstream validation\n            router that performs strict string matching.\n\n            ==============================\n\n            TARGET OUTPUT FORMAT (MANDATORY)\n\n            When a unit number is present, always output exactly:\n\n            <\u8a2d\u5099\u540d> <\u756a\u53f7>\u53f7\u6a5f\n\n            Examples:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc 1\u53f7\u6a5f\n\n            \u7a7a\u8abf\u8a2d\u5099 2\u53f7\u6a5f\n\n            If no unit number is explicitly mentioned, output only the equipment name:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\n\n            \u7a7a\u8abf\u8a2d\u5099\n\n            ==============================\n\n            LANGUAGE & NORMALIZATION RULES\n\n            The user input may be written in:\n\n            Kanji\n\n            Hiragana\n\n            Katakana\n\n            Romaji\n\n            Any combination of the above\n\n            You MUST normalize everything into standard Japanese equipment names.\n\n            Canonical equipment names:\n\n            elevator / lift / \u30a8\u30ec\u30d9\u30fc\u30bf / \u30a8\u30ec\u30d9\u30fc\u30bf\u2015 / \u30a8\u30ec\u30d9\u30fc\u30bf\u30a1 \u2192 \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\n\n            escalator / \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf \u2192 \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\n\n            AC / air conditioner / \u30a8\u30a2\u30b3\u30f3 / \u7a7a\u8abf \u2192 \u7a7a\u8abf\u8a2d\u5099\n\n            building management / BMS / \u30d3\u30eb\u7ba1\u7406 \u2192 \u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\n\n            ==============================\n\n            UNIT (\u53f7\u6a5f) HANDLING \u2014 CRITICAL\n\n            If the user mentions a unit number in any form, you MUST convert it to:\n\n            <\u756a\u53f7>\u53f7\u6a5f\n\n            Recognize ALL of the following as unit indicators:\n\n            \u53f7\u6a5f\n\n            \u30e6\u30cb\u30c3\u30c8\n\n            \u53f7\u6a5f\u756a\u53f7\n\n            \u756a\u53f7\n\n\n            \u756a / \u756a\u53f7\n\n            Kanji numerals (\u4e00, \u4e8c, \u4e09, \u56db, \u4e94, etc.)\n\n            Rules:\n\n            Always use Arabic numerals (1, 2, 3\u2026)\n\n            Never spell numbers in words\n\n            Always append \u53f7\u6a5f when a number exists\n\n            Examples:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\u4e09\u53f7\u6a5f \u2192 \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            elevator unit 3 \u2192 \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            goki 3 elevator \u2192 \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc 1\u756a \u2192 \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc 1\u53f7\u6a5f\n\n            ==============================\n\n            TEXT CLEANING RULES\n\n            Remove all polite, descriptive, or irrelevant phrases, including but not\n            limited to:\n\n            \u6559\u3048\u3066\u304f\u3060\u3055\u3044\n\n            \u78ba\u8a8d\u3057\u305f\u3044\n\n            \u898b\u305f\u3044\n\n            \u77e5\u308a\u305f\u3044\n\n            \u306e / \u3092 / \u304c / \u306f (unless required for meaning)\n\n            \u70b9\u691c\n\n            \u7d50\u679c\n\n            \u30ec\u30dd\u30fc\u30c8\n\n            \u5831\u544a\u66f8\n\n            These words are NOT equipment identifiers and must not appear in the output.\n\n            ==============================\n\n            MULTIPLE EQUIPMENT HANDLING\n\n            If multiple equipments or units are mentioned: invalid case return (No\n            equipment found)\n\n            Example1: \u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 2\u53f7\u6a5f\n\n            Example 2: \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 2\u53f7\u6a5f\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            Example 3: \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 2\u53f7\u6a5f\u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\n\n            ==============================\n\n            OUTPUT CONSTRAINTS (ABSOLUTE)\n\n            Output ONLY one single line\n\n            Output ONLY the normalized equipment string\n\n            No JSON\n\n            No explanations\n\n            No extra spaces\n\n            No punctuation before or after\n\n            No emojis\n\n            No Markdown\n\n            ==============================\n\n            EXAMPLES\n\n            Input:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            Output:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            Input:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\u306e3\u53f7\u6a5f\u3092\u78ba\u8a8d\u3057\u305f\u3044\u3067\u3059\n\n            Output:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            Input:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf 3\n\n            Output:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            Input:\n\n            \u7a7a\u8abf\u8a2d\u5099\u306e\u7d50\u679c\u3092\u898b\u305f\u3044\n\n            Output:\n\n            \u7a7a\u8abf\u8a2d\u5099\n\n            Input:\n\n            \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\u4e09\u53f7\u6a5f\n\n            Output:\n\n            \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc 3\u53f7\u6a5f\n\n            ==============================\n\n            If user gives something invalid then return (No equipment found)\n\n            FINAL RULE\n\n            Return ONLY the normalized equipment string, exactly matching the format\n            used by the UI buttons and the Knowledge Base.'\n        - id: af2b0fcb-d7b2-48aa-ac6d-3a480d00847b\n          role: user\n          text: '{{#sys.query#}}'\n        selected: false\n        title: Japanese Language Handler\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 197\n      id: '1769155077062'\n      position:\n        x: 2258.840242297094\n        y: 184.2900312379885\n      positionAbsolute:\n        x: 2258.840242297094\n        y: 184.2900312379885\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        context:\n          enabled: true\n          variable_selector:\n          - '1765447295919'\n          - option_text\n        desc: This node analyzes free-text user input (Japanese, English, or mixed)\n          and normalizes it to a single predefined menu option by intent. It returns\n          the exact matching Japanese button text when the intent is clear and unambiguous;\n          otherwise, it returns an empty string.\n        model:\n          completion_params:\n            temperature: 0\n          mode: chat\n          name: gemini-3-pro-preview\n          provider: langgenius/gemini/google\n        prompt_template:\n        - id: 256f571b-d6f4-4f84-85db-dd0276bc9226\n          role: system\n          text: \"You are a normalization and intent-matching engine.\\nYour task:\\n\\\n            - Analyze the user's input text: {{#context#}}\\n- The input may be in\\\n            \\ Japanese, or any mixture of Japanese scripts.\\n- The input may be free\\\n            \\ text or may exactly match a button label.\\n- Determine whether the input\\\n            \\ semantically matches EXACTLY ONE of the predefined menu options below.\\n\\\n            \\nIf it matches:\\n- Output ONLY the EXACT Japanese button text listed\\\n            \\ below.\\n\\nIf it does NOT clearly and unambiguously match exactly one\\\n            \\ option:\\n- Output an empty string.\\n\\nIMPORTANT OUTPUT RULES:\\n- Output\\\n            \\ ONLY one line.\\n- Output ONLY the exact button text listed below OR\\\n            \\ an empty string.\\n- Do NOT add explanations, prefixes, suffixes, punctuation,\\\n            \\ or whitespace.\\n- Do NOT repeat or echo the user input.\\n- Do NOT translate\\\n            \\ into new wording.\\n- Do NOT return multiple options.\\n- Do NOT guess\\\n            \\ when intent is unclear.\\n\\nPredefined Menu Options (OUTPUT MUST MATCH\\\n            \\ EXACTLY ONE OF THESE STRINGS):\\n\\n1. \u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\n2. \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\n3. \u70b9\u691c\u65e5\u6642\u3092\u5909\u66f4\u3057\u305f\u3044\\n\\\n            4. \u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\n5. \u898b\u7a4d\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n6. \u5951\u7d04\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n\\nMatching Guidelines:\\n\\\n            - Treat synonyms, paraphrases, and polite variations as matches.\\n- Ignore\\\n            \\ tense, politeness, particles, and filler words.\\n- Focus strictly on\\\n            \\ the user's core intent.\\n- If multiple intents appear or intent is ambiguous,\\\n            \\ return an empty string.\\n- If the input is unrelated to these options,\\\n            \\ return an empty string.\\n\\nIntent Mapping Examples (FOR UNDERSTANDING\\\n            \\ ONLY \u2014 DO NOT OUTPUT THESE):\\n\\n\\\"\u70b9\u691c\u7d50\u679c\u3092\u6559\u3048\u3066\u304f\u3060\u3055\u3044\\\" \u2192 \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\n\\\"\u70b9\u691c\u306f\u3044\u3064\u3067\u3059\u304b\\\"\\\n            \\ \u2192 \u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\n\\\"\u70b9\u691c\u306e\u65e5\u7a0b\u3092\u5909\u66f4\u3057\u305f\u3044\\\" \u2192 \u70b9\u691c\u65e5\u6642\u3092\u5909\u66f4\u3057\u305f\u3044\\n\\\"\u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\\" \u2192 \u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\n\\\n            \\\"\u898b\u7a4d\u304c\u6b32\u3057\u3044\\\" \u2192 \u898b\u7a4d\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n\\\"\u5951\u7d04\u66f8\u3092\u304f\u3060\u3055\u3044\\\" \u2192 \u5951\u7d04\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n\\nInvalid output\\\n            \\ cases:\\nIf the input contains multiple buttons text in any combination\\\n            \\ with any or no separator, it is invalid\\nExample \\\"\u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044 \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\\"\\\n            \\ \\nThis input should return EMPTY STRING as it is combination of multiple\\\n            \\ intents.\\n\\nIf the input does NOT clearly correspond to exactly one\\\n            \\ menu option:\\n\u2192 Output an empty string.\"\n        - id: 99e36b32-1922-4181-8359-bc127bad6f30\n          role: user\n          text: '{{#1765447295919.option_text#}}'\n        selected: false\n        title: Option text handler\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 229\n      id: '1769163996583'\n      position:\n        x: 872.6352442216976\n        y: 898.8056167143136\n      positionAbsolute:\n        x: 872.6352442216976\n        y: 898.8056167143136\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"def main(user_input: str) -> dict:\\n    # The list of valid options\\\n          \\ from your initial selection menu\\n    valid_options = [\\n        \\\"\u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\\"\\\n          , \\n        \\\"\u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\\", \\n        \\\"\u70b9\u691c\u65e5\u6642\u3092\u5909\u66f4\u3057\u305f\u3044\\\", \\n        \\\"\u70b9\u691c\u3