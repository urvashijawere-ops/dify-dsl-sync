enu button selection was made. It is typically used to detect and handle\n          cases where the user provided free-text input instead of selecting a button\n          option.\n        selected: false\n        title: Button 2 Option Selected\n        type: if-else\n      height: 249\n      id: '17682010756360'\n      position:\n        x: 1853.11881700428\n        y: 658.5792200588501\n      positionAbsolute:\n        x: 1853.11881700428\n        y: 658.5792200588501\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        answer: '\u3044\u3064\u5b9f\u65bd\u3057\u305f\u70b9\u691c\u7d50\u679c(\u30ec\u30dd\u30fc\u30c8)\u304c\u5fc5\u8981\u3067\u3059\u304b\uff1f\n\n          \u5165\u529b\u4f8b\uff1a  \u6628\u5e74\u306e\u7a7a\u8abf\u8a2d\u5099\u306e\u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044'\n        desc: This node collects clarifying information needed to retrieve the correct\n          inspection results.\n        selected: false\n        title: Inspection Query\n        type: answer\n        variables: []\n      height: 193\n      id: '1768201126356'\n      position:\n        x: 2611.58210636089\n        y: 432.49236350122226\n      positionAbsolute:\n        x: 2611.58210636089\n        y: 432.49236350122226\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        desc: 'This node sets the option_selected variable to a specific predefined\n          menu option value(Button1).\n\n          It is used to explicitly assign or override the selected option for downstream\n          processing and routing.'\n        items:\n        - input_type: constant\n          operation: set\n          value: \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\n          variable_selector:\n          - conversation\n          - option_selected\n          write_mode: over-write\n        selected: false\n        title: Query Assigner\n        type: assigner\n        version: '2'\n      height: 193\n      id: '17682032247030'\n      position:\n        x: 2245.1852546762593\n        y: 439.5496310804681\n      positionAbsolute:\n        x: 2245.1852546762593\n        y: 439.5496310804681\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        context:\n          enabled: true\n          variable_selector:\n          - sys\n          - query\n        desc: This node validates user's query and extracts required inspection context\n          (date, report type, or equipment), rejects invalid queries, and, when valid,\n          outputs normalized inspection date, equipment codes, and report type codes\n          in a strict JSON format.\n        model:\n          completion_params:\n            temperature: 0\n          mode: chat\n          name: gemini-3-pro-preview\n          provider: langgenius/gemini/google\n        prompt_template:\n        - id: e2305b4c-bb31-4bac-a085-a6b0694751f1\n          role: system\n          text: 'You are a deterministic Inspection Intent Extraction Engine.\n\n            Your task is to analyze the user input: {{#context#}}\n\n            and extract structured filtering intent for inspection data retrieval.\n\n            The input will be written in Japanese (Kanji, Hiragana, Katakana) and\n            may include numbers and limited English date expressions.\n\n            Date handling must extract the exact text the user provides without modification.\n\n            You must follow ALL rules exactly.\n\n            You must NOT:\n\n            Infer beyond defined mappings\n\n            Invent synonyms\n\n            Perform date calculations\n\n            Translate meaning\n\n            Add explanations\n\n            Add extra text\n\n            Modify output structure\n\n            Add fields\n\n            Store memory\n\n            PROCESSING STEPS (MANDATORY)\n\n            Step 1 \u2014 Detect equipment keywords\n\n            Step 2 \u2014 Detect specific report type keywords\n\n            Step 3 \u2014 Detect generic report trigger words\n\n            Step 4 \u2014 Detect date expressions\n\n            Step 5 \u2014 Domain validation\n\n            Step 6 \u2014 Output structured JSON\n\n            SECTION 1 \u2014 EQUIPMENT TYPE (FILTER CATEGORY)\n\n            Match exact substrings only.\n\n            Code 1:\n\n            \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\n\n            Code 2:\n\n            \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\n\n            Code 3:\n\n            \u7a7a\u8abf\u8a2d\u5099\n\n            \u30a8\u30a2\u30b3\u30f3\n\n            Code 4:\n\n            \u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\n\n            \u30d3\u30eb\u7ba1\u7406\n\n            Rules:\n\n            If multiple appear \u2192 return unique codes sorted ascending.\n\n            If none appear \u2192 return [1,2,3,4].\n\n            Do NOT infer beyond listed keywords.\n\n            SECTION 2 \u2014 SPECIFIC REPORT TYPE (FILTER CATEGORY)\n\n            Exact substring match OR defined containment rule only.\n\n            Code 1:\n\n            \u30e1\u30f3\u30c6\u30ca\u30f3\u30b9\n\n            \u6574\u5099\n\n            \u6574\u5099\u5831\u544a\u66f8\n\n            Code 2:\n\n            \u30d8\u30ea\u30aa\u30b9\n\n            Code 3:\n\n            \u70b9\u691c\u5831\u544a\u66f8\n\n            \u70b9\u691c\u30ec\u30dd\u30fc\u30c8\n\n            \u691c\u67fb\u5831\u544a\u66f8\n\n            \u691c\u67fb\u30ec\u30dd\u30fc\u30c8\n\n            CONTAINMENT RULE (STRICT, NOT SEMANTIC):\n\n            If BOTH substrings appear anywhere in input:\n\n            \u70b9\u691c AND \u5831\u544a\u66f8 \u2192 include Code 3\n\n            \u691c\u67fb AND \u5831\u544a\u66f8 \u2192 include Code 3\n\n            Rules:\n\n            If one or more specific report keywords detected \u2192 return matching unique\n            codes sorted ascending.\n\n            If none appear \u2192 evaluate generic trigger words (Section 3).\n\n            Do NOT infer beyond explicitly listed substrings.\n\n            Do NOT perform linguistic normalization.\n\n            SECTION 3 \u2014 GENERIC REPORT TRIGGER (NOT A FILTER)\n\n            These words indicate a request for reports but do NOT define report type:\n\n            \u30ec\u30dd\u30fc\u30c8\n\n            \u5831\u544a\n\n            \u5831\u544a\u66f8\n\n            Rules:\n\n            If ONLY generic report words appear (and no specific report type detected)\n            \u2192 return [1,2,3]\n\n            If neither specific nor generic report words appear \u2192 return [1,2,3]\n\n            If specific report types are detected \u2192 ignore generic words completely\n\n            SECTION 4 \u2014 INSPECTION DATE\n\n            Any substring that looks like a date or relative time in the user input\n            must be returned exactly as written.\n\n            SPECIAL LATEST-TYPE RULE:\n\n            If the input contains any of the following expressions:\n\n            \u524d\u56de\n\n            \u6700\u65b0\n\n            \u76f4\u8fd1\n\n            \u4eca\u56de\n\n            or related expressions like\n\n            \u6700\u8fd1\u306e\n\n            \u6700\u65b0 etc.\n\n\n            \u2192 return \"null\" instead of the original substring.\n\n            This includes:\n\n            Absolute dates (Western or Japanese format, e.g., YYYY, YYYY-MM, YYYY-MM-DD,\n            YYYY\u5e74, YYYY\u5e74MM\u6708DD\u65e5, etc.)\n\n            Date ranges (Western or Japanese format, e.g., YYYY-YYYY, YYYY\u5e74\u301cYYYY\u5e74,\n            from YYYY, YYYY to YYYY, etc.)\n\n            Relative expressions (exact text match only, e.g., last month, last year,\n            X months ago, X years ago, \u5148\u6708, \u6628\u5e74, \u25cb\u30f6\u6708\u524d, \u25cb\u5e74\u524d, before, after, later, etc.)\n\n            Rules:\n\n            If detected \u2192 return the exact substring as written in input.\n\n            If multiple date expressions appear \u2192 return the full continuous substring\n            representing the range if applicable; otherwise return the first matched\n            date substring.\n\n            If none detected \u2192 return null.\n\n            Do NOT calculate, normalize, or convert formats.\n\n            SECTION 5 \u2014 DOMAIN VALIDATION RULE (KB SAFETY)\n\n            This system only supports inspection-related reports.\n\n            ALLOWED DOMAIN TERMS (inspection scope):\n\n            Equipment terms listed in Section 1\n\n            Specific report terms listed in Section 2\n\n            Generic report triggers listed in Section 3\n\n            Inspection-related modifiers: \u70b9\u691c, \u691c\u67fb, \u6574\u5099, \u30e1\u30f3\u30c6\u30ca\u30f3\u30b9, \u30d8\u30ea\u30aa\u30b9\n\n            Validation logic:\n\n            Date-only queries are VALID.\n\n            If a noun directly modifies: \u5831\u544a, \u5831\u544a\u66f8, \u30ec\u30dd\u30fc\u30c8 and that modifier is NOT included\n            in:\n\n            Equipment keywords\n\n            Specific report keywords\n\n            Allowed inspection-related modifiers listed above \u2192 INVALID.\n\n            If the query contains a domain-specific term unrelated to inspection (\u4f8b:\n            \u7a0e\u52d9, \u4f1a\u8a08, \u4eba\u4e8b, \u7d66\u4e0e, \u5951\u7d04, etc.) modifying report-related words \u2192 INVALID.\n\n            If equipment or valid report types are detected AND no unrelated domain\n            modifiers are present \u2192 VALID.\n\n            If none of the following are detected: Equipment keyword, Specific report\n            type keyword, Generic report trigger word, Date expression \u2192 INVALID.\n\n            SECTION 6 \u2014 OUTPUT FORMAT\n\n            If INVALID:\n\n            {\n\n            \"valid\": false,\n\n            \"reason\": \"User query does not match inspection-related intent.\"\n\n            }\n\n            If VALID:\n\n            {\n\n            \"valid\": true,\n\n            \"inspection_date\": \"<exact text or null>\",\n\n            \"equipment_codes\": [numbers],\n\n            \"report_type_codes\": [numbers]\n\n            }\n\n            STRICT OUTPUT RULES\n\n            Output ONLY valid JSON.\n\n            No markdown.\n\n            No explanation.\n\n            No commentary.\n\n            No extra text before or after JSON.\n\n            Arrays must contain integers only.\n\n            Codes must be unique.\n\n            Codes must be sorted ascending.\n\n            Field order must be exactly: valid, inspection_date, equipment_codes,\n            report_type_codes'\n        - id: efd61aaf-438d-4eb2-8075-322f8b87f82f\n          role: user\n          text: '{{#sys.query#}}'\n        selected: false\n        title: INSPECTION QUERY INPUT\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 213\n      id: '1768211570966'\n      position:\n        x: 3004.599434978268\n        y: 597.6631982241332\n      positionAbsolute:\n        x: 3004.599434978268\n        y: 597.6631982241332\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: contains\n            id: 47191a69-97b1-4b04-a61b-66fae706712e\n            value: '\"valid\": true'\n            varType: string\n            variable_selector:\n            - '1768211570966'\n            - text\n          id: 'true'\n          logical_operator: and\n        desc: This node checks whether the output from Inspection Query Input node\n          is valid or not.\n        selected: false\n        title: Query Input Validator\n        type: if-else\n      height: 185\n      id: '1768212707505'\n      position:\n        x: 3565.046466033667\n        y: 478.6459266418225\n      positionAbsolute:\n        x: 3565.046466033667\n        y: 478.6459266418225\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        answer: '\u6b63\u3057\u3044\u5165\u529b\u3092\u63d0\u4f9b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\n\n          \u4f8b\uff1a\u6628\u5e74\u306e\u7a7a\u8abf\u8a2d\u5099\u306e\u691c\u67fb\u5831\u544a\u66f8\u306e\u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\n\n\n          '\n        desc: This node displays the message for scenarios when invalid query input\n          is entered for inspection results.\n        selected: false\n        title: Invalid Input Message\n        type: answer\n        variables: []\n      height: 193\n      id: '1768218902888'\n      position:\n        x: 4415.914269292509\n        y: 702.1047836155512\n      positionAbsolute:\n        x: 4415.914269292509\n        y: 702.1047836155512\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\nimport re\\nfrom datetime import datetime, timedelta\\n\\n\\\n          def main(input_json):\\n\\n    # -----------------------------------\\n   \\\n          \\ # Parse Input\\n    # -----------------------------------\\n    try:\\n \\\n          \\       result = json.loads(input_json) if isinstance(input_json, str) else\\\n          \\ input_json\\n    except:\\n        return {\\\"error\\\": \\\"Invalid JSON input\\\"\\\n          }\\n\\n    raw_date_str = str(result.get(\\\"inspection_date\\\", \\\"\\\") or \\\"\\\"\\\n          )\\n    now = datetime.now()\\n\\n    # -----------------------------------\\n\\\n          \\    # Initialize Outputs\\n    # -----------------------------------\\n \\\n          \\   scope = \\\"LATEST\\\"\\n    formatted_date = \\\"\\\"\\n    start_date = \\\"\\\"\\\n          \\n    end_date = \\\"\\\"\\n    discrete_dates = []\\n\\n    collected_years =\\\n          \\ []\\n    collected_months = []\\n    collected_ranges = []\\n\\n# =====================================================\\n\\\n          # 1. RELATIVE DATE DETECTION (Highest Priority)\\n# =====================================================\\n\\\n          \\n    relative_year = None\\n    relative_month_offset = None\\n    \\n   \\\n          \\ # ------------------------\\n    # Year Keywords\\n    # ------------------------\\n\\\n          \\    \\n    if \\\"\u4eca\u5e74\\\" in raw_date_str:\\n        relative_year = now.year\\n\\\n          \\    \\n    elif \\\"\u6628\u5e74\\\" in raw_date_str or \\\"\u53bb\u5e74\\\" in raw_date_str:\\n    \\\n          \\    relative_year = now.year - 1\\n    \\n    elif \\\"\u4e00\u6628\u5e74\\\" in raw_date_str:\\n\\\n          \\        relative_year = now.year - 2\\n    \\n    \\n    # ------------------------\\n\\\n          \\    # X\u5e74\u524d  (e.g., 3\u5e74\u524d)\\n    # ------------------------\\n    \\n    year_ago_match\\\n          \\ = re.search(r\\\"(\\\\d+)\u5e74\u524d\\\", raw_date_str)\\n    if year_ago_match:\\n   \\\n          \\     years_ago = int(year_ago_match.group(1))\\n        relative_year =\\\n          \\ now.year - years_ago\\n    \\n    \\n    # ------------------------\\n   \\\n          \\ # Month Keywords\\n    # ------------------------\\n    \\n    if \\\"\u4eca\u6708\\\"\\\n          \\ in raw_date_str:\\n        relative_month_offset = 0\\n    \\n    elif \\\"\\\n          \u5148\u6708\\\" in raw_date_str:\\n        relative_month_offset = -1\\n    \\n    elif\\\n          \\ \\\"\u5148\u3005\u6708\\\" in raw_date_str:\\n        relative_month_offset = -2\\n    \\n \\\n          \\   elif \\\"\u518d\u6765\u6708\\\" in raw_date_str:\\n        relative_month_offset = 1\\n \\\n          \\   \\n    \\n    # ------------------------\\n    # X\u30f6\u6708\u524d (e.g., 3\u30f6\u6708\u524d)\\n  \\\n          \\  # ------------------------\\n    \\n    months_ago_match = re.search(r\\\"\\\n          (\\\\d+)(?:\u30f6\u6708|\u304b\u6708|\u30ab\u6708)\u524d\\\", raw_date_str)\\n    if months_ago_match:\\n       \\\n          \\ relative_month_offset = -int(months_ago_match.group(1))\\n    \\n    \\n\\\n          \\    # =====================================================\\n    # APPLY\\\n          \\ RELATIVE CALCULATION\\n    # =====================================================\\n\\\n          \\    \\n    # If month offset exists \u2192 calculate full year/month properly\\n\\\n          \\    if relative_month_offset is not None:\\n\\n        total_months = now.year\\\n          \\ * 12 + (now.month - 1) + relative_month_offset\\n    \\n        calculated_year\\\n          \\ = total_months // 12\\n        calculated_month = total_months % 12 + 1\\n\\\n          \\    \\n        scope = \\\"MONTH\\\"\\n        formatted_date = f\\\"{calculated_month:02d}/{calculated_year}\\\"\\\n          \\n    \\n    # If relative year exists\\n    elif relative_year is not None:\\n\\\n          \\    \\n        # Check if month also specified (\u4f8b: \u53bb\u5e74\u306e11\u6708)\\n        month_match\\\n          \\ = re.search(r\\\"(\\\\d{1,2})\u6708\\\", raw_date_str)\\n    \\n        if month_match:\\n\\\n          \\            month = int(month_match.group(1))\\n            scope = \\\"MONTH\\\"\\\n          \\n            formatted_date = f\\\"{month:02d}/{relative_year}\\\"\\n      \\\n          \\  else:\\n            scope = \\\"YEAR\\\"\\n            formatted_date = str(relative_year)\\n\\\n          \\    \\n    \\n    # If detected \u2192 return immediately\\n    if scope != \\\"\\\n          LATEST\\\":\\n        result.update({\\n            \\\"formatted_date\\\": formatted_date,\\n\\\n          \\            \\\"start_date\\\": \\\"\\\",\\n            \\\"end_date\\\": \\\"\\\",\\n  \\\n          \\          \\\"date_scope\\\": scope,\\n            \\\"discrete_dates\\\": []\\n\\\n          \\        })\\n    \\n        return {\\\"result\\\": json.dumps(result, ensure_ascii=False)}\\n\\\n          \\n\\n\\n    # =====================================================\\n    #\\\n          \\ 2. YEAR RANGE\\n    # e.g., 2022\u5e74\u304b\u30892024\u5e74\u307e\u3067\\n    # =====================================================\\n\\\n          \\    for match in re.finditer(\\n        r\\\"(\\\\d{4})\u5e74?\\\\s*(?:\u304b\u3089|\u301c|\uff5e|-|\u30fc|to)\\\\\\\n          s*(\\\\d{4})\u5e74?\\\",\\n        raw_date_str\\n    ):\\n        collected_ranges.append((\\\"\\\n          YEAR_RANGE\\\",\\n                                 int(match.group(1)),\\n \\\n          \\                                int(match.group(2))))\\n\\n    # =====================================================\\n\\\n          \\    # 3. MONTH RANGE\\n    # e.g., 2024\u5e741\u6708\u304b\u30893\u6708\\n    # =====================================================\\n\\\n          \\    for match in re.finditer(\\n        r\\\"(\\\\d{4})\u5e74\\\\s*(\\\\d{1,2})\u6708\\\\s*(?:\u304b\u3089|\u301c|\uff5e|-|\u30fc|to)\\\\\\\n          s*(\\\\d{1,2})\u6708\\\",\\n        raw_date_str\\n    ):\\n        collected_ranges.append((\\\"\\\n          MONTH_RANGE\\\",\\n                                 int(match.group(1)),\\n\\\n          \\                                 int(match.group(2)),\\n               \\\n          \\                  int(match.group(3))))\\n\\n    # =====================================================\\n\\\n          \\    # 4. YEAR + MONTH\\n    # e.g., 2024\u5e743\u6708\\n    # =====================================================\\n\\\n          \\    for match in re.finditer(\\n        r\\\"(\\\\d{4})\u5e74\\\\s*(\\\\d{1,2})\u6708\\\",\\n\\\n          \\        raw_date_str\\n    ):\\n        collected_months.append(\\n      \\\n          \\      (int(match.group(1)), int(match.group(2)))\\n        )\\n\\n    # =====================================================\\n\\\n          \\    # 5. STANDALONE YEARS (NO \\\\b)\\n    # =====================================================\\n\\\n          \\    for match in re.finditer(r\\\"(\\\\d{4})\u5e74?\\\", raw_date_str):\\n        collected_years.append(int(match.group(1)))\\n\\\n          \\n    # Remove duplicate years caused by month captures\\n    if collected_months:\\n\\\n          \\        years_from_months = [y for y, _ in collected_months]\\n        collected_years\\\n          \\ = [y for y in collected_years if y not in years_from_months]\\n\\n    #\\\n          \\ Remove duplicate years\\n    collected_years = list(set(collected_years))\\n\\\n          \\n    # =====================================================\\n    # DECISION\\\n          \\ LOGIC\\n    # =====================================================\\n\\n\\\n          \\    # ---- RANGE has priority over MULTI ----\\n    if collected_ranges:\\n\\\n          \\n        r = collected_ranges[0]\\n\\n        if r[0] == \\\"YEAR_RANGE\\\":\\n\\\n          \\            scope = \\\"RANGE\\\"\\n            start_date = str(r[1])\\n   \\\n          \\         end_date = str(r[2])\\n\\n        elif r[0] == \\\"MONTH_RANGE\\\":\\n\\\n          \\            scope = \\\"RANGE\\\"\\n            year = r[1]\\n            start_date\\\n          \\ = f\\\"{r[2]:02d}/{year}\\\"\\n            end_date = f\\\"{r[3]:02d}/{year}\\\"\\\n          \\n\\n    # ---- MULTIPLE MONTHS (Exact) ----\\n    elif len(collected_months)\\\n          \\ > 1:\\n        scope = \\\"MULTI\\\"\\n        discrete_dates = [\\n        \\\n          \\    f\\\"{m:02d}/{y}\\\" for y, m in collected_months\\n        ]\\n\\n    # ----\\\n          \\ SINGLE MONTH ----\\n    elif len(collected_months) == 1:\\n        scope\\\n          \\ = \\\"MONTH\\\"\\n        y, m = collected_months[0]\\n        formatted_date\\\n          \\ = f\\\"{m:02d}/{y}\\\"\\n\\n    # ---- MULTIPLE YEARS (Exact) ----\\n    elif\\\n          \\ len(collected_years) > 1:\\n        scope = \\\"MULTI\\\"\\n        discrete_dates\\\n          \\ = sorted([str(y) for y in collected_years])\\n\\n    # ---- SINGLE YEAR\\\n          \\ ----\\n    elif len(collected_years) == 1:\\n        scope = \\\"YEAR\\\"\\n\\\n          \\        formatted_date = str(collected_years[0])\\n\\n    # ---- NO DATE\\\n          \\ \u2192 LATEST ----\\n    else:\\n        scope = \\\"LATEST\\\"\\n\\n    # =====================================================\\n\\\n          \\    # FINAL OUTPUT\\n    # =====================================================\\n\\\n          \\n    result.update({\\n        \\\"formatted_date\\\": formatted_date,\\n   \\\n          \\     \\\"start_date\\\": start_date,\\n        \\\"end_date\\\": end_date,\\n   \\\n          \\     \\\"date_scope\\\": scope,\\n        \\\"discrete_dates\\\": discrete_dates\\n\\\n          \\    })\\n\\n    return {\\\"result\\\": json.dumps(result, ensure_ascii=False)}\"\n        code_language: python3\n        desc: This node parses a free-text inspection date input and normalizes it\n          into a structured format, identifying whether it represents a specific month,\n          year, date range, latest, or a relative time period, and outputs standardized\n          date fields and scope.\n        outputs:\n          result:\n            children: null\n            type: string\n        selected: false\n        title: Inspection Date Extractor\n        type: code\n        variables:\n        - value_selector:\n          - '1768211570966'\n          - text\n          value_type: string\n          variable: input_json\n      height: 177\n      id: '1768387673605'\n      position:\n        x: 3273.3733639099396\n        y: 478.6459266418225\n      positionAbsolute:\n        x: 3273.3733639099396\n        y: 478.6459266418225\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    -