ted_context, list):\\n        for item in aggregated_context:\\n\\\n          \\            if isinstance(item, dict) and \\\"content\\\" in item and isinstance(item[\\\"\\\n          content\\\"], str):\\n                records.append(item[\\\"content\\\"])\\n \\\n          \\   elif isinstance(aggregated_context, dict) and \\\"content\\\" in aggregated_context:\\n\\\n          \\        records.append(aggregated_context[\\\"content\\\"])\\n    elif isinstance(aggregated_context,\\\n          \\ str):\\n        records.append(aggregated_context)\\n\\n    gms_records_strings\\\n          \\ = [\\n        json.dumps(parse_content_to_dict(record), ensure_ascii=False)\\n\\\n          \\        for record in records\\n    ]\\n\\n    return {\\n        \\\"gms_records\\\"\\\n          : gms_records_strings\\n    }\"\n        code_language: python3\n        desc: This node uses regex to extract key-value pairs from the text and converts\n          them into two JSON arrays, providing structured GMS Schedule and Customer\n          Data for further processing.\n        outputs:\n          gms_records:\n            children: null\n            type: array[string]\n        selected: false\n        title: Button1 Structured Context Extractor\n        type: code\n        variables:\n        - value_selector:\n          - '1762426287743'\n          - result\n          value_type: array[object]\n          variable: aggregated_context\n      height: 145\n      id: '1764074257669'\n      position:\n        x: 3019.4074970522247\n        y: -247.65507049316352\n      positionAbsolute:\n        x: 3019.4074970522247\n        y: -247.65507049316352\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\nfrom datetime import datetime\\n\\n# --- Utility Functions\\\n          \\ ---\\n\\ndef format_work_date(date_str):\\n    if not date_str:\\n       \\\n          \\ return \\\"N/A\\\"\\n    try:\\n        dt = datetime.strptime(date_str, \\\"\\\n          %m/%d/%Y\\\")\\n        return dt.strftime(\\\"%B %d, %Y (%A)\\\")\\n    except:\\n\\\n          \\        return date_str\\n\\ndef format_time(dt_str):\\n    if not dt_str\\\n          \\ or dt_str in [\\\"N/A\\\", None, \\\"\\\"]:\\n        return \\\"N/A\\\"\\n    try:\\n\\\n          \\        if dt_str.endswith(\\\"+00\\\"):\\n            dt_str = dt_str + \\\"\\\n          :00\\\"\\n        dt_str = dt_str.replace(\\\"Z\\\", \\\"+00:00\\\")\\n        dt =\\\n          \\ datetime.fromisoformat(dt_str)\\n        try:\\n            return dt.strftime(\\\"\\\n          %-I:%M %p\\\")   # Linux/macOS\\n        except ValueError:\\n            return\\\n          \\ dt.strftime(\\\"%#I:%M %p\\\")  # Windows\\n    except:\\n        return \\\"\\\n          N/A\\\"\\n\\n# --- MAIN FUNCTION (CUSTOM TOOL SIGNATURE) ---\\n\\ndef main(building_name,\\\n          \\ gms_records, kanri_no, jigyou_cd):\\n    try:\\n        if not building_name:\\n\\\n          \\            building_name = \\\"\\\"\\n        if not gms_records:\\n       \\\n          \\     gms_records = []\\n\\n        gms = [json.loads(g) for g in gms_records]\\n\\\n          \\n        kanri_no = str(kanri_no).strip()\\n        jigyou_cd = str(jigyou_cd).strip()\\n\\\n          \\        \\n        # Mapping for Model Code to Japanese Text\\n        model_code_map\\\n          \\ = {\\n            \\\"1\\\": \\\"\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\\\",\\n            \\\"2\\\": \\\"\u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\\\",\\n\\\n          \\            \\\"3\\\": \\\"\u7a7a\u8abf\u8a2d\u5099\\\",\\n            \\\"4\\\": \\\"\u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\\\"\\n        }\\n\\\n          \\        \\n        # Get current date for comparison\\n        today = datetime.now().date()\\n\\\n          \\n        # --- Match GMS data (FILTERED BY FUTURE DATE) ---\\n        matching_gms\\\n          \\ = []\\n        for g in gms:\\n            try:\\n                # Safely\\\n          \\ handle customer number conversion\\n                g_kanri = str(int(float(g.get(\\\"\\\n          okyakusamabango\\\", 0))))\\n            except:\\n                g_kanri =\\\n          \\ \\\"\\\"\\n                \\n            is_id_match = g_kanri == kanri_no\\n\\\n          \\            is_branch_match = str(g.get(\\\"shishacode\\\", \\\"\\\")).strip()\\\n          \\ == jigyou_cd\\n            \\n            if is_id_match and is_branch_match:\\n\\\n          \\                work_date_str = g.get(\\\"scheduledworkdate\\\")\\n        \\\n          \\        if work_date_str:\\n                    try:\\n                 \\\n          \\       work_date = datetime.strptime(work_date_str, \\\"%m/%d/%Y\\\").date()\\n\\\n          \\                        if work_date >= today:\\n                      \\\n          \\      matching_gms.append(g)\\n                    except:\\n           \\\n          \\             continue\\n\\n        combined_matches = []\\n\\n        # Combine\\\n          \\ logic\\n        if building_name and matching_gms:\\n                for\\\n          \\ gm in matching_gms:\\n                    combined_matches.append({\\n \\\n          \\                       \\\"kanri_no\\\": kanri_no,\\n                      \\\n          \\  \\\"jigyou_cd\\\": jigyou_cd,\\n                        \\\"BUIL_NAME\\\": building_name,\\n\\\n          \\                        # \\\"BUIL_ADD\\\": cust.get(\\\"BUIL_ADD\\\"),\\n     \\\n          \\                   \\\"scheduledworkdate\\\": gm.get(\\\"scheduledworkdate\\\"\\\n          ),\\n                        \\\"begindatetime\\\": gm.get(\\\"begindatetime\\\"\\\n          ),\\n                        \\\"enddatetime\\\": gm.get(\\\"enddatetime\\\"),\\n\\\n          \\                        \\\"goki\\\": gm.get(\\\"goki\\\"),\\n                 \\\n          \\       \\\"modelcode\\\": str(gm.get(\\\"modelcode\\\", \\\"\\\"))\\n              \\\n          \\      })\\n        # elif building_name:\\n        #         combined_matches.append({\\n\\\n          \\        #             \\\"kanri_no\\\": kanri_no,\\n        #             \\\"\\\n          jigyou_cd\\\": jigyou_cd,\\n        #             \\\"BUIL_NAME\\\": building_name,\\n\\\n          \\        #             # \\\"BUIL_ADD\\\": cust.get(\\\"BUIL_ADD\\\"),\\n       \\\n          \\ #             \\\"scheduledworkdate\\\": None,\\n        #             \\\"begindatetime\\\"\\\n          : None,\\n        #             \\\"enddatetime\\\": None,\\n        #       \\\n          \\      \\\"goki\\\": None,\\n        #             \\\"modelcode\\\": None\\n    \\\n          \\    #         })\\n        # elif matching_gms:\\n        #     for gm in\\\n          \\ matching_gms:\\n        #         combined_matches.append({\\n        #\\\n          \\             \\\"kanri_no\\\": kanri_no,\\n        #             \\\"jigyou_cd\\\"\\\n          : jigyou_cd,\\n        #             \\\"BUIL_NAME\\\": None,\\n        #    \\\n          \\         # \\\"BUIL_ADD\\\": None,\\n        #             \\\"scheduledworkdate\\\"\\\n          : gm.get(\\\"scheduledworkdate\\\"),\\n        #             \\\"begindatetime\\\"\\\n          : gm.get(\\\"begindatetime\\\"),\\n        #             \\\"enddatetime\\\": gm.get(\\\"\\\n          enddatetime\\\"),\\n        #             \\\"goki\\\": gm.get(\\\"goki\\\"),\\n   \\\n          \\     #             \\\"modelcode\\\": str(gm.get(\\\"modelcode\\\", \\\"\\\"))\\n  \\\n          \\      #         })\\n\\n        # --- Convert to result strings and gather\\\n          \\ Equipment List ---\\n        result_strings = []\\n        equipment_list\\\n          \\ = []\\n        \\n        for item in combined_matches:\\n            s_date\\\n          \\ = item.get('scheduledworkdate')\\n            start_time = format_time(item.get('begindatetime'))\\n\\\n          \\            end_time = format_time(item.get('enddatetime'))\\n\\n       \\\n          \\     # Equipment Name Logic\\n            m_code = item.get('modelcode')\\n\\\n          \\            model_text = model_code_map.get(m_code, \\\"\\\")\\n           \\\n          \\ goki_val = item.get('goki') or \\\"\\\"\\n\\n            # Special case: Building\\\n          \\ Management Equipment (modelcode == \\\"4\\\")\\n            if m_code == \\\"\\\n          4\\\":\\n                equipment_display = \\\"\u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\\\"\\n\\n            elif\\\n          \\ model_text and goki_val:\\n                equipment_display = f\\\"{model_text}\\\n          \\ {goki_val}\u53f7\u6a5f\\\"\\n\\n            elif model_text:\\n                equipment_display\\\n          \\ = model_text\\n\\n            else:\\n                equipment_display =\\\n          \\ \\\"N/A\\\"\\n\\n\\n            # Add to consolidated equipment list if not already\\\n          \\ present\\n            if equipment_display != \\\"N/A\\\" and equipment_display\\\n          \\ not in equipment_list:\\n                equipment_list.append(equipment_display)\\n\\\n          \\n            if start_time == \\\"N/A\\\":\\n                start_time = \\\"\\\n          The inspection time has not been determined\\\"\\n            if end_time ==\\\n          \\ \\\"N/A\\\":\\n                end_time = \\\"The inspection time has not been\\\n          \\ determined\\\"\\n\\n            if not s_date:\\n                insp_date_display\\\n          \\ = \\\"No upcoming inspections scheduled.\\\"\\n            else:\\n        \\\n          \\        insp_date_display = format_work_date(s_date)\\n\\n            block\\\n          \\ = (\\n                f\\\"Branch Code: {item.get('jigyou_cd')}\\\\n\\\"\\n  \\\n          \\              f\\\"Customer Number: {item.get('kanri_no')}\\\\n\\\"\\n       \\\n          \\         f\\\"Building Name: {item.get('BUIL_NAME') or 'N/A'}\\\\n\\\"\\n    \\\n     