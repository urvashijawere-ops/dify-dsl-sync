    - data:
        code: "def main(select_language: str, selected_language: str, user_guide:\
          \ dict):\n    lang_key = \"ja\" if select_language.lower() == \"日本語\" else\
          \ \"en\"\n\n    content = user_guide.get(lang_key, user_guide[\"en\"])\n\
          \n    btn_s1 = f'1. <button type=\"button\" data-message=\"1\">{content[\"\
          btn_s1\"]}</button>'\n    btn_s2 = f'2. <button type=\"button\" data-message=\"\
          2\">{content[\"btn_s2\"]}</button>'\n\n    final_message = f\"{content['text']}\\\
          n\\n{btn_s1}&emsp;&emsp;{btn_s2}\\n\\n\"\n\n    return {\n        \"selected_language\"\
          : lang_key,\n        \"result\": content[\"result\"],\n        \"message\"\
          : final_message\n    }"
        code_language: python3
        desc: Sets the workflow language to English or Japanese, retrieves localized
          content from the user_guide, and generates a formatted message with interactive
          buttons for session selection.
        outputs:
          message:
            children: null
            type: string
          result:
            children: null
            type: string
          selected_language:
            children: null
            type: string
