    - data:
        code: "def main(select_session: str, lang: str, session_config: dict):\n \
          \   session_data = session_config.get(select_session)\n    \n    if not\
          \ session_data:\n        return {\n            \"selected_session\": select_session,\n\
          \            \"message\": \"Error: Session not found.\"\n        }\n   \
          \ \n    message = session_data.get(lang, \"Error: Language content not found.\"\
          )\n\n    return {\n        \"selected_session\": select_session,\n     \
          \   \"message\": message\n    }"
