    - data:
        code: "def main(files: list, current_step: str, lang: str, file_error_message:\
          \ dict, file_upload_success_message: dict, file_size_param: str) -> dict:\n\
          \    output = {\n        \"is_valid\": \"false\",\n        \"message\":\
          \ \"\", \n        \"is_pdf\": \"false\",\n        \"is_excel\": \"false\"\
          ,\n        \"file_id\": \"\",\n        \"file_name\": \"\",\n        \"\
          file_url\": \"\",\n        \"mime_type\": \"\",\n        \"file_size\":\
          \ 0,\n        \"step\": str(current_step)\n    }\n\n    MAX_SIZE = 10 *\
          \ 1024 * 1024  # 10MB in bytes\n\n    # --- 1. Handle the incoming file_size_param\
          \ ---\n    try:\n        previous_total_size = int(file_size_param) if file_size_param\
          \ and str(file_size_param).isdigit() else 0\n    except ValueError:\n  \
          \      previous_total_size = 0\n\n    if not files or len(files) != 1:\n\
          \        output[\"message\"] = \"Please upload exactly one file.\" if lang\
          \ == \"en\" else \"ファイルを1つだけアップロードしてください。\"\n        return output\n\n \
          \   file = files[0]\n    file_id = str(file.get(\"related_id\") or file.get(\"\
          id\") or \"\")\n    file_name = str(file.get(\"filename\") or file.get(\"\
          name\") or \"\")\n    file_url = str(file.get(\"url\") or file.get(\"remote_url\"\
          ) or \"\")\n    mime_type = str(file.get(\"mime_type\", \"\")).lower()\n\
          \    current_file_size = file.get(\"size\", 0)\n    \n    # --- 2. Calculate\
          \ New Total ---\n    new_total_size = previous_total_size + current_file_size\n\
          \    \n    ext = (file.get(\"extension\") or \"\").lower()\n    if not ext\
          \ and \".\" in file_name:\n        ext = \".\" + file_name.split(\".\")[-1].lower()\n\
          \n    if current_step not in file_error_message:\n        output[\"message\"\
          ] = f\"Invalid step: {current_step}\"\n        return output\n\n    step_rule\
          \ = file_error_message[current_step]\n    type_rule = step_rule.get(\"file_type\"\
          , {})\n    size_rule = step_rule.get(\"file_size\", {})\n    expected_type\
          \ = type_rule.get(\"type\", \"\").lower()\n    \n    # Validation Logic\n\
          \    is_pdf = (expected_type == \"pdf\" and (ext == \".pdf\" or \"pdf\"\
          \ in mime_type))\n    is_excel = (expected_type == \"excel\" and (ext in\
          \ [\".xlsx\", \".xls\"] or \"spreadsheet\" in mime_type or \"excel\" in\
          \ mime_type))\n    \n    # --- 3. Validate against the NEW total ---\n \
          \   is_size_valid = new_total_size <= MAX_SIZE\n    \n    # Success Case\n\
          \    if (is_pdf or is_excel) and is_size_valid and current_file_size > 0:\n\
          \        success_data = file_upload_success_message.get(current_step, {})\n\
          \        raw_msg = success_data.get(lang, \"Upload successful\")\n     \
          \   output[\"message\"] = raw_msg if isinstance(raw_msg, str) else str(raw_msg.get(\"\
          message\", raw_msg))\n        output[\"is_valid\"] = \"true\"\n        output[\"\
          is_pdf\"] = \"true\" if is_pdf else \"false\"\n        output[\"is_excel\"\
          ] = \"true\" if is_excel else \"false\"\n        output[\"file_id\"] = file_id\n\
          \        output[\"file_name\"] = file_name\n        output[\"file_url\"\
          ] = file_url\n        output[\"mime_type\"] = mime_type\n        output[\"\
          file_size\"] = str(new_total_size)\n        \n    # Size Error Case\n  \
          \  elif not is_size_valid:\n        error_val = size_rule.get(lang, \"Total\
          \ file size exceeds 10MB limit.\")\n        output[\"message\"] = error_val\
          \ if isinstance(error_val, str) else str(error_val.get(\"error\", error_val))\n\
          \        output[\"file_size\"] = str(previous_total_size)\n        \n  \
          \  # Type/Format or Empty File Error Case\n    else:\n        error_val\
          \ = type_rule.get(lang, \"Invalid file format.\")\n        output[\"message\"\
          ] = error_val if isinstance(error_val, str) else str(error_val.get(\"error\"\
          , error_val))\n        output[\"file_size\"] = str(previous_total_size)\n\
          \n    return output"
        code_language: python3
        desc: Performs deep validation on uploaded files by checking the count, extension,
          and mime-type against the step-specific configuration (PDF or Excel), returning
          localized success or error messages.
        outputs:
          file_id:
            children: null
            type: string
          file_name:
            children: null
            type: string
          file_size:
            children: null
            type: string
          file_url:
            children: null
            type: string
          is_excel:
            children: null
            type: string
