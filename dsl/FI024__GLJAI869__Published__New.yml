    id: a02167ad-dddf-4007-ba82-f367438eb14c
    name: user_guide
    selector:
    - conversation
    - user_guide
    value:
      en:
        btn_s1: Session 1
        btn_s2: Session 2
        result: English
        text: "Thanks for choosing your preferred language as `English`.\n\n***\n\n\
          Quick User Guide for Session 1 (**Pre-Hearing Preparation**):\n*Goal: Generate\
          \ the \"Analysis & BU Hearing questions\" (Summary, Data, & Questions).*\n\
          \n1. **Upload Documents with ease:**\n    * **BU Docs:** Current & Previous\
          \ month (Excel & PPT/PDF).\n    * **Financial Data:** Official **Hi-Tree**\
          \ export (Excel).\n    * **Reference:** Past Hearing MOM & Question List.\n\
          \n2. **Unify Currency:**\n    * Confirm the Agent's prompt to convert figures\
          \ (e.g., USD → JPY) using real-time rates.\n\n3. **Review Outputs:**\n \
          \   * **Qualitative Summary:** Summary in the required template, extracted\
          \ from the BU Documents.\n    * **Number Table:** Standardized financial\
          \ table compiled from Hi-Tree/BU performance Excel.\n    * **Draft Questions:**\
          \ Generated based on data gaps & historical patterns.\n\n***\n\nQuick User\
          \ Guide for Session 2 (**Post-Hearing Synthesis**):\n*Goal: Generate the\
          \ draft for Final Report in Minutes format (MOM).*\n\n1. **Upload Hearing\
          \ Data with BU performance inputs:**\n    * **Transcript:** Text file of\
          \ the hearing conversation.\n    * **BU Docs:** Current & Previous month\
          \ (Excel & PPT/PDF).\n    * **Financial Data:** Official **Hi-Tree** export\
          \ (Excel).\n    * **Reference:** Past Hearing MOM & Question List.\n   \
          \ * **Session 1 Outputs:** The Questions, Number Table, & Summary generated\
          \ previously.\n\n2. **Synthesize:**\n    * Agent extracts **Spoken Commitments**,\
          \ **Future Actions**, and **Verbal Clarifications**.\n\n3. **Finalize Report:**\n\
          \    * Review the **Final Report Draft** which merges financial tables with\
          \ transcript insights.\n    * Use the chat to request specific text edits\
          \ before closure.\n\n***\n\n**Now, please choose the session from where\
          \ you want to start with.**"
      ja:
        btn_s1: セッション 1
        btn_s2: セッション 2
        result: Japanese
        text: "希望言語として`日本語`を選択していただき、ありがとうございます。\n\n***\n\nセッション 1 クイックユーザーガイド (**事前準備：ヒアリング前**):\n\
          *目的：分析 & BUヒアリング質問を生成する。（サマリー、データ、質問）*\n\n1. **ドキュメントのアップロード:**\n    * **BU資料:**\
          \ 当月・前月分 (Excel & PPT/PDF)。\n    * **財務データ:** **Hi-Tree** エクスポート (Excel)。\n\
          \    * **参考資料:** 過去ヒアリング会議の議事録および質問リスト。\n\n2. **通貨の統一:**\n    * Agentのプロンプトを確認し、数値をリアルタイムレートで変換（例:\
          \ USD → JPY）します。\n\n3. **アウトプットの確認:**\n    * **定性サマリー:** BU資料から抽出し、特定テンプレートにまとめたサマリー。\n\
          \    * **数値表:** Hi-Tree/BU業績Excelから用意された財務表。\n    * **質問案:** データの不足や過去の履歴パターンに基づき生成。\n\
          \n***\n\nセッション 2 クイックユーザーガイド (**事後整理：ヒアリング後**):\n*目的：最終報告書（議事録形式）のドラフト版を生成する。*\n\
          \n1. **ヒアリングデータのアップロード:**\n    * **文字起こし:** ヒアリング会話のテキストファイル。\n    * **BU資料:**\
          \ 当月・前月分 (Excel & PPT/PDF)。\n    * **財務データ:** **Hi-Tree** エクスポート (Excel)。\n\
          \    * **参考資料:** 過去ヒアリングMOMおよび質問リスト。\n    * **セッション 1 のアウトプット:** 質問、数値表、サマリー。\n\
          \n2. **統合・整理:**\n    * Agentが発言内容から**口頭での約束事項、補足説明**、**今後のアクション**を抽出します。\n\
          \n3. **最終報告書の完成:**\n    * 財務表とトランスクリプトの洞察を統合した**ドラフト**を確認します。\n    * 最後に、テキスト修正がありましたらチャット機能を用いて依頼してください。\n\
          \n***\n\n**開始したいセッションを選択してください。**"
    value_type: object
