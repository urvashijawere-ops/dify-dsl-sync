9b\u3057\u3066\u304f\u3060\u3055\u3044\\\"\\n            },\\n            \\\"upload_invalid_language_message\\\"\\\n          : {\\n                \\\"en\\\": \\\"Please select language eng or jp\\\",\\n   \\\n          \\             \\\"jp\\\": \\\"\u8a00\u8a9e\u306f eng \u307e\u305f\u306f jp \u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\\\"\\n            },\\n   \\\n          \\         \\\"file_not_exist_message\\\": {\\n                \\\"en\\\": \\\"Not existed\\\"\\\n          ,\\n                \\\"jp\\\": \\\"\u63d0\u4f9b\u3055\u308c\u305fExcel\u306b\u306f\u5b58\u5728\u3057\u307e\u305b\u3093\u3067\u3057\u305f\u3002\\\"\\n            }\\n \\\n          \\       }\\n    }\"\n        code_language: python3\n        desc: ''\n        outputs:\n          static_dict:\n            children: null\n            type: object\n        selected: false\n        title: static_data_variable\n        type: code\n        variables: []\n      height: 53\n      id: '1777399453547'\n      position:\n        x: 455.2841034197422\n        y: 238.21542351903923\n      positionAbsolute:\n        x: 455.2841034197422\n        y: 238.21542351903923\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"def main(xl_file: list, lang: str, static_data: dict) -> dict:\\n  \\\n          \\  # 1. Constants & Input Normalization\\n    MAX_SIZE = 10 * 1024 * 1024\\n\\\n          \\    lang = lang.lower().strip()\\n    \\n    # Template for error responses\\\n          \\ to avoid repetition\\n    def error_res(msg, filename=None):\\n        return\\\n          \\ {\\n            \\\"valid\\\": \\\"false\\\",\\n            \\\"error\\\": msg,\\n  \\\n          \\          \\\"new_filename\\\": \\\"None\\\",\\n            \\\"file_name\\\": filename\\n\\\n          \\        }\\n\\n    # 2. Language Validation\\n    # Use 'get' to safely check\\\n          \\ if the language exists in the static_data keys\\n    if lang not in static_data.get(\\\"\\\n          upload_invalid_language_message\\\", {}):\\n        # Fallback to English for\\\n          \\ the error message itself\\n        err = static_data[\\\"upload_invalid_language_message\\\"\\\n          ].get(\\\"en\\\", \\\"Invalid Language\\\")\\n        return error_res(err)\\n\\n \\\n          \\   # 3. File Presence Check\\n    if not xl_file:\\n        return error_res(static_data[\\\"\\\n          upload_file_message\\\"][lang])\\n\\n    file_obj = xl_file[0]\\n    # Use .get()\\\n          \\ with a single fallback chain\\n    original = file_obj.get(\\\"filename\\\"\\\n          ) or file_obj.get(\\\"name\\\") or \\\"unknown.xlsx\\\"\\n    \\n    # 4. File Type\\\n          \\ Validation\\n    # Sets provide O(1) lookup time\\n    if file_obj.get(\\\"\\\n          extension\\\", \\\"\\\").lower() not in {\\\".xlsx\\\", \\\".xls\\\"}:\\n        return\\\n          \\ error_res(static_data[\\\"upload_file_type_error_message\\\"][lang], original)\\n\\\n          \\n    # 5. File Size Validation\\n    if file_obj.get(\\\"size\\\", 0) > MAX_SIZE:\\n\\\n          \\        return error_res(static_data[\\\"upload_file_size_error_message\\\"\\\n          ][lang], original)\\n\\n    \\n\\n    \\n\\n    return {\\n        \\\"valid\\\": \\\"\\\n          true\\\",\\n        \\\"error\\\": \\\"None\\\",\\n        \\n    }\"\n        code_language: python3\n        desc: ''\n        outputs:\n          error:\n            children: null\n            type: string\n          valid:\n            children: null\n            type: string\n        selected: false\n        title: File Validation\n        type: code\n        variables:\n        - value_selector:\n          - '1777378680414'\n          - file\n          value_type: array[file]\n          variable: xl_file\n        - value_selector:\n          - '1777378680414'\n          - lang\n          value_type: string\n          variable: lang\n        