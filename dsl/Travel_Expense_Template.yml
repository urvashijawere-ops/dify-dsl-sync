-------------------------\\ndef extract_metadata(text:\\\n          \\ str) -> Dict[str, str]:\\n    date_match = re.search(r\\\"([A-Z][a-z]+ \\\\\\\n          d{1,2}, \\\\d{4})\\\", text)\\n    company_match = re.search(r\\\"Company Name:\\\\\\\n          s*(.*?) \\\\|\\\", text)\\n    supplier_match = re.search(r\\\"\\\\(1\\\\) Supplier\\\n          \\ Code \\\\| (\\\\d+)\\\", text)\\n\\n    return {\\n        \\\"date\\\": date_match.group(1)\\\n          \\ if date_match else \\\"\\\",\\n        \\\"company\\\": company_match.group(1).strip()\\\n          \\ if company_match else \\\"\\\",\\n        \\\"supplier_code\\\": supplier_match.group(1)\\\n          \\ if supplier_match else \\\"\\\"\\n    }\\n\\n\\n# -----------------------------\\n\\\n          # Metadata Validation\\n# -----------------------------\\n# def validate_metadata(metadata:\\\n          \\ Dict[str, str]) -> List[str]:\\n#     errors = []\\n\\n#     if not metadata[\\\"\\\n          date\\\"]:\\n#         errors.append(\\\"Missing or invalid date\\\")\\n\\n#    \\\n          \\ if not metadata[\\\"company\\\"]:\\n#         errors.append(\\\"Missing company\\\n          \\ name\\\")\\n\\n#     if not metadata[\\\"supplier_code\\\"]:\\n#         errors.append(\\\"\\\n          Missing supplier code\\\")\\n\\n#     if metadata[\\\"supplier_code\\\"] and not\\\n          \\ re.match(r\\\"^\\\\d{11}$\\\", metadata[\\\"supplier_code\\\"]):\\n#         errors.append(\\\"\\\n          Supplier code must be 11 digits\\\")\\n\\n#     return errors\\n\\n\\n# -----------------------------\\n\\\n          # Helpers\\n# -----------------------------\\ndef clean_value(val: str) ->\\\n          \\ str:\\n    val = val.strip()\\n    return \\\"\\\" if val.lower() in [\\\"nan\\\"\\\n          , \\\"-\\\", \\\"\uff0d\\\"] else val\\n\\n\\ndef parse_allowance(val: str) -> Tuple[Optional[int],\\\n          \\ bool]:\\n    val = val.strip()\\n\\n    if val.lower() == \\\"actual expenses\\\"\\\n          :\\n        return None, True\\n\\n    if val.isdigit():\\n        return int(val),\\\n          \\ False\\n\\n    return None, False\\n\\n\\n# -----------------------------\\n\\\n          # Row Parsing\\n# -----------------------------\\ndef parse_rows(lines: List[str])\\\n          \\ -> List[Dict]:\\n    valid_categories = {\\n        \\\"No Change\\\",\\n   \\\n          \\     \\\"New Addition\\\",\\n        \\\"Deletion\\\",\\n        \\\"Daily Allowance\\\n          \\ Amount Change\\\"\\n    }\\n\\n    rows = []\\n    start_table = False\\n\\n \\\n          \\   for line in lines:\\n        if \\\"Category 1\\\" in line and \\\"Category\\\n          \\ 2\\\" in line:\\n            start_table = True\\n            continue\\n\\n\\\n          \\        if not start_table or \\\"|\\\" not in line:\\n            continue\\n\\\n          \\n        parts = [p.strip() for p in line.split(\\\"|\\\")]\\n\\n        if len(parts)\\\n          \\ < 6:\\n            continue\\n\\n        revision = parts[1].strip()\\n  \\\n          \\      class_1 = clean_value(parts[2])\\n        class_2 = clean_value(parts[3])\\n\\\n          \\        holiday = clean_value(parts[4])\\n        allowance_raw = parts[5].strip()\\n\\\n          \\n        # Skip invalid rows early\\n        if (\\n            revision\\\n          \\ not in valid_categories or\\n            revision == \\\"Revision/Abolition\\\n          \\ Category\\\" or\\n            all(x.lower() == \\\"nan\\\" for x in [class_1,\\\n          \\ class_2, holiday, allowance_raw])\\n        ):\\n            continue\\n\\n\\\n          \\        allowance_amount, is_actual = parse_allowance(allowance_raw)\\n\\n\\\n          \\        rows.append({\\n            \\\"revision_category\\\": revision,\\n \\\n          \\           \\\"class_1\\\": class_1,\\n            \\\"class_2\\\": class_2,\\n \\\n          \\           \\\"holiday_class\\\": holiday,\\n            \\\"daily_allowance_amount\\\"\\\n          : allowance_amount,\\n            \\\"is_actual_expense\\\": is_actual\\n    \\\n          \\    })\\n\\n    return rows\\n\\n\\n# -----------------------------\\n# Main\\\n          \\ Orchestrator\\n# -----------------------------\\n# \\ndef main(arg1) -> dict:\\n\\\n          \\    # Handle Doc Extractor output:\\n    # Doc Extractors often return a\\\n          \\ list of strings (one per page).\\n    # We join them with newlines to treat\\\n          \\ it as one continuous document.\\n    if isinstance(arg1, list):\\n     \\\n          \\   text = \\\"\\\\n\\\".join(map(str, arg1))\\n    elif arg1 is None:\\n      \\\n          \\  text = \\\"\\\"\\n    else:\\n        text = str(arg1)\\n\\n    if not text.strip():\\n\\\n          \\        return {\\n            \\\"result_metadata\\\": {},\\n            \\\"\\\n          result_rows\\\": [],\\n            \\\"error\\\": \\\"Input text from Doc Extractor\\\n          \\ was empty\\\"\\n        }\\n\\n    lines = text.split(\\\"\\\\n\\\")\\n\\n    metadata\\\n          \\ = extract_metadata(text)\\n    rows = parse_rows(lines)\\n\\n    if not rows:\\n\\\n          \\        return {\\n            \\\"result_metadata\\\": metadata,\\n        \\\n          \\    \\\"result_rows\\\": [],\\n            \\\"warning\\\": \\\"Metadata found, but\\\n          \\ no table rows were parsed.\\\"\\n        }\\n\\n    return {\\n        \\\"result_metadata\\\"\\\n          : metadata,\\n        \\\"result_rows\\\": rows\\n    }\"\n        code_language: python3\n        desc: ''\n        outputs:\n          result_metadata:\n            children: null\n            type: object\n          result_rows:\n            children: null\n            type: array[object]\n        selected: false\n        title: Code 4\n        type: code\n        variables:\n        - value_selector:\n          - '1777380933093'\n          - text\n          value_type: string\n          variable: arg1\n      height: 53\n      id: '1777401295388'\n      position:\n  