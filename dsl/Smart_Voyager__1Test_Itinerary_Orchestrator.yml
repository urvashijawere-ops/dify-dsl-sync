          \ in text for sig in LUNCH_SIGNALS):\n            return 'Lunch'\n     \
          \   return 'Evening'\n\n    dining = []\n    for block in culinary_data.split('\\\
          n\\n'):\n        if ',' not in block:\n            continue\n        lines\
          \   = block.strip().split('\\n')\n        name    = lines[0].replace('Establishment:',\
          \ '').strip()\n        cuisine = next((ln for ln in lines if 'cuisine' in\
          \ ln.lower()), '')\n        dining.append({\n            'name':  name,\n\
          \            'slot':  get_slot(block, name, cuisine),\n            'score':\
          \ get_suitability(block, profile),\n        })\n    dining.sort(key=lambda\
          \ x: x['score'], reverse=True)\n\n    landmarks = []\n    for block in culture_data.split('\\\
          n\\n'):\n        if ',' not in block:\n            continue\n        landmarks.append({\n\
          \            'name':  block.split('\\n')[0].replace('Landmark:', '').strip(),\n\
          \            'score': get_suitability(block, profile),\n        })\n   \
          \ landmarks.sort(key=lambda x: x['score'], reverse=True)\n\n    if not dining\
          \ and not landmarks:\n        return {\n            \"structured_schedule\"\
          : \"CRITICAL_ERROR: No data found in Knowledge Base for this destination.\
          \ Check Dataset IDs.\",\n            \"profile_used\": profile,\n      \
          \      \"city_legs\": \"[]\"\n        }\n\n    city_legs               \
          \  = build_city_legs(destination, origin, num_days)\n    day_city_map, day_transit\
          \ = build_day_city_map(city_legs, num_days, destination)\n\n    def kb_slot(primary,\
          \ city, city_country):\n        return {\"Primary\": primary, \"City\":\
          \ city, \"City_Country\": city_country}\n\n    def missing_slot(placeholder,\
          \ city, city_country, hint):\n        return {\n            \"Primary\"\
          :      placeholder,\n            \"City\":         city,\n            \"\
          City_Country\": city_country,\n            \"Note\":         \"KB_MISSING:\
          \ No data for \" + city + \". \" + hint\n        }\n\n    schedule = {}\n\
          \    l_idx    = 0\n\n    for day in range(1, num_days + 1):\n        day_key\
          \  = \"Day \" + str(day)\n        slots    = {}\n        is_arr   = (day\
          \ == 1)\n        is_dep   = (day == num_days)\n\n        city_info = day_city_map.get(day,\
          \ {\n            \"city_name\":    destination,\n            \"city_country\"\
          : destination,\n            \"is_main_dest\": True\n        })\n       \
          \ city_name     = city_info[\"city_name\"]\n        city_country  = city_info[\"\
          city_country\"]\n        is_main       = city_info[\"is_main_dest\"]\n \
          \       transit_label = day_transit.get(day, \"\")\n\n        if is_main:\n\
          \            if not (is_arr and arrival_h > 10):\n                pool =\
          \ [d for d in dining if d['slot'] == 'Breakfast']\n                slots[\"\
          Breakfast\"] = kb_slot(\n                    pool[day % len(pool)]['name']\
          \ if pool else \"Local Cafe\",\n                    city_name, city_country\n\
          \                )\n            if not (is_arr and arrival_h > 12) and landmarks:\n\
          \                slots[\"Morning\"] = kb_slot(\n                    landmarks[l_idx\
          \ % len(landmarks)]['name'],\n                    city_name, city_country\n\
          \                )\n                l_idx += 1\n            if not (is_arr\
          \ and arrival_h > 14) and not (is_dep and departure_h < 13):\n         \
          \       pool = [d for d in dining if d['slot'] == 'Lunch']\n           \
          \     slots[\"Lunch\"] = kb_slot(\n                    pool[day % len(pool)]['name']\
          \ if pool else \"Local Bistro\",\n                    city_name, city_country\n\
          \                )\n            if not (is_dep and departure_h < 16) and\
          \ landmarks:\n                slots[\"Afternoon\"] = kb_slot(\n        \
          \            landmarks[l_idx % len(landmarks)]['name'],\n              \
          \      city_name, city_country\n                )\n                l_idx\
          \ += 1\n            if not (is_arr and arrival_h > 19) and not (is_dep and\
          \ departure_h < 20):\n                pool = [d for d in dining if d['slot']\
          \ == 'Evening']\n                slots[\"Evening\"] = kb_slot(\n       \
          \             pool[day % len(pool)]['name'] if pool else \"Restaurant\"\
          ,\n                    city_name, city_country\n                )\n    \
          \    else:\n            if not (is_arr and arrival_h > 10):\n          \
          \      slots[\"Breakfast\"] = missing_slot(\n                    \"Local\
          \ Cafe\", city_name, city_country,\n                    \"Suggest a well-known\
          \ local breakfast spot.\"\n                )\n            if not (is_arr\
          \ and arrival_h > 12):\n                slots[\"Morning\"] = missing_slot(\n\
          \                    \"Iconic Landmark\", city_name, city_country,\n   \
          \                 \"Suggest a famous must-see landmark.\"\n            \
          \    )\n            if not (is_arr and arrival_h > 14) and not (is_dep and\
          \ departure_h < 13):\n                slots[\"Lunch\"] = missing_slot(\n\
          \                    \"Local Restaurant\", city_name, city_country,\n  \
          \                  \"Suggest a popular local lunch spot.\"\n           \
          \     )\n            if not (is_dep and departure_h < 16):\n           \
          \     slots[\"Afternoon\"] = missing_slot(\n                    \"Hidden\
          \ Gem\", city_name, city_country,\n                    \"Suggest a must-see\
          \ afternoon activity.\"\n                )\n            if not (is_arr and\
          \ arrival_h > 19) and not (is_dep and departure_h < 20):\n             \
          \   slots[\"Evening\"] = missing_slot(\n                    \"Local Restaurant\"\
          , city_name, city_country,\n                    \"Suggest a popular dinner\
          \ venue.\"\n                )\n\n        present_slots     = [s for s in\
          \ SLOT_ORDER if s in slots]\n        schedule[day_key] = {\n           \
          \ \"slot_order\":    present_slots,\n            \"slots\":         slots,\n\
          \            \"transit_label\": transit_label\n        }\n\n    return {\n\
          \        \"structured_schedule\": json.dumps(schedule),\n        \"profile_used\"\
          :        profile,\n        \"city_legs\":           json.dumps(city_legs)\n\
          \    }"
