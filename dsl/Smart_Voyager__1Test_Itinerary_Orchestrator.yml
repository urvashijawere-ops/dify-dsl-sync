          \n            label = f\"Flight: {leg['from']} → {leg['to']}\"\n\n     \
          \   city_country = leg[\"city_country\"] if leg[\"city_country\"] else \"\
          N/A\"\n        transit_mode = leg[\"transit_mode\"].capitalize()\n     \
          \   transit_cost = \"$0\" if leg[\"transit_cost_usd\"] == 0 else f\"${leg['transit_cost_usd']}\
          \ USD\"\n\n        legs_md += f\"\\n{emoji} **{label}**\\n\\n\"\n      \
