    - data:
        code: "import unicodedata\n\n\ndef normalize_japanese(text: str) -> str:\n\
          \    if not text:\n        return \"\"\n\n    text = unicodedata.normalize(\"\
          NFKC\", text)\n\n    result = []\n    for ch in text:\n        code = ord(ch)\n\
          \n        # hiragana range → katakana\n        if 0x3041 <= code <= 0x3096:\n\
          \            ch = chr(code + 0x60)\n\n        result.append(ch)\n\n    text\
          \ = \"\".join(result)\n\n    text = text.lower()\n\n    text = text.replace(\"\
          \ \", \"\").replace(\"　\", \"\")\n\n    return text\n\ndef main(customer_data:\
          \ list[dict], input: str) -> dict:\n    if input.startswith(\"original_input:\"\
          ):\n        input = input[15:]\n\n    normalized_input = normalize_japanese(input)\n\
          \n    kb_records = []\n    for data in customer_data:\n        content =\
          \ data.get(\"content\", \"\")\n\n        normalized_content = normalize_japanese(content)\n\
          \n        if normalized_input in normalized_content:\n            contents\
          \ = normalized_content.split(';')\n            is_deleted = False\n    \
          \        for cont in contents:\n                if not cont or ':' not in\
          \ cont:\n                    continue\n        \n                key, value\
          \ = cont.split(':', 1)\n                if key.strip() == \"sakujo_sumi_shokusei_furagu\"\
          \ and value.strip() == \"1\":\n                    is_deleted = True\n \
          \           \n            if not is_deleted:\n                kb_records.append(content)\n\
          \n    return {\n        \"result\": kb_records\n    }\n\n\n\n\n"
        code_language: python3
