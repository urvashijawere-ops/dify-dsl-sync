      width: 244
    - data:
        code: "import json\nimport re\nfrom typing import List, Dict\n\n\ndef main(llm_json:\
          \ str, inputs: list[str], only_numbers: str) -> Dict[str, List[str]]:\n\n\
          \    result_list: List[str] = []\n    seen = set()\n    \n    if only_numbers\
          \ == \"true\":\n        for input in inputs:\n            result_list.append(f\"\
          original_input:{input}\")\n            \n        return{\n            \"\
          result\": result_list\n        }\n        \n    if not llm_json:\n     \
          \   return {\"result\": []}\n\n    # Remove ```json blocks safely\n    cleaned_text\
          \ = re.sub(r\"```json\\s*|\\s*```\", \"\", llm_json).strip()\n\n    try:\n\
          \        data = json.loads(cleaned_text)\n    except Exception:\n      \
          \  return {\"result\": []}\n\n    # Ensure always list\n    if isinstance(data,\
          \ dict):\n        data = [data]\n    elif not isinstance(data, list):\n\
          \        return {\"result\": []}\n \n\n    # helper to safely add values\n\
          \    def add_value(val):\n        if val:\n            val = str(val).strip()\n\
          \            val_to_check = val\n            if val.startswith(\"original_input:\"\
          ):\n                val_to_check = val[15:]\n\n            if val_to_check\
          \ and val_to_check not in seen:\n                result_list.append(val)\n\
          \                seen.add(val_to_check)  \n\n    for item in data:\n   \
          \     if not isinstance(item, dict):\n            continue\n\n        #\
          \ original_input (start of new group)\n        original_input = str(item.get(\"\
          original_input\", \"\")).strip()\n        if original_input:\n         \
          \   marker = f\"original_input:{original_input}\"\n            if marker\
          \ not in seen:\n                add_value(marker)\n\n        # simple fields\n\
          \        for key in [\"romaji\", \"hiragana\", \"katakana\", \"standard_form\"\
          ]:\n            add_value(item.get(key))\n\n        # kanji_candidates\n\
          \        kanji_candidates = item.get(\"kanji_candidates\", [])\n       \
          \ if isinstance(kanji_candidates, list):\n            for val in kanji_candidates:\n\
          \                add_value(val)\n\n        # mixed_forms\n        mixed_forms\
          \ = item.get(\"mixed_forms\", {})\n        if isinstance(mixed_forms, dict):\n\
          \            for key in [\"kanji_katakana\", \"hiragana_katakana\", \"katakana_kanji\"\
          ]:\n                add_value(mixed_forms.get(key))\n\n        # address\n\
          \        address_list = item.get(\"address\")\n        if isinstance(address_list,\
          \ list):\n            for addr in address_list:\n                add_value(addr)\n\
          \n        # separator_variants\n        sep_variants = item.get(\"separator_variants\"\
          )\n        if isinstance(sep_variants, list):\n            for sv in sep_variants:\n\
          \                add_value(sv)\n\n    return {\"result\": result_list}"
        code_language: python3
        desc: Flattens the combinations of input into one array for the Kokyaku iteration
