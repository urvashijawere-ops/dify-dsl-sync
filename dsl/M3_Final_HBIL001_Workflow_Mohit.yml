          \    return data\n\n\ndef main(customer_data, order_data, monitoring_data):\n\
          \    result = []\n    orders = [parse_kv_string(o) for o in order_data]\n\
          \    monitorings = [parse_kv_string(m) for m in monitoring_data]\n\n   \
          \ # Group orders by customer\n    order_map = {}\n    for o in orders:\n\
          \        key = (\n            int(o.get(\"KYAKU_NO\")),\n            int(o.get(\"\
          JIGYOUSHO_KOUDO\"))\n        )\n        order_map.setdefault(key, []).append(o)\n\
          \n    # Group monitoring by customer\n    monitoring_map = {}\n    for m\
          \ in monitorings:\n        key = (\n            int(m.get(\"Customer number\"\
          )),\n            int(m.get(\"Business office\"))\n        )\n        monitoring_map.setdefault(key,\
          \ []).append(m)\n\n    # Drive from customer\n    for c in customer_data:\n\
          \        customer_no = int(c.get(\"okyaku-sama_bangou\"))\n        branch_code\
          \ = int(c.get(\"Jigyousho_koudo\"))\n\n        cust_orders = order_map.get((customer_no,\
          \ branch_code), [])\n        cust_monitorings = monitoring_map.get((customer_no,\
          \ branch_code), [])\n\n        # Case 1: monitoring exists\n        if cust_monitorings:\n\
          \            if cust_orders:\n                # Build monitoring map by\
          \ SECTION NO\n                mon_by_sei = {}\n                for m in\
          \ cust_monitorings:\n                    sei = str(m.get(\"Monitoring Section\
          \ #\", \"\")).strip()\n                    if sei:\n                   \
          \     mon_by_sei.setdefault(sei, []).append(m)\n\n                used_monitoring\
          \ = set()\n\n                # First: process all orders\n             \
          \   for o in cust_orders:\n                    sei_no = str(o.get(\"SEI_NO\"\
          , \"\")).strip()\n                    matched_monitors = mon_by_sei.get(sei_no,\
          \ [])\n\n                    if matched_monitors:\n                    \
          \    for m in matched_monitors:\n                            used_monitoring.add(id(m))\n\
          \n                            result.append({\n                        \
          \        \"CustomerNumber\": c.get(\"okyaku-sama_bangou\"),\n          \
          \                      \"BranchCode\": c.get(\"Jigyousho_koudo\"),\n   \
          \                             \"BuildingName\": c.get(\"biru-mei\"),\n \
