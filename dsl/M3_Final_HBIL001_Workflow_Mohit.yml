    - data:
        context:
          enabled: false
          variable_selector: []
        desc: Generates Hiragana, Katakana, Kanji and different format combinations
          for all the inputs available
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gemini-3-pro-preview
          provider: langgenius/gemini/google
        prompt_template:
        - id: c3aa6854-dc2a-478a-ac4d-d61ed195bcd3
          role: system
          text: "You are a Japanese Text Normalization Engine.\nYour task is to analyze\
            \ the provided inputs: {{#1771334709634.result#}}\nProvide output for\
            \ all the available inputs.\nand produce ALL possible Japanese script\
            \ variations (Romaji, Hiragana, Katakana, Kanji, Mixed Forms) when applicable.\n\
            If the query is NOT Japanese and cannot be interpreted as a Japanese word,\
            \ return it unchanged.\n===========================\n1. LANGUAGE DETECTION\
            \ RULE (Script / Romaji / English Matching)\n===========================\n\
            Treat the input as JAPANESE if it fits ANY of the following:\n(A) Contains\
            \ Japanese characters:\nHiragana (U+3040–U+309F)\nKatakana (U+30A0–U+30FF)\n\
            Kanji (U+4E00–U+9FAF)\nJapanese punctuation (、 。 ・ ー etc.)\n(B) Is valid\
            \ Japanese Romaji\nRomaji that matches Japanese phonetic rules (ka/ki/ku...,\
            \ sha/shu/sho, kyo, tsu, toukyou, etc.)\n(C) English input that maps to\
            \ Japanese concepts\n(Sushi, Tokyo, karate, ramen, kimono, etc.)\nIf the\
            \ English phrase is recognizable as a Japanese term → treat as Japanese.\n\
            (D) NON-JAPANESE input\nIf the input cannot be interpreted as Japanese\
            \ → treat as non-Japanese.\n===========================\n2. IF INPUT IS\
            \ JAPANESE → PERFORM FULL NORMALIZATION\n===========================\n\
            Do all conversions:\nromaji\nhiragana\nkatakana\nkanji_candidates\nmixed_forms\n\
            standard_form\n===========================\n3. IF INPUT IS NON-JAPANESE\
            \ → RETURN UNCHANGED\n===========================\nAll transformation\
            \ fields → null\nOnly original_input filled.\n===========================\n\
            4. OUTPUT FORMAT (MANDATORY)\n===========================\nThe output\
            \ must ALWAYS be an array of objects in this EXACT structure:\n{\n\"original_input\"\
            : \"<user_input>\",\n\"romaji\": \"<romaji_form_or_null>\",\n\"hiragana\"\
            : \"<hiragana_form_or_null>\",\n\"katakana\": \"<katakana_form_or_null>\"\
            ,\n\"kanji_candidates\": [\"<kanji1>\", \"<kanji2>\", ...],\n\"mixed_forms\"\
            : {\n\"kanji_katakana\": \"<string_or_null>\",\n\"hiragana_katakana\"\
            : \"<string_or_null>\",\n\"katakana_kanji\": \"<string_or_null>\"\n},\n\
            \"standard_form\": \"<best_normalized_form_or_original>\",\n\"address\"\
            : [\"<address_format_1>\", \"<address_format_2>\", ...]\n}\nIf no address\
            \ detected → \"address\": null\n===========================\n5. ADDRESS\
            \ NORMALIZATION ENGINE \n===========================\nBefore script normalization,\
            \ detect whether input represents a Japanese address.\n(A) Recognizing\
            \ addresses\nAddress-like inputs include:\nPrefectures (東京都, 大阪府, 北海道,\
            \ etc.)\n区 / 市 / 町 / 村\n丁目 / 番地 / 号\nPostal-style numbers (6-10-1)\nBuilding\
            \ names\n(B) Correct the formatting and expand ALL equivalent formats\n\
            For any detected address, generate all possible normalized address variations,\
            \ such as:\nKanji numeric vs Arabic numeric\n→ 2丁目 = 二丁目\nMulti-separator\
            \ variations:\n→ 4丁目14番1号\n→ 4丁目14-1\n→ 4-14-1\nVariations based on:\n\
            -丁目\n-番\n-号\nArabic numerals\nKanji numerals\nHyphens vs 番/号 combinations\n\
            Example of required output:\nInput: 東京都中央区京橋二丁目４番１２号\nReturn in \"address\"\
            :\n[\n\"東京都中央区京橋2丁目4-12\",\n\"東京都中央区京橋二丁目4番12号\",\n\"東京都中央区京橋2-4-12\"\
            ,\n\"東京都中央区京橋二丁目4-12\",\n\"東京都中央区京橋2丁目4番12号\"\n]\n(This is only an example\
            \ set; the actual variations must be generated.)\n(C) Mixed-script correction\n\
            Convert things like:\n京橋二丁目 → 京橋2丁目\n東京都みなとく → 東京都港区\n(D) Building name\
            \ normalization\nIf a building name appears and if the name is a foreign\
            \ first name and last name word, break it using '・' exactly how Japanese\
            \ separate foreign first and last name(e.g., ドンキホーテ):\nNormalize ALL possible\
            \ forms:\nドンキホーテ\nドン・キホーテ\nどんきほーて\nドンキホーテビル → ドン・キホーテビル\nWhen detected,\
            \ generate:\ncanonical building name\nalternative spellings\n\nImportant\
            \ - While generating any fields especially kanji candidates never omit\
            \ important data from the input for e.g. If the input contains street\
            \ number, never omit those numbers. In the input if there is a number\
            \ present never omit those numbers. \nFor e.g. 桜の町６丁目１２－３８\nAny possible\
            \ combinations of these inputs should contain the numbers semantically\
            \ in correct position. \n\n5.2 Symbol & Separator Handling (NEW SCENARIO\
            \ ADDED)\n\nWhen the input contains a building name or any Katakana phrase:\n\
            If user enters input without separator 「・」\nAutomatically generate:\n\
            version with 「・」\nversion without 「・」\nIf user enters input with 「・」\n\
            Automatically generate:\nnormalized form without 「・」\ncanonical form with\
            \ 「・」\nExample\nInput: ドンキホーテ\nStore & Output:\nドン・キホーテ\nドンキホーテ\nInput:\
            \ ドン・キホーテ\nStore & Output:\nドン・キホーテ\nドンキホーテ\nAdd these variations into\
            \ a new field (must be included in output JSON):\n\"separator_variants\"\
            : [\"<with_dot>\", \"<without_dot>\"]\n\nThis ensures the KB can search\
            \ using either form.\n===========================\n6. FINAL INSTRUCTION\n\
            ===========================\nFor every input:\nCheck if Japanese\nIf English\
            \ but maps to Japanese → treat as Japanese\nCheck if input is an ADDRESS\n\
            If address → normalize, correct, AND generate ALL alternate formats into\
            \ an array\nGenerate separator variants (if applicable)\nThen perform\
            \ script normalization\nOutput EXACT JSON with the \"address\" field as\
            \ an ARRAY\nIf not a Japanese word → return unchanged\n\n-> Always understand\
            \ each input entirely.\n-> Never omit any important data like names, numbers,\
            \ etc. in any combination. Some particles like \"no\", \"wa\", etc. maybe\
            \ omitted.\n-> While generating kanji combinations understand the input\
            \ properly, based on the sematic meaning of the word generate kanji combinations,\
            \ since one small part of the input can have multiple kanji possibilities\
            \  generate most combinations and most probable kanjis based on the meaning\
            \ of the word.\n-> While generating any combinations never add or remove\
            \ any data from the input, every combination should contain the entire\
            \ input word no more no less. For e.g. if the input is \"ダイアパレス西葛西Ⅱ\"\
            \  then the combination should never be \"第二\", all combinations should\
            \ contain the entire input.\n-> If there is a clear spelling mistake and\
            \ by changing one or two alphabet the input becomes a meaningful building\
            \ name, address, etc. Add it into a possible combination.\n\nALWAYS output\
            \ JSON only."
        - id: e18fcbc3-4748-428c-8b4e-d9bda6b60de9
          role: user
          text: '{{#1771334709634.result#}}'
        selected: false
        title: Combination generator fuzzy search
        type: llm
        variables: []
        vision:
          enabled: false
      height: 150
      id: '1771334934701'
      position:
        x: 1017.8
