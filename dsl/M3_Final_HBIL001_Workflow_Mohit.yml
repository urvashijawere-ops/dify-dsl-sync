    - data:
        code: "def parse_record_to_dict(record: str) -> dict:\n    \"\"\"Convert 'k:v;k:v'\
          \ string record to dictionary\"\"\"\n    result = {}\n    fields = record.split(';')\n\
          \    for field in fields:\n        if ':' in field:\n            key, value\
          \ = field.split(':', 1)\n            result[key.strip()] = value.strip()\n\
          \    return result\n\n\ndef main(combinations: list[str], records_iteration:\
          \ list[str], and_op: str) -> dict:\n\n    records = []\n    duplicates =\
          \ set()\n\n    #Remove duplicate and deleted flagged records\n    for record\
          \ in records_iteration:\n        record_dict = parse_record_to_dict(record)\n\
          \n        cust_no = record_dict.get(\"okyaku-sama_bangou\")\n        delete_flag\
          \ = record_dict.get(\"sakujo_sumi_shokusei_furagu\")\n\n        if not cust_no:\n\
          \            continue\n\n        if cust_no in duplicates:\n           \
          \ continue\n\n        if delete_flag == \"1\":\n            continue\n\n\
          \        duplicates.add(cust_no)\n        records.append(record)\n\n   \
          \ # OR logic\n    if and_op != \"true\":\n        return {\n           \
          \ \"result\": [parse_record_to_dict(r) for r in records]\n        }\n\n\
          \    # AND logic\n    result = []\n\n    # First input combinations extraction\n\
          \    first_input_combinations = []\n    \n    first_input_combinations.append(combinations[0][15:])\n\
          \    idx = 1\n\n    while idx < len(combinations):\n        if combinations[idx].startswith(\"\
          original_input:\"):\n            combinations[idx] = combinations[idx][15:]\n\
          \            break\n        first_input_combinations.append(combinations[idx])\n\
          \        idx += 1\n\n    second_input_combinations = combinations[idx:]\n\
          \n    # filtering\n    for record in records:\n        first_contains =\
          \ any(f in record for f in first_input_combinations)\n        second_contains\
          \ = any(s in record for s in second_input_combinations)\n\n        if first_contains\
          \ and second_contains:\n            result.append(record)\n\n    return\
          \ {\n        \"result\": [parse_record_to_dict(r) for r in result]\n   \
          \ }"
