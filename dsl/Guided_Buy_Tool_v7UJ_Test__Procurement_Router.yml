app:
  description: Guided Buy Tool v2 – Procurement router with Knowledge Base, Budget
    Gate, Yes/Update pattern, and additional provider browsing.
  icon: 📦
  icon_background: '#FFF3E0'
  mode: advanced-chat
  name: Guided Buy Tool v7(UJ Test) - Procurement Router
  use_icon_as_answer_icon: true
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.4@5faf411e694e0da130a337347a625a3812b1b7502a0183382d66d92c841bf05a
kind: app
version: 0.3.1
