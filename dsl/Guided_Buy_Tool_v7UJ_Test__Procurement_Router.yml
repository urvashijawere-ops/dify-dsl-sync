    selector:
    - conversation
    - confirmation_state
    value: pending
    value_type: string
  - description: Stores extracted procurement text from uploaded file
    id: aa000001-0001-4001-a001-000000000009
    name: file_extracted_text
    selector:
    - conversation
    - file_extracted_text
    value: ''
    value_type: string
  - description: 'Tracks file upload sub-state: empty | awaiting_validation | error_retry'
    id: aa000001-0001-4001-a001-000000000010
    name: file_upload_state
    selector:
    - conversation
    - file_upload_state
    value: ''
    value_type: string
  - description: Tracks number of file uploads attempted (for retry limit enforcement)
    id: aa000001-0001-4001-a001-000000000011
    name: file_upload_count
    selector:
    - conversation
    - file_upload_count
    value: '0'
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .PDF
      - .DOCX
      - .DOC
      - .XLSX
      - .XLS
      - .CSV
      - .TXT
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      - document
      allowed_file_upload_methods:
      - local_file
      enabled: true
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 1
    opening_statement: 'Welcome to the Procurement Guided Buy Tool!

      購買ガイドツールへようこそ！


      Please choose your language / 言語を選択してください：


      Type **English** to continue in English

      「**Japanese**」と入力して日本語で続ける'
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - English
    - Japanese
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
