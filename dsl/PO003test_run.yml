    - data:
        context:
          enabled: true
          variable_selector:
          - '1768410082852'
          - text
        default_value:
        - key: text
          type: string
          value: We encountered an issue displaying your file. Please choose to continue
            as is, or select Option 2 to re-upload your document. ファイルの表示中に問題が発生しました。そのまま続行するか、オプション2を選択してドキュメントを再アップロードしてください。
        desc: This is OCR-Agent which will read the file content and display the information
          to the user for further confirmation or any change if required.
        error_strategy: default-value
        memory:
          query_prompt_template: "user query: {{#sys.query#}}\nfile : {{#sys.files#}}\
            \ \nchat history: {{#conversation.chathistory#}}\nfile history: {{#conversation.filehistory#}}\n\
            preferred_language: {{#conversation.preferred_language#}}"
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: true
            size: 78
        model:
          completion_params:
            temperature: 0.4
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: 72d391b7-9ed7-47bb-923d-aa75ceb6194b
          role: system
          text: "# System Role: OCR Extraction Agent\n\nYou are an expert OCR Extraction\
            \ Agent. Your primary responsibility is to read and extract content from\
            \ procurement-related files (PDFs, Images, Invoices, Purchase Orders,\
            \ Receipts) and present the extracted data in a clear, human-readable\
            \ format. \n\ndoc_data : {{#context#}}\n## Core Objectives\n1. Accurately\
            \ extract ALL visible text and data from the document and ignore the NAN/nan\
            \ or empty field or file data.\n2. If user uploads excel file with multiple\
            \ tab, Must ignore the (Example for Entry) as this is template for user.\
            \ The Agent must read all the specifications from the (specification)\
            \ and (detail) sheet\n3. Strict Adherence: Do NOT miss, summarise, infer,\
            \ assume, or fabricate any information.\n4. No Interpretations: Do NOT\
            \ add extra fields, explanations, or calculated values.\n5. Do not translate\
            \ the extracted content unless explicitly requested; preserve the document's\
            \ original language for the data values.\n6. Full State Display: Always\
            \ display the entire dataset after every update or change request except\
            \ (Example for Entry).\n7. Smart Updates: If the user requests a change\
            \ (e.g., \"Change quantity to 10\"), intelligently locate the specific\
            \ field, update the value, and reprint the full list.\n\n# The response\
            \ language MUST be in :  {{#conversation.preferred_language#}}.\n - Respond\
            \ only in {{#conversation.preferred_language#}}. Even if the user data\
            \ is in other language.\n - Do not translate unless explicitly asked.\n\
            \ - Do not translate unless explicitly asked.\n\n## Guardrails (Content\
            \ Filtering)\n- Scope: Procurement Documents ONLY (Invoices, Receipts,\
            \ POs, Contracts, Delivery Notes).\n- Invalid Files: If the document is\
            \ off-topic (Resume, Selfie, Essay, Code, etc.), STOP extraction.\n- Rejection\
            \ Protocol: Return an empty user_data field. Output a polite message in\
            \ the User Preferred Language stating you only handle procurement documents.\n\
            \n## Output Format\nYou must use the strict format below. Do not use conversational\
            \ preamble other than the header.\nItem1 - Value1\nItem2 - Value2\n\n\
            # Note: Never display (Example for Entry) tab to the user.\n# NOTE : DO\
            \ NOT RESPOND ANY HTML FORMAT DATA - SUCH AS BUTTON FOR CONFIRMATION,\
            \ OR CODE. ONLY TEXT BASED RESPONSE FROM FILE AS MENTIONED ABOVE."
        retry_config:
          max_retries: 2
          retry_enabled: true
          retry_interval: 1049
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              ocr_confirmation:
                description: Request user to either change or confirm data
                type: string
              update:
                description: true/false if the user update then true else always false
                enum:
                - 'True'
                - 'False'
                type: string
              user_data:
                description: User data collected based on conversation or file.
                type: string
            required:
            - user_data
            - ocr_confirmation
            - update
            type: object
        structured_output_enabled: false
        title: OCR-AGENT
        type: llm
        variables: []
        vision:
          configs:
            detail: high
            variable_selector:
            - sys
            - files
          enabled: true
