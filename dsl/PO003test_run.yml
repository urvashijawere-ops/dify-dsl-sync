app:
  description: AI powered procurement navigator to reduce manual checks while preparing
    order data
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: PO-003-test_run
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.4@5faf411e694e0da130a337347a625a3812b1b7502a0183382d66d92c841bf05a
