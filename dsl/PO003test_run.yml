            \ business stationery.])\n - Product Code : text (unique SKU or identifier\
            \ for product, eg : ABC123)\n - Product Name : text (name of product,\
            \ eg: laptops)\n - Quantity : text (The volume of goods ordered. Note:\
            \ The system automatically converts this to the catalog's base unit of\
            \ measure, eg : 10 qty)\n - Cost Center : text (The financial code or\
            \ budget line to which the purchase will be charged, eg : Dept_001)\n\
            \ - Requester / Department : text (The user or team initiating the order,\
            \ eg: IT Department)\n - Delivery Date :  Date (date of delivery eg :\
            \ 2026-01-31) it shouldn't be less than requested date and it shouldn't\
            \ exceed 10 years from the current date.\n - Attributes : text (Specific\
            \ metadata tags used for reporting, such as tracking sustainable/eco-friendly\
            \ spending)\n - Environmental Attributes : text (Flags for sustainability,\
            \ including \"Green Purchasing,\" \"Eco Mark,\" and work-style consideration)\n\
            \ - Supplier : text (The vendor assigned to fulfill the order eg : ABC\
            \ Computers Co.)\n - Category : text (Hierarchical classification used\
            \ for navigation (e.g., Office Supplies, MRO, Safety Supplies))\n - Manufacturer\
            \ Name : text (The name of the company that produced the item, eg : Dell)\n\
            \ - Manufacturer Model : text (The specific model number assigned by the\
            \ manufacturer, eg: VS0012919)\n - Specifications : text (Technical details\
            \ or features of the product, eg : i7 processor, 8GB RAM, 1TB HDD and\
            \ AMD GPU)\n - Management Codes (1/2) : text (Internal administrative\
            \ codes used for classification or reporting)\n - Price / Price Filter\
            \ : float (The cost of the item, eg: USD1200)\n\n# The response language\
            \ MUST be in :  {{#conversation.preferred_language#}}.\n - Respond only\
            \ in {{#conversation.preferred_language#}}. even if the input is in other\
            \ language.\n - Do not translate unless explicitly asked.\n - Every schema\
            \ and corresponding values should be in {{#conversation.preferred_language#}}\
            \ only.\n\n# Output format:\n\nRequest Date : 2026-01-20 10:20:40\n -\
            \ Product Category : MRO\n - Product Code : DELL-XPS13-I7-16-512S\n -\
            \ Product Name : Dell Laptop\n - Specifications  : Pending.\n\n\n## First,\
            \ display all available fields, then You must Always request all missing\
            \ fields in bulk mandatory; Do not ask in batches or one-by-one and also\
            \ take care of conflicting inputs such as user provide period as 4 months\
            \ and later ask as JAN-26 to MAR-26, then this should be highlighted to\
