  - description: ''
    id: accb0f97-553f-4c64-9257-96741766b294
    name: reupload_counter
    selector:
    - conversation
    - reupload_counter
    value: 1
    value_type: integer
  - description: ''
    id: cee1ca84-3fe6-4b24-b217-48948b1b9e7d
    name: product_name
    selector:
    - conversation
    - product_name
    value: None
    value_type: string
  - description: japanese guide
    id: 0238e914-25ea-4b6a-8640-21fbf236c32f
    name: japanese_guide
    selector:
    - conversation
    - japanese_guide
    value: 'ご希望の言語が日本語に設定されました。


      操作手順:

      1. インターフェース設定 : ご希望の言語（日本語または英語）を選択し、ローカライズされたインターフェースを初期化してください。

      2. 要件の入力: 自然言語チャットでの記述、または補足資料（PDF、Excel、スキャン画像）のアップロードにより、要件を送信してください。

      3. ルートの推奨 : ビジネスルールに基づきAIが提案する最適な調達システム（例：e-Sourcing Mall、Soft-Partner、SOCIO）を確認してください。

      4. システムの選択 : 推奨されたルートを選択、もしくは任意の別のルートを選択してください。

      5. データ補完ガイド : エージェントが初期入力の不足として特定した必須項目（コストセンターや配送詳細など）を入力してください。

      6. 検証と最終確認：最終レビューと提出を行う前に、リアルタイムで表示されるエラーフラグに対処し、データが「最初から正しく」入力されていることを確認してください


      ユーザ入力の例）：ITサービス、コンサルティング支援、オーフィス材（文房具の注文）、人材派遣、ソフトウェアの開発・保守・運用

      本日はどのようなご用件でしょうか？'
    value_type: string
  - description: english guide
    id: dca9504f-0742-4e49-bd9a-8f52aa83ea1f
    name: english_guide
    selector:
    - conversation
    - english_guide
    value: "Your preferred language is now English. \n\nOperating Procedure: \n1.\
      \ Interface Configuration: Select your preferred language (Japanese or English)\
      \ to initialize the localized interface.\n2. Requisition Input: Submit your\
      \ requirements by describing them in the natural language chat or by uploading\
      \ supporting documentation (PDF, Excel, or scanned images).\n3. Route Recommendation:\
      \ Review the AI-generated suggestion for the optimal procurement system (e.g.,\
      \ e-Sourcing Mall, Soft-Partner, or SOCIO) based on the business rules.\n4.\
      \ System Selection: Confirm the recommended route or choose any other alternative\
      \ route that is listed.\n5. Guided Data Completion: Provide any mandatory field\
      \ information (such as Cost Center or delivery details) that the agent identifies\
      \ as missing from your initial input.\n6. Validation and Finalization: Address\
      \ any real-time error flags to ensure the data is \"first-time right\" before\
      \ performing the final review and submission.\n\nExamples of User Input: IT\
      \ Services, Consulting support, Office Supplies(Ordering Stationeries) Human\
      \ Resources/Staffing, Software Development/Support/Maintenance"
    value_type: string
  - description: this will count the file and max can be 1
    id: 4842caf0-a7f0-4551-91df-643fa59efd02
    name: file_counter
    selector:
    - conversation
    - file_counter
