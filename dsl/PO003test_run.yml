    - data:
        code: "def main(query: str, files: list, is_file_available: int, is_agent:str)\
          \ -> dict:\n    # Normalize query to lowercase for easier matching\n   \
          \ q = query.lower() if query else \"\"\n    \n    # 1. File Upload Check\
          \ (Start / sys.files is not empty)\n    if q and files and len(files) >\
          \ 0:\n        return {\"result\": \"CHECK_FILES\"}\n\n    # 2. Order Confirmation:\
          \ NO\n    # Logic: isfileavailable=1 AND (English OR Japanese)\n    if is_file_available\
          \ == 1 and (\"order data confirmation: no\" in q or \"注文データ確認：いいえ\" in q):\n\
          \        return {\"result\": \"CONFIRM_NO\"}\n\n    # 3. Update / Text Order\
          \ Data\n    # Logic: Pure OR checks\n    if (\"updated order data\" in q\
          \ or \"text order data\" in q or \n        \"更新された注文データ\" in q or \"テキスト注文データ\"\
          \ in q):\n        return {\"result\": \"UPDATE_DATA\"}\n\n    # 4. Order\
          \ Confirmation: YES\n    # Logic: isfileavailable=1 AND (English OR Japanese)\n\
          \    if (is_file_available == 1 and not is_agent) and (\"order data confirmation:\
          \ yes\" in q or \"注文データ確認：はい\" in q):\n        return {\"result\": \"CONFIRM_YES\"\
          }\n\n    # 5. User Message Confirmation\n    if \"user message: yes\" in\
          \ q or \"ユーザーメッセージ: はい\" in q:\n        return {\"result\": \"CONFIRM_YES\"\
          }\n\n    # 6. Agent Active Check\n    if q and is_agent in [\"E-SOURCING-MALL\"\
          ,\"E-LINKS\", \"SOCIO\", \"JSOCIO\", \"SOFT-PARTNER\",\"ALL AVAILABLE SYSTEMS\"\
          , \"利用可能なすべてのシステム\"]:\n        return {\"result\": \"AGENT_ACTIVE\"}\n\n\
          \    # 7. Language Selection\n    # Note: 'q' is lowercase, so we must check\
          \ against lowercase strings\n    if q == \"日本語\" or q == \"english\":\n\
          \        return {\"result\": \"LANGUAGE_SELECT\"}\n    \n    # 8. System\
          \ selection : this will route to system selection node.\n    if q.upper()\
          \ in [\"E-SOURCING-MALL\",\"E-LINKS\", \"SOCIO\", \"JSOCIO\", \"SOFT-PARTNER\"\
          ,\"ALL AVAILABLE SYSTEMS\", \"利用可能なすべてのシステム\"]:\n        return {\"result\"\
          :\"proc_select\"}\n\n    # Default fallback if nothing matches\n    return\
          \ {\"result\": None}\n    "
        code_language: python3
        desc: 'This node helps to group some conditional statement (here: user input)
          to be executed together'
