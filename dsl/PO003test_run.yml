        </button>'
      general_consultant_jp: '進めてよろしいですか？   <button      data-message="ユーザーメッセージ:
        はい"      data-variant="primary"      style="background-color: #28a745; color:
        white; border-color: #28a745;">     👍 はい  </button>  <button      data-message="ユーザーメッセージ:
        いいえ、更新したいです"      data-variant="primary"      style="background-color: #dc3545;
        color: white; border-color: #dc3545;">      👎 いいえ、更新したいです </button>'
      input_data_for_order_eng: Please enter your order details below or upload a
        file. <form method="post" action="">   <textarea  name="text order data"></textarea>   <button
        type="submit">Submit</button> </form>
      input_data_for_order_jap: こちらにテキスト形式の注文データを入力してください。または、ファイルをアップロードすることもできます。  <form
        method="post" action="">   <textarea name="テキスト注文データ"></textarea>   <button
        type="submit">送信</button> </form>
      order_data_confirmation_eng: 'Is this data correct? <button data-message="Order
        Data Confirmation: YES" data-variant="primary">👍 Yes </button> <button data-message="Order
        Data Confirmation: NO" data-variant="danger">👎 NO I want to change. </button>'
      order_data_confirmation_jap: このデータは正しいですか？ <button data-message="注文データ確認：はい"
        data-variant="primary">👍 はい</button> <button data-message="注文データ確認：いいえ" data-variant="danger">👎
        いいえ、変更したいです。</button>
    value_type: object
