    - static_data
    value:
      data_confirm_message_eng: Data confirmed. Routing to the Procurement Master
        Agent...
      data_confirm_message_jap: データを確認しました。調達マスターエージェントへ連携中です...
      feedback_eng: Please provide the required information to update. <form method="post"
        action="">   <textarea  name="updated order data"></textarea>   <button type="submit">Submit</button>
        </form>
      feedback_jap: 更新に必要な情報をご提供ください <form method="post" action=""> <textarea name="更新された注文データ"></textarea>   <button
        type="submit">送信</button> </form>
      file_rec_message_eng: Documents received. Validating now, please wait…
      file_rec_message_jap: 書類を受領しました。確認中ですので、少々お待ちください
      general_consultant_eng: 'Do you want to proceed?  <button      data-message="User
        Message: YES"      data-variant="primary"      style="background-color: #28a745;
        color: white; border-color: #28a745;">     👍 Yes  </button>  <button      data-message="User
