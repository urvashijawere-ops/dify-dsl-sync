    - data:
        code: "import datetime\nimport re\n\ndef main(model_output: str, default_lang:\
          \ str = \"English\"):\n    \"\"\"\n    Dify Workflow Code Block\n    Validates\
          \ date: YYYY-MM-DD.\n    Window: [Today - 1 Year] to [Today + 1 Year].\n\
          \    \"\"\"\n    \n    # 1. Configuration & Localization\n    text_input\
          \ = model_output.strip()\n    # Normalize input: \"English\" -> \"english\"\
          , \"日本語\" stays \"日本語\"\n    lang_input = str(default_lang).strip().lower()\
          \ if default_lang else \"english\"\n    \n    # Map \"日本語\" specifically\
          \ since .lower() doesn't affect it but helps with \"Japanese\"\n    if \"\
          日本語\" in lang_input:\n        lang_key = \"ja\"\n    else:\n        lang_key\
          \ = \"en\"\n    \n    messages = {\n        \"en\": {\n            \"pass\"\
          : f\"Your entered date is : {text_input}.\\nWhat is your new supervisory\
          \ organization?\\nPlease enter your LDAP.\",\n            \"out_of_range\"\
          : \"The date must be within 1 year (past or future) from today. Please enter\
          \ a valid date.\",\n            \"invalid_date\": \"That date doesn't exist\
          \ in the calendar. Please check and try again.\"\n        },\n        \"\
          ja\": {\n            \"pass\": f\"入力された日付は {text_input} です。\\n新しい上位組織（Supervisory\
          \ Organization）は何ですか？\\nLDAPを入力してください。\",\n            \"out_of_range\"\
          : \"日付は本日より1年以内（過去または未来）で指定してください。有効な日付を入力してください。\",\n            \"invalid_date\"\
          : \"その日付はカレンダーに存在しません。確認して再度入力してください。\"\n        }\n    }\n\n    msg = messages[lang_key]\n\
          \    \n    # 2. Setup Dates\n    today = datetime.date.today() \n    date_pattern\
          \ = r\"^\\d{4}-\\d{2}-\\d{2}$\"\n    \n    # Calculate Range: -1 Year and\
          \ +1 Year\n    try:\n        one_year_future = today.replace(year=today.year\
          \ + 1)\n        one_year_past = today.replace(year=today.year - 1)\n   \
          \ except ValueError: \n        # Leap year fallback (e.g., if today is Feb\
          \ 29)\n        one_year_future = today + datetime.timedelta(days=365)\n\
          \        one_year_past = today - datetime.timedelta(days=365)\n\n    # 3.\
          \ Validation Logic\n    if re.match(date_pattern, text_input):\n       \
          \ try:\n            input_date = datetime.datetime.strptime(text_input,\
          \ \"%Y-%m-%d\").date()\n            \n            # Check Business Rule:\
          \ Today-1yr <= input_date <= Today+1yr\n            if one_year_past <=\
          \ input_date <= one_year_future:\n                return {\n           \
          \         \"state\": \"PASS\",\n                    \"date\": text_input,\n\
          \                    \"text\": msg[\"pass\"]\n                }\n      \
          \      else:\n                return {\n                    \"state\": \"\
          FAIL\",\n                    \"date\": text_input,\n                   \
          \ \"text\": msg[\"out_of_range\"]\n                }\n                \n\
          \        except ValueError:\n            return {\n                \"state\"\
          : \"FAIL\",\n                \"date\": text_input,\n                \"text\"\
          : msg[\"invalid_date\"]\n            }\n    \n    # 4. Fallback for non-date\
          \ formats\n    return {\n        \"state\": \"PENDING\",\n        \"date\"\
          : \"\",\n        \"text\": text_input\n    }"
