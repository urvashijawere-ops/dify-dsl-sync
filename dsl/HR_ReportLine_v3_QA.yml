    - data:
        code: "import re\n\ndef main(user_input: str, transferee_ids: list, language:\
          \ str):\n    # Define response templates\n    messages = {\n        'english':\
          \ {\n            'single_input': \"please enter each transferee at once\"\
          ,\n            'invalid_id': \"user id is invalid, please enter valid 8\
          \ digit ldap\",\n            'exists': \"user already existed\",\n     \
          \       'success': \"Success\"\n        },\n        'japanese': {\n    \
          \        'single_input': \"各譲受人を一度に入力してください\",\n            'invalid_id':\
          \ \"ユーザーIDが無効です。有効な8桁のLDAPを入力してください\",\n            'exists': \"ユーザーは既に存在します\"\
          ,\n            'success': \"成功\"\n        }\n    }\n\n    # Default to English\
          \ if the language is not supported\n    lang = language.lower() if language.lower()\
          \ in messages else 'english'\n    msg = messages[lang]\n\n    extracted\
          \ = re.findall(r'\\d+', user_input)\n    \n    if len(extracted) != 1:\n\
          \        return {\n            \"result\": msg['single_input'], \n     \
          \       \"id\": -1\n        }\n\n    user_id = extracted[0]\n    if len(user_id)\
          \ != 7:\n        return {\n            \"result\": msg['invalid_id'], \n\
          \            \"id\": -1\n        }\n\n    user_id_int = int(user_id)\n \
