    - data:
        code: "import datetime\nimport re\n\ndef main(model_output: str):\n    \"\"\
          \"\n    1. Checks if the input is a date (YYYY-MM-DD).\n    2. If it is\
          \ a date, validates calendar existence (leap year) and +/- 1 year range.\n\
          \    3. If it is not a date (just text), returns the text as is.\n    \"\
          \"\"\n    # Clean the input\n    text = model_output.strip()\n    \n   \
          \ # Regex to check if the string looks like YYYY-MM-DD\n    date_pattern\
          \ = r\"^\\d{4}-\\d{2}-\\d{2}$\"\n    \n    if re.match(date_pattern, text):\n\
          \        try:\n            # Validate calendar existence (e.g., handles\
          \ Feb 29)\n            input_date = datetime.datetime.strptime(text, \"\
          %Y-%m-%d\").date()\n            \n            # Reference Date (March 9,\
          \ 2026)\n            today = datetime.date(2026, 3, 9)\n            \n \
          \           # Business Rule: +/- 1 Year\n            one_year_ago = today.replace(year=today.year\
          \ - 1)\n            one_year_future = today.replace(year=today.year + 1)\n\
          \            \n            if one_year_ago <= input_date <= one_year_future:\n\
          \                return {\n                    \"status\": \"PASS\"\n  \
          \                  }\n            else:\n                return {\n    \
          \                \"status\": \"FAIL\"\n                    }\n         \
          \       \n        except ValueError:\n            # Handles non-existent\
          \ dates like 2027-02-29\n            return {\n                \"status\"\
          : \"FAIL\"\n                }\n    \n    # If it's not a date format, return\
          \ the text as it is\n    return {\n        \"status\": \"TEXT\"\n    }\n"
        code_language: python3
        desc: ''
        outputs:
          status:
            children: null
            type: string
        selected: false
        title: DATE VALIDATOR
        type: code
        variables:
        - value_selector:
          - '1773120243119'
          - text
          value_type: string
          variable: model_output
