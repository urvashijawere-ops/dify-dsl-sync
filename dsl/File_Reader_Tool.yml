    - data:
        code: "\nimport zipfile, io, base64\nimport xml.etree.ElementTree as ET\n\
          import urllib.request\n\nNS_W   = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'\n\
          NS_R   = 'http://schemas.openxmlformats.org/officeDocument/2006/relationships'\n\
          NS_A   = 'http://schemas.openxmlformats.org/drawingml/2006/main'\nNS_WP\
          \  = 'http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing'\n\
          \nMAX_CHARS      = 200_000   # text budget (~50 K tokens)\nMAX_IMAGES  \
          \   = 10        # cap to keep visual_content manageable\nMAX_IMG_B     \
          \ = 4_000_000 # skip individual images larger than 4 MB raw\nMAX_B64_BUDGET\
          \ = 250_000   # total base64 chars across ALL images\n                 \
          \          # Dify caps output variables at 320 000 chars;\n            \
          \               # 250 K leaves ~70 K for text, headers, and metadata\n\n\
          \ndef _w(tag):  return f'{{{NS_W}}}{tag}'\ndef _r(tag):  return f'{{{NS_R}}}{tag}'\n\
          def _a(tag):  return f'{{{NS_A}}}{tag}'\n\n\n# ── Text extraction ───────────────────────────────────────────────────────────\n\
          \ndef _para_text(para_el):\n    \"\"\"Collect visible text from a <w:p>,\
          \ skipping deleted runs.\"\"\"\n    parts = []\n    for run in para_el.findall(f'.//{_w(\"\
          r\")}'):\n        if run.find(f'.//{_w(\"delText\")}') is not None:\n  \
          \          continue\n        for t in run.findall(_w('t')):\n          \
          \  parts.append(t.text or '')\n    return ''.join(parts)\n\n\ndef _extract_text_and_tables(body):\n\
          \    \"\"\"\n    Walk <w:body> and return (text_lines list, tables list).\n\
          \    Preserves heading hierarchy, bullet points, and table structure.\n\
          \    \"\"\"\n    lines, tables = [], []\n\n    for elem in body:\n     \
          \   local = elem.tag.split('}')[-1] if '}' in elem.tag else elem.tag\n\n\
          \        if local == 'p':\n            pPr   = elem.find(_w('pPr'))\n  \
          \          style = ''\n            numPr = None\n            if pPr is not\
          \ None:\n                ps = pPr.find(_w('pStyle'))\n                if\
          \ ps is not None:\n                    style = ps.get(_w('val'), '') or\
          \ ''\n                numPr = pPr.find(_w('numPr'))\n\n            text\
          \ = _para_text(elem).strip()\n            if not text:\n               \
          \ continue\n\n            slo = style.lower()\n            if slo in ('heading1',\
          \ 'title') or slo == 'heading 1':\n                lines.append(f'\\n# {text}')\n\
          \            elif slo in ('heading2', 'heading 2'):\n                lines.append(f'\\\
          n## {text}')\n            elif slo in ('heading3', 'heading 3'):\n     \
          \           lines.append(f'\\n### {text}')\n            elif slo.startswith('heading'):\n\
          \                lines.append(f'\\n#### {text}')\n            elif numPr\
          \ is not None:\n                lines.append(f'  \\u2022 {text}')\n    \
          \        else:\n                lines.append(text)\n\n        elif local\
          \ == 'tbl':\n            tbl_rows = []\n            for tr in elem.findall(f'.//{_w(\"\
          tr\")}'):\n                cells = []\n                for tc in tr.findall(_w('tc')):\n\
          \                    cell_text = ' '.join(\n                        _para_text(p).strip()\n\
          \                        for p in tc.findall(_w('p'))\n                \
          \        if _para_text(p).strip()\n                    )\n             \
          \       cells.append(cell_text)\n                if any(cells):\n      \
          \              tbl_rows.append(cells)\n\n            if tbl_rows:\n    \
          \            lines.append('\\n[TABLE]')\n                for i, row in enumerate(tbl_rows):\n\
          \                    lines.append('  ' + ' | '.join(row))\n            \
          \        if i == 0:\n                        lines.append('  ' + '-' * max(40,\
          \ len(' | '.join(row))))\n                tables.append(tbl_rows)\n\n  \
          \  return lines, tables\n\n\n# ── Image extraction ─────────────────────────────────────────────────────────\n\
          \ndef _extract_images(zf, names):\n    \"\"\"\n    Extract embedded images\
          \ from DOCX.\n    Returns list of dicts: index, ext, mime, size_bytes, base64.\n\
          \    Skips vector formats (wmf/emf) and tiny placeholder images (<500 B).\n\
          \    \"\"\"\n    SUPPORTED_MIME = {\n        'png': 'image/png',  'jpg':\
          \ 'image/jpeg', 'jpeg': 'image/jpeg',\n        'gif': 'image/gif',  'bmp':\
          \ 'image/bmp',  'tiff': 'image/tiff',\n        'tif': 'image/tiff', 'webp':\
          \ 'image/webp',\n    }\n\n    # Build rid → media path from document relationships\n\
          \    rid_to_path = {}\n    rels_path = 'word/_rels/document.xml.rels'\n\
          \    if rels_path in names:\n        for rel in ET.parse(zf.open(rels_path)).getroot():\n\
          \            if 'image' in rel.get('Type', '').lower():\n              \
          \  tgt = rel.get('Target', '')\n                # Target is relative to\
          \ word/ directory\n                full = f'word/{tgt}' if not tgt.startswith('/')\
          \ else tgt.lstrip('/')\n                rid_to_path[rel.get('Id', '')] =\
          \ full\n\n    images = []\n    seen   = set()  # deduplicate by path\n\n\
          \    for rid, path in rid_to_path.items():\n        if path in seen or path\
          \ not in names:\n            continue\n        seen.add(path)\n\n      \
          \  ext  = path.rsplit('.', 1)[-1].lower() if '.' in path else ''\n     \
          \   mime = SUPPORTED_MIME.get(ext)\n        if not mime:\n            continue\
          \   # skip wmf, emf, svg, etc.\n\n        raw = zf.read(path)\n        if\
          \ len(raw) < 500:\n            continue   # skip tiny placeholder icons\n\
          \        if len(raw) > MAX_IMG_B:\n            continue   # skip very large\
          \ images to stay within context limits\n\n        images.append({\n    \
          \        'index':      len(images) + 1,\n            'ext':        ext,\n\
          \            'mime':       mime,\n            'size_bytes': len(raw),\n\
          \            'base64':     base64.b64encode(raw).decode(),\n        })\n\
          \n        if len(images) >= MAX_IMAGES:\n            break\n\n    return\
          \ images\n\n\n# ── visual_content builder ────────────────────────────────────────────────────\n\
          \ndef _build_visual_content(fname, text_lines, images):\n    \"\"\"\n  \
          \  Assemble the structured text block passed to the LLM node.\n    Mirrors\
          \ the Excel unified node's _build_visual_content pattern.\n    \"\"\"\n\
          \    SEP = '=' * 60\n    content_text = '\\n'.join(text_lines).strip()\n\
          \n    # Trim text portion to budget\n    if len(content_text) > MAX_CHARS:\n\
          \        trimmed = content_text[:MAX_CHARS]\n        last_nl = trimmed.rfind('\\\
          n')\n        if last_nl > MAX_CHARS * 0.9:\n            trimmed = trimmed[:last_nl]\n\
          \        omitted      = len(content_text) - len(trimmed)\n        content_text\
          \ = (\n            trimmed +\n            f'\\n\\n[TRUNCATED: Showing first\
          \ {len(trimmed):,} of '\n            f'{len(content_text):,} chars. {omitted:,}\
          \ chars omitted.]'\n        )\n\n    lines = [\n        f'WORD DOCUMENT:\
          \ {fname}',\n        '',\n        SEP,\n        'DOCUMENT TEXT (verbatim,\
          \ heading markers preserved):',\n        SEP,\n        content_text,\n \
          \   ]\n\n    if images:\n        lines += ['', SEP, f'EMBEDDED IMAGES ({len(images)}\
          \ found):', SEP]\n        b64_used = 0   # running total of base64 chars\
          \ emitted\n        for img in images:\n            b64      = img['base64']\n\
          \            b64_len  = len(b64)\n            lines.append(f'\\nImage {img[\"\
          index\"]}:')\n            lines.append(f'  Format     : {img[\"ext\"].upper()}')\n\
          \            lines.append(f'  MIME Type  : {img[\"mime\"]}')\n         \
          \   lines.append(f'  Size       : {img[\"size_bytes\"]:,} bytes')\n    \
          \        if b64_used + b64_len <= MAX_B64_BUDGET:\n                # Fits\
          \ within budget — include full base64\n                lines.append(f' \
          \ Base64     : {b64}')\n                b64_used += b64_len\n          \
          \  else:\n                # Would exceed budget — include metadata only\n\
          \                remaining = MAX_B64_BUDGET - b64_used\n               \
          \ lines.append(\n                    f'  Base64     : [OMITTED — this image\
          \ ({b64_len:,} chars) '\n                    f'would exceed the {MAX_B64_BUDGET:,}-char\
          \ base64 budget '\n                    f'(used so far: {b64_used:,}, remaining:\
          \ {remaining:,}). '\n                    f'Image metadata preserved but\
          \ visual analysis unavailable.]'\n                )\n\n    # ── Hard cap:\
          \ guarantee visual_content never exceeds Dify's 320 K limit ──\n    DIFY_VAR_LIMIT\
          \ = 310_000   # 10 K below Dify's 320 000-char cap\n    result = '\\n'.join(lines)\n\
          \    if len(result) > DIFY_VAR_LIMIT:\n        result = (\n            result[:DIFY_VAR_LIMIT]\
          \ +\n            f'\\n\\n[HARD CAP: visual_content truncated at {DIFY_VAR_LIMIT:,}\
          \ chars '\n            f'to stay within Dify 320,000-char variable limit.]'\n\
          \        )\n    return result\n\n\n# ── Main ──────────────────────────────────────────────────────────────────────\n\
          \ndef main(select_file) -> dict:\n    file_list = select_file if isinstance(select_file,\
          \ list) else [select_file]\n    if not file_list:\n        return {'visual_content':\
          \ '[EMPTY: No file received.]',\n                'images_found': 0, 'note':\
          \ 'No file received.'}\n\n    f        = file_list[0]\n    file_url = (f.get('url')\
          \ or f.get('remote_url') or f.get('path') or '').strip()\n    fname    =\
          \ (f.get('filename') or f.get('name') or 'document.docx').strip()\n\n  \
          \  if not file_url:\n        return {'visual_content': '[ERROR: File URL\
          \ not accessible.]',\n                'images_found': 0, 'note': 'File URL\
          \ not accessible.'}\n\n    # Fetch file bytes\n    try:\n        req = urllib.request.Request(file_url)\n\
          \        with urllib.request.urlopen(req, timeout=30) as r:\n          \
          \  file_bytes = r.read()\n    except Exception as e:\n        return {'visual_content':\
          \ f'[ERROR: Could not fetch file: {e}]',\n                'images_found':\
          \ 0, 'note': str(e)}\n\n    # Validate ZIP / detect legacy .doc\n    try:\n\
          \        zf = zipfile.ZipFile(io.BytesIO(file_bytes), 'r')\n    except zipfile.BadZipFile:\n\
          \        msg = (\n            '[DOC FORMAT NOTICE: Legacy .doc binary format\
          \ cannot be processed '\n            'directly.\\nPlease re-save as .docx\
          \ in Microsoft Word or LibreOffice '\n            '(File \\u2192 Save As\
          \ \\u2192 Word Document / .docx), then re-upload.]'\n        )\n       \
          \ return {'visual_content': msg, 'images_found': 0,\n                'note':\
          \ 'Legacy .doc — conversion required.'}\n\n    with zf:\n        names =\
          \ set(zf.namelist())\n\n        if 'word/document.xml' not in names:\n \
          \           return {'visual_content': '[ERROR: word/document.xml not found\
          \ — corrupt DOCX?]',\n                    'images_found': 0, 'note': 'word/document.xml\
          \ missing.'}\n\n        try:\n            root = ET.fromstring(zf.read('word/document.xml'))\n\
          \        except ET.ParseError as e:\n            return {'visual_content':\
          \ f'[ERROR: Failed to parse document XML: {e}]',\n                    'images_found':\
          \ 0, 'note': str(e)}\n\n        body = root.find(_w('body'))\n        if\
          \ body is None:\n            return {'visual_content': '[ERROR: No <w:body>\
          \ element found.]',\n                    'images_found': 0, 'note': 'No\
          \ body element.'}\n\n        text_lines, _ = _extract_text_and_tables(body)\n\
          \        images        = _extract_images(zf, names)\n\n    visual_content\
          \ = _build_visual_content(fname, text_lines, images)\n\n    return {\n \
          \       'visual_content': visual_content,\n        'images_found':   len(images),\n\
          \        'note': (\n            f'Extracted text + {len(images)} image(s)\
          \ from {fname}.'\n            + (f' ({MAX_IMAGES} image cap applied.)' if\
          \ len(images) == MAX_IMAGES else '')\n        ),\n    }\n"
        code_language: python3
