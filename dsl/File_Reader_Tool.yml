          \        elif pdf_raw:\n            parsed, err = parse_json(pdf_raw)\n\
          \            if err:\n                body = format_error(\n           \
          \         f\"Could not parse PDF response.\\n  {err}\\n\\n  Raw preview:\\\
          n  {pdf_raw[:400]}\"\n                )\n                success = False\n\
          \                lang    = \"\"\n            else:\n                body\
          \    = format_pdf(parsed)\n                success = True\n            \
          \    lang    = parsed.get(\"language_detected\", \"\")\n            source\
          \ = \"PDF\"\n\n        # ── OCR / Image branch ─────────────────────────────────────────\n\
          \        elif ocr_raw:\n            parsed, err = parse_json(ocr_raw)\n\
          \            if err:\n                body = format_error(\n           \
          \         f\"Could not parse OCR response.\\n  {err}\\n\\n  Raw preview:\\\
