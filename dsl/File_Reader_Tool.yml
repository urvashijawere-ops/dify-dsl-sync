    - data:
        code: "import json\n\ndef main(file_type: str = \"\") -> dict:\n    ALLOWED\
          \ = (\n        \"Supported file types and limits (max 15 MB per file):\"\
          \n        \"\\n\"\n        \"\\n  PDF          : .pdf\"\n        \"\\n \
          \ Images       : .jpg  .jpeg  .png  .gif  .webp  .bmp  .tiff  .svg\"\n \
          \       \"\\n  Excel        : .xlsx  .xls         (up to 2,000 rows/sheet\
          \ rendered)\"\n        \"\\n  Word         : .doc  .docx         (up to\
          \ 200,000 characters extracted)\"\n        \"\\n  Plain text   : .txt  .md\
          \  .rtf  .odt\"\n        \"\\n  Web / data   : .html  .htm  .csv  (up to\
          \ 200,000 characters extracted)\"\n        \"\\n\"\n        \"\\nBlocked:\
          \ .zip .rar .tar .gz .7z and all archives\"\n        \"\\nBlocked: .exe\
          \ .msi .bat .sh .ps1 .dll and all executables\"\n    )\n\n    ft = (file_type\
          \ or \"\").strip()\n\n    # size_exceeded carries payload: \"size_exceeded|type|actual_mb|limit_mb\"\
          \n    if ft.startswith(\"size_exceeded\"):\n        parts    = ft.split(\"\
          |\")\n        ftype    = parts[1] if len(parts) > 1 else \"file\"\n    \
          \    actual   = parts[2] if len(parts) > 2 else \"?\"\n        limit   \
          \ = parts[3] if len(parts) > 3 else \"?\"\n        msg = (\n           \
          \ f\"File too large: {actual} MB uploaded, maximum for {ftype} is {limit}\
          \ MB.\\n\\n\"\n            \"The Dify platform enforces a 15 MB upload limit\
          \ for all file types.\\n\\n\"\n            \"Tips to reduce file size:\\\
          n\"\n            \"  PDF     : Compress or split using any PDF editor (e.g.\
          \ ilovepdf.com).\\n\"\n            \"  Image   : Compress using TinyPNG,\
          \ Squoosh, or imagemagick.\\n\"\n            \"  Excel   : Remove unused\
          \ sheets, rows, or embedded images.\\n\"\n            \"  Word    : Remove\
          \ embedded images or split into smaller documents.\\n\"\n            \"\
          \  Document: Trim content or split into multiple files.\\n\\n\"\n      \
          \      f\"{ALLOWED}\"\n        )\n        return {\"result\": json.dumps({\n\
          \            \"source_type\": \"unknown\", \"success\": False,\n       \
          \     \"error_message\": msg, \"data\": {}\n        })}\n\n    messages\
          \ = {\n        \"empty\": (\n            \"The uploaded file is empty or\
          \ has no readable content.\\n\\n\"\n            f\"Allowed formats:\\n{ALLOWED}\"\
          \n        ),\n        \"zip_disguised\": (\n            \"File rejected.\
          \ A compressed archive was detected inside this file.\\n\\n\"\n        \
          \    \"The file content signature (magic bytes PK/Rar!/7z etc.) identifies\
          \ \"\n            \"this as a ZIP or archive file, even though it was uploaded\
          \ with a \"\n            \"different extension (.png, .jpg, .pdf, .txt etc.).\\\
          n\\n\"\n            \"Renaming a compressed file does not change its content.\
          \ \"\n            \"Please upload the original uncompressed file.\\n\\n\"\
          \n            f\"Allowed formats:\\n{ALLOWED}\"\n        ),\n        \"\
          zip_blocked\": (\n            \"Compressed and archive files are not allowed.\
          \ \"\n            \"Blocked: .zip .rar .tar .gz .7z .bz2 .xz .cab .iso and\
          \ all variants.\\n\\n\"\n            f\"Allowed formats:\\n{ALLOWED}\"\n\
          \        ),\n        \"exe_blocked\": (\n            \"Executable and script\
          \ files are not allowed. \"\n            \"Blocked: .exe .msi .bat .cmd\
          \ .sh .ps1 .vbs .app .apk \"\n            \".dll .so .class .pyc .php .rb\
          \ .pl .lnk and all others.\\n\\n\"\n            f\"Allowed formats:\\n{ALLOWED}\"\
          \n        ),\n        \"word_unsupported\": (\n            \".doc and .docx\
          \ are supported — please re-upload your file.\\n\\n\"\n            \"If\
          \ the error persists, convert to .txt or .html as a fallback:\\n\"\n   \
          \         \"  1. Save as .txt  (File > Save As > Plain Text)\\n\"\n    \
          \        \"  2. Save as .html (File > Save As > Web Page)\\n\\n\"\n    \
          \        f\"Supported document formats:\\n{ALLOWED}\"\n        ),\n    \
          \    \"unsupported\": (\n            \"Unsupported file format.\\n\\n\"\n\
          \            f\"{ALLOWED}\\n\\n\"\n            \"If your file is not listed\
          \ above, consider converting it:\\n\"\n            \"  Word processor files\
          \ (.pages, .odf, .wps) → save as .docx or .txt\\n\"\n            \"  Presentations\
          \ (.pptx, .key)               → export as PDF\\n\"\n            \"  Spreadsheets\
          \ (.ods, .numbers)             → export as .xlsx or .csv\\n\"\n        \
          \    \"  E-books (.epub, .mobi)                    → convert to .txt or\
          \ PDF\\n\"\n            \"  Data files (.json, .xml)                  →\
          \ rename to .txt\"\n        ),\n    }\n\n    msg = messages.get(ft, messages[\"\
          unsupported\"])\n    return {\"result\": json.dumps({\n        \"source_type\"\
          : \"unknown\", \"success\": False,\n        \"error_message\": msg, \"data\"\
          : {}\n    })}\n"
