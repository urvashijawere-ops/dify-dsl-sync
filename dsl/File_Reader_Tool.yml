photo/chart/logo/illustration\\\n            \\ found; [] if none\\n\\nFOR EACH IMAGE:\\n- index: 1-based integer\\n- page:\\\n            \\ page number\\n- type: photo|illustration|chart|diagram|logo|screenshot|infographic|other\\n\\\n            - caption: exact caption near image, or \\\"\\\"\\n- description: what is literally\\\n            \\ visible, 2 sentences\\n- subject: e.g. \\\"Bahubali character \u2013 Amarendra\\\n            \\ Bahubali\\\" or \\\"Bar chart \u2013 Q3 revenue\\\"\\n- identity: name, origin (film/brand/place),\\\n            \\ type (fictional_character/real_person/brand/landmark/other)\\n- insights:\\\n            \\ 3-4 sentences \u2014 character: role/actor/traits/impact; logo: founding/industry/HQ;\\\n            \\ landmark: location/history; chart: what data shows\\n- portrayed_by:\\\n            \\ actor/creator name, or \\\"\\\"\\n- text_in_image: all text visible inside\\\n            \\ the image, or \\\"\\\"\\n- sentiment: positive|negative|neutral|dramatic|inspirational|informational\\n\\\n            - tags: array of 3-5 keywords\\n\\nOUTPUT SCHEMA (no extras):\\n{\\n  \\\"source_type\\\"\\\n            : \\\"pdf\\\",\\n  \\\"language_detected\\\": \\\"en\\\",\\n  \\\"text\\\": \\\"\\\",\\n  \\\"\\\n            tables\\\": [\\n    { \\\"title\\\": \\\"\\\", \\\"headers\\\": [\\\"c1\\\",\\\"c2\\\"], \\\"rows\\\"\\\n            : [[\\\"v1\\\",\\\"v2\\\"]] }\\n  ],\\n  \\\"images\\\": [\\n    {\\n      \\\"index\\\":\\\n            \\ 1,\\n      \\\"page\\\": 1,\\n      \\\"type\\\": \\\"\\\",\\n      \\\"caption\\\": \\\"\\\n            \\\",\\n      \\\"description\\\": \\\"\\\",\\n      \\\"subject\\\": \\\"\\\",\\n      \\\"\\\n            identity\\\": { \\\"name\\\": \\\"\\\", \\\"origin\\\": \\\"\\\", \\\"type\\\": \\\"\\\" },\\n  \\\n            \\    \\\"insights\\\": \\\"\\\",\\n      \\\"portrayed_by\\\": \\\"\\\",\\n      \\\"text_in_image\\\"\\\n            : \\\"\\\",\\n      \\\"sentiment\\\": \\\"\\\",\\n     