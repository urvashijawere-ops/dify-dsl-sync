          \                lang    = \"\"\n            else:\n                body\
          \    = format_document(parsed)\n                success = True\n       \
          \         lang    = parsed.get(\"language_detected\", \"\")\n          \
          \  source = \"DOCUMENT\"\n\n        # ── Word document branch (.doc / .docx)\
          \ ────────────────────────\n        elif word_raw:\n            parsed,\
          \ err = parse_json(word_raw)\n            if err:\n                body\
          \ = format_error(\n                    f\"Could not parse Word document\
