\\       label = (\\n                        f\\\"\\\\u25b8 Image #{img.get('index','')}\\\n          \\ \\\"\\n                        f\\\"| Sheet: {img.get('sheet','')} \\\"\\n   \\\n          \\                     f\\\"| {(img.get('chart_type') or img.get('type') or\\\n          \\ '').upper()}\\\"\\n                    )\\n                    lines.append(f\\\"\\\n          \\\\n  {label}\\\")\\n                    if img.get('title'):\\n            \\\n          \\            lines.append(f\\\"    Title        : {img['title']}\\\")\\n    \\\n          \\                if img.get('description'):\\n                        lines.append(f\\\"\\\n          \\    Description  : {img['description']}\\\")\\n                    if img.get('data_summary'):\\n\\\n          \\                        lines.append(f\\\"    Data Insight : {img['data_summary']}\\\"\\\n          )\\n                    axes = img.get('axes') or {}\\n                  \\\n          \\  if axes.get('x_label') or axes.get('y_label'):\\n                    \\\n          \\    lines.append(f\\\"    Axes         : X={axes.get('x_label','')}  Y={axes.get('y_label','')}\\\"\\\n          )\\n                    series = img.get('series') or []\\n              \\\n          \\      if series:\\n                        lines.append(f\\\"    Series  \\\n          \\     : {', '.join(str(s) for s in series)}\\\")\\n                    if img.get('sentiment'):\\n\\\n          \\                        lines.append(f\\\"    Sentiment    : {img['sentiment']}\\\"\\\n          )\\n                    tags = img.get('tags') or []\\n                  \\\n          \\  if tags:\\n                        lines.append(f\\\"    Tags         :\\\n          \\ {', '.join(str(t) for t in tags)}\\\")\\n    return \\\"\\\\n\\\".join(lines)\\n\\\n          \\n\\ndef format_document(data):\\n    lines = []\\n    doc_type   = (data.get(\\\"\\\n          doc_type\\\")   or \\\"\\\").upper()\\n    word_count = data.get(\\\"w