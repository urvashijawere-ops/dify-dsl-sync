   lines.append(section(\\\"EXTRACTED TEXT\\\"\\\n          ))\\n    text = (data.get(\\\"text\\\") or \\\"\\\").strip()\\n    lines.append(text\\\n          \\ if text else \\\"  (no text found)\\\")\\n    tables = data.get(\\\"tables\\\"\\\n          ) or []\\n    lines.append(section(f\\\"TABLES  ({len(tables)} found)\\\"))\\n\\\n          \\    if not tables:\\n        lines.append(\\\"  (no tables found)\\\")\\n   \\\n          \\ else:\\n        for i, t in enumerate(tables, 1):\\n            lines.append(f\\\"\\\n          \\\\n  [Table {i}]\\\")\\n            lines.append(fmt_table(t))\\n    images\\\n          \\ = data.get(\\\"images\\\") or []\\n    lines.append(section(f\\\"IMAGES IN DOCUMENT\\\n          \\  ({len(images)} found)\\\"))\\n    if not images:\\n        lines.append(\\\"\\\n          \\  (no images found)\\\")\\n    else:\\n        for img in images:\\n       \\\n          \\     label = (\\n                f\\\"\\\\u25b8 Image #{img.get('index','')}\\\n          \\ \\\"\\n                f\\\"| {img.get('type','').upper()}\\\"\\n            )\\n\\\n          \\            lines.extend(render_image_entry(img, label))\\n    return \\\"\\\n          \\\\n\\\".join(lines)\\n\\n\\ndef format_error(msg):\\n    lines = [section(\\\"ERROR\\\"\\\n          )]\\n    lines.append(f\\\"  {msg}\\\")\\n    return \\\"\\\\n\\\".join(lines)\\n\\ndef\\\n          \\ main(\\n    pdf_raw:          str = \\\"\\\",\\n    ocr_raw:          str =\\\n          \\ \\\"\\\",\\n    excel_text                = \\\"\\\",\\n    excel_vision_raw: str\\\n          \\ = \\\"\\\",\\n    doc_raw:          str = \\\"\\\",\\n    word_raw:         str\\\n          \\ = \\\"\\\",\\n    error_raw:        str = \\\"\\\"\\n) -> dict:\\n\\n    pdf_raw \\\n          \\         = (pdf_raw          or \\\"\\\").strip()\\n    ocr_raw          = (ocr_raw\\\n          \\          or \\\"\\\").strip()\\n    excel_vision_raw = (excel_vision_raw or\\\n          \\ \\\"\\\").strip()\\n    error_raw        = (error_raw        or \\\"\\\").strip()\\n\\\n          \\    doc_raw          = (doc_raw          or \\\"\\\").strip()\\n    word_raw\\\n          \\         = (word_raw         or \\\"\\\").strip()\\n\\n    # excel_text may arrive\\\n          \\ as list from Document Extractor\\n    if isinstance(excel_text, list):\\n\\\n          \\        excel_text = \\\"\\\\n\\\".join(str(i) for i in excel_text if i)\\n  \\\n          \\  excel_text = str(excel_text or \\\"\\\").strip()\\n\\n    DIV = \\\"=\\\" * 60\\n\\\n          \\n    try:\\n        # \u2500\u2500 Error branch \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\\n\\\n          \\        if error_raw:\\n            parsed, _ = parse_json(error_raw)\\n\\\n          \\            msg     = parsed.get(\\\"error_message\\\", error_raw) or error_raw\\n\\\n          \\            body    = format_error(msg)\\n            source  = \\\"ERROR\\\"\\\n          \\n            lang    = \\\"\\\"\\n            success = False\\n\\n        # \u2500\u2500\\\n          \\ Excel branch \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\\n       \\\n          \\ elif excel_text:\\n            body    = format_excel(excel_text, excel_vision_raw)\\n\\\n          \\            source  = \\\"EXCEL\\\"\\n            parsed, _ = parse_json(excel_text)\\n\\\n          \\            success = parsed.get(\\\"success\\\", True)\\n            lang \\\n          \\   = \\\"\\\"\\n\\n        # \u2500\u2500 PDF branch \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\