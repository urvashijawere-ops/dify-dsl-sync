    - data:
        code: "import json\n\nMAX_CHARS = 200_000  # ~50K tokens — well within Gemini\
          \ 2.5 Pro context\n\ndef main(raw_text=\"\") -> dict:\n    # Document Extractor\
          \ outputs array[string] — join to single string\n    if isinstance(raw_text,\
          \ list):\n        raw_text = \"\\n\".join(str(i) for i in raw_text if i)\n\
          \n    content = str(raw_text or \"\").strip()\n\n    if not content:\n \
          \       content = \"[EMPTY: No readable text could be extracted from this\
          \ file.]\"\n        return {\"content\": content}\n\n    total_chars = len(content)\n\
          \n    if total_chars > MAX_CHARS:\n        # Trim to limit, try to cut at\
          \ a clean line boundary\n        trimmed = content[:MAX_CHARS]\n       \
          \ last_nl = trimmed.rfind(\"\\n\")\n        if last_nl > MAX_CHARS * 0.9:\
          \   # only snap to line if close to limit\n            trimmed = trimmed[:last_nl]\n\
          \        omitted = total_chars - len(trimmed)\n        content = (\n   \
          \         trimmed +\n            f\"\\n\\n[TRUNCATED: File too large to\
          \ process in full. \"\n            f\"Showing first {len(trimmed):,} of\
          \ {total_chars:,} characters. \"\n            f\"{omitted:,} characters\
          \ omitted. \"\n            f\"Split the file into smaller parts to process\
          \ the full content.]\"\n        )\n\n    return {\"content\": content}\n"
        code_language: python3
        desc: Normalises Document Extractor output. Joins array[string] to single
