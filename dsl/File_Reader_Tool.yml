          \ img.get(\"insights\"):\n        lines.append(\"    Insights     :\")\n\
          \        for s in img[\"insights\"].split(\". \"):\n            s = s.strip()\n\
          \            if s:\n                lines.append(f\"      \\u2022 {s}{'.'\
