        desc: 'Analyses the full Word document: text, tables, and embedded images.
          Receives visual_content (document text + image base64) from Extract Word
          Document. Uses Gemini 2.5 Pro to produce JSON matching the PDF output schema
          — with text, tables, and per-image analysis. No API key needed — uses platform-configured
          model credentials.'
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: word-llm-system-v2
          role: system
          text: You are a document extraction engine. Return ONLY JSON. No fences.
            No prose.
        - id: word-llm-user-v2
          role: user
          text: 'WORD DOCUMENT CONTENT:

            {{#context#}}


            TASK: Analyse the complete Word document above — text, tables, and every
            embedded image.

            Return 1 JSON object. No fences. No prose.


            RULES:

            - text: copy ALL document text verbatim from DOCUMENT TEXT section; do
            NOT invent

            - do NOT translate; preserve original language exactly

            - language_detected: Set "ja" ONLY if Japanese script is clearly the primary
            language. Set "en" for everything else. Never guess "ja".

            - ja accuracy: preserve 漢字 ひらがな カタカナ 句読点 exactly; never romanize

            - doc_type: report|letter|article|form|data|spreadsheet|webpage|notes|other

            - word_count: count words in the document text

            - summary: 2-3 sentences in English summarising the document

            - tables: every table found in DOCUMENT TEXT; [] if none

            - images: every image in EMBEDDED IMAGES section; [] if none found


            FOR EACH IMAGE — analyse using its Base64 field:

            - index: from image list (1-based)

            - type: photo|illustration|chart|diagram|logo|screenshot|infographic|other

            - caption: any caption or label visible near the image, or ""

            - description: what is literally visible in the image, 2 sentences

            - subject: e.g. "Bar chart — Q3 revenue" or "Logo — Acme Corp" or "Portrait
            — person in suit"

            - identity: name, origin (company/film/place), type (fictional_character|real_person|brand|landmark|other)

            - insights: 3-4 sentences — chart: what data shows and key trend; logo:
            company background; photo: context and significance

            - portrayed_by: actor/creator name if relevant, or ""

            - text_in_image: all text visible inside the image, or ""

            - sentiment: positive|negative|neutral|dramatic|inspirational|informational

            - tags: array of 3-5 keywords


