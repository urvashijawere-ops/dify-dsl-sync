 : [\\n      {\\n        \\\"index\\\": 1,\\n        \\\"type\\\": \\\"\\\",\\n       \\\n            \\ \\\"description\\\": \\\"\\\",\\n        \\\"subject\\\": \\\"\\\",\\n        \\\"identity\\\"\\\n            : { \\\"name\\\": \\\"\\\", \\\"origin\\\": \\\"\\\", \\\"type\\\": \\\"\\\" },\\n        \\\"insights\\\"\\\n            : \\\"\\\",\\n        \\\"portrayed_by\\\": \\\"\\\",\\n        \\\"sentiment\\\": \\\"\\\"\\\n            ,\\n        \\\"tags\\\": []\\n      }\\n    ]\\n  }\\n}\\n\"\n        selected: false\n        title: Process OCR\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 149\n      id: '17760073854930'\n      position:\n        x: 984\n        y: 241\n      positionAbsolute:\n        x: 984\n        y: 241\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json\\n\\ndef main(file_type: str = \\\"\\\") -> dict:\\n    ALLOWED\\\n          \\ = (\\n        \\\"Supported file types and limits (max 15 MB per file):\\\"\\\n          \\n        \\\"\\\\n\\\"\\n        \\\"\\\\n  PDF          : .pdf\\\"\\n        \\\"\\\\n \\\n          \\ Images       : .jpg  .jpeg  .png  .gif  .webp  .bmp  .tiff  .svg\\\"\\n \\\n          \\       \\\"\\\\n  Excel        : .xlsx  .xls         (up to 2,000 rows/sheet\\\n          \\ rendered)\\\"\\n        \\\"\\\\n  Word         : .doc  .docx         (up to\\\n          \\ 200,000 characters extracted)\\\"\\n        \\\"\\\\n  Plain text   : .txt  .md\\\n          \\  .rtf  .odt\\\"\\n        \\\"\\\\n  Web / data   : .html  .htm  .csv  (up to\\\n          \\ 200,000 characters extracted)\\\"\\n        \\\"\\\\n\\\"\\n        \\\"\\\\nBlocked:\\\n          \\ .zip .rar .tar .gz .7z and all archives\\\"\\n        \\\"\\\\nBlocked: .exe\\\n          \\ .msi .bat .sh .ps1 .dll and all executables\\\"\\n    )\\n\\n    ft = (file_type\\\n          \\ or \\\"\\\").strip()\\n\\n    # size_exceeded carries payload: \\\"size_exceeded|type|actual_mb|limit_mb\\\"\\\n          \\n    if ft.startswith(\\\"size_exceeded\\\"):\\n        parts    = ft.split(\\\"\\\n          |\\\")\\n        ftype    = parts[1] if len(parts) > 1 else \\\"file\\\"\\n    \\\n          \\    actual   = parts[2] if len(parts) > 2 else \\\"?\\\"\\n        limit   \\\n          \\ = parts[3] if len(parts) > 3 else \\\"?\\\"\\n        msg = (\\n           \\\n          \\ f\\\"File too large: {actual} MB uploaded, maximum for {ftype} is {limit}\\\n          \\ MB.\\\\n\\\\n\\\"\\n            \\\"The Dify platform enforces a 15 MB upload limit\\\n          \\ for all file types.\\\\n\\\\n\\\"\\n            \\\"Tips to reduce file size:\\\\\\\n          n\\\"\\n            \\\"  PDF     : Compress or split using any PDF editor (e.g.\\\n          \\ ilovepdf.com).\\\\n\\\"\\n            \\\"  Image   : Compress using TinyPNG,\\\n          \\ Squoosh, or imagemagick.\\\\n\\\"\\n            \\\"  Excel   : Remove unused\\\n          \\ sheets, rows, or embedded images.\\\\n\\\"\\n            \\\"  Word    : Remove\\\n          \\ embedded images or split into smaller documents.\\\\n\\\"\\n            \\\"\\\n          \\  Document: Trim content or split into multiple files.\\\\n\\\\n\\\"\\n      \\\n          \\      f\\\"{ALLOWED}\\\"\\n        )\\n        return {\\\"result\\\": json.dumps({\\n\\\n          \\            \\\"source_type\\\": \\\"unknown\\\", \\\"success\\\": False,\\n       \\\n          \\     \\\"error_message\\\": msg, \\\"data\\\": {}\\n        })}\\n\\n    messages\\\n          \\ = {\\n        \\\"empty\\\": (\\n            \\\"The uploaded file is empty or\\\n          \\ has no readable content.\\\\n\\\\n\\\"\\n            f\\\"Allowed formats:\\\\n{ALLOWED}\\\"\\\n          \\n        ),\\n        \\\"zip_disguised\\\": (\\n            \\\"File rejected.\\\n          \\ A compressed archive was detected inside this file.\\\\n\\\\n\\\"\\n        \\\n          \\    \\\"The file content signature (magic bytes PK/Rar!/7z etc.) identifies\\\n          \\ \\\"\\n            \\\"this as a ZIP or archive file, even though it was uploaded\\\n          \\ with a \\\"\\n            \\\"different extension (.png, .jpg, .pdf, .txt etc.).\\\\\\\n          n\\\\n\\\"\\n            \\\"Renaming a compressed file does not change its content.\\\n          \\ \\\"\\n            \\\"Please upload the original uncompressed file.\\\\n\\\\n\\\"\\\n          \\n            f\\\"Allowed formats:\\\\n{ALLOWED}\\\"\\n        ),\\n        \\\"\\\n          zip_blocked\\\": (\\n            \\\"Compressed and archive files are not allowed.\\\n          \\ \\\"\\n            \\\"Blocked: .zip .rar .tar .gz .7z .bz2 .xz .cab .iso and\\\n          \\ all variants.\\\\n\\\\n\\\"\\n            f\\\"Allowed formats:\\\\n{ALLOWED}\\\"\\n\\\n          \\        ),\\n        \\\"exe_blocked\\\": (\\n            \\\"Executable and script\\\n          \\ files are not allowed. \\\"\\n            \\\"Blocked: .exe .msi .bat .cmd\\\n          \\ .sh .ps1 .vbs .app .apk \\\"\\n            \\\".dll .so .class .pyc .php .rb\\\n          \\ .pl .lnk and all others.\\\\n\\\\n\\\"\\n            f\\\"Allowed formats:\\\\n{ALLOWED}\\\"\\\n          \\n        ),\\n        \\\"word_unsupported\\\": (\\n            \\\".doc and .docx\\\n          \\ are supported \u2014 please re-upload your file.\\\\n\\\\n\\\"\\n            \\\"If\\\n          \\ the error persists, convert to .txt or .html as a fallback:\\\\n\\\"\\n   \\\n          \\         \\\"  1. Save as .txt  (File > Save As > Plain Text)\\\\n\\\"\\n    \\\n          \\        \\\"  2. Save as .html (File > Save As > Web Page)\\\\n\\\\n\\\"\\n    \\\n          \\        f\\\"Supported document formats:\\\\n{ALLOWED}\\\"\\n        ),\\n    \\\n          \\    \\\"unsupported\\\": (\\n            \\\"Unsupported file format.\\\\n\\\\n\\\"\\n\\\n          \\            f\\\"{ALLOWED}\\\\n\\\\n\\\"\\n            \\\"If your file is not listed\\\n          \\ above, consider converting it:\\\\n\\\"\\n            \\\"  Word processor files\\\n          \\ (.pages, .odf, .wps) \u2192 save as .docx or .txt\\\\n\\\"\\n            \\\"  Presentations\\\n          \\ (.pptx, .key)               \u2192 export as PDF\\\\n\\\"\\n            \\\"  Spreadsheets\\\n          \\ (.ods, .numbers)             \u2192 export as .xlsx or .csv\\\\n\\\"\\n        \\\n          \\    \\\"  E-books (.epub, .mobi)                    \u2192 convert to .txt or\\\n          \\ PDF\\\\n\\\"\\n            \\\"  Data files (.json, .xml)                  \u2192\\\n          \\ rename to .txt\\\"\\n        ),\\n    }\\n\\n    msg = messages.get(ft, messages[\\\"\\\n          unsupported\\\"])\\n    return {\\\"result\\\": json.dumps({\\n        \\\"source_type\\\"\\\n          : \\\"unknown\\\", \\\"success\\\": False,\\n        \\\"error_message\\\": msg, \\\"data\\\"\\\n          : {}\\n    })}\\n\"\n        code_language: python3\n        desc: 'Dynamic error messages for: empty, zip_blocked, exe_blocked, unsupported.\n          Lists all allowed formats (PDF, images, Excel, TXT, DOC/DOCX, CSV, HTM/HTML).\n          Lists all blocked categories (archives, executables).'\n        outputs:\n          result:\n            children: null\n            type: string\n        selected: false\n        title: 'Error: Invalid File'\n        type: code\n        variables:\n        - value_selector:\n          - '1776006990907'\n          - result\n          value_type: string\n          variable: file_type\n      height: 161\n      id: '1776007607703'\n      position:\n        x: 997.2808261846812\n        y: 704.7419849534729\n      positionAbsolute:\n        x: 997.2808261846812\n        y: 704.7419849534729\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import json, re\\n\\ndef strip_fences(raw):\\n    return re.sub(r\\\"```[a-zA-Z]*\\\\\\\n          s*|\\\\s*```\\\", \\\"\\\", raw).strip()\\n\\ndef parse_json(raw):\\n    try:\\n   \\\n          \\     return json.loads(strip_fences(raw)), \\\"\\\"\\n    except json.JSONDecodeError\\\n          \\ as e:\\n        return {}, f\\\"JSON parse failed: {e}\\\"\\n\\ndef section(title):\\n\\\n          \\    return f\\\"\\\\n{'\u2500' * 60}\\\\n  {title}\\\\n{'\u2500' * 60}\\\"\\n\\ndef fmt_table(table):\\n\\\n          \\    headers = table.get(\\\"headers\\\") or []\\n    rows    = table.get(\\\"\\\n          rows\\\")    or []\\n    title   = (table.get(\\\"title\\\")  or \\\"\\\").strip()\\n\\\n          \\    if not headers:\\n        return \\\"  (empty table)\\\"\\n    col_w = [\\n\\\n          \\        max(len(str(h)), max((len(str(r[i])) for r in rows if i < len(r)),\\\n          \\ default=0))\\n        for i, h in enumerate(headers)\\n    ]\\n    def fmt_row(cells):\\n\\\n          \\        return \\\"| \\\" + \\\" | \\\".join(\\n            str(cells[i]).ljust(col_w[i])\\\n          \\ if i < len(cells) else \\\" \\\" * col_w[i]\\n            for i in range(len(headers))\\n\\\n          \\        ) + \\\" |\\\"\\n    sep   = \\\"+\\\" + \\\"+\\\".join(\\\"-\\\" * (w + 2) for\\\n          \\ w in col_w) + \\\"+\\\"\\n    block = []\\n    if title:\\n        block.append(f\\\"\\\n          \\  Table: {title}\\\")\\n    block += [sep, fmt_row(headers), sep]\\n    for\\\n          \\ row in rows:\\n        block.append(fmt_row(row))\\n    block.append(sep)\\n\\\n          \\    return \\\"\\\\n\\\".join(block)\\n\\ndef render_image_entry(img, idx_label):\\n\\\n          \\    lines    = []\\n    identity = img.get(\\\"identity\\\") or {}\\n    lines.append(f\\\"\\\n          \\\\n  {idx_label}\\\")\\n    if img.get(\\\"subject\\\"):        lines.append(f\\\"\\\n          \\    Subject      : {img['subject']}\\\")\\n    if img.get(\\\"description\\\"\\\n          ):    lines.append(f\\\"    Description  : {img['description']}\\\")\\n    if\\\n          \\ identity.get(\\\"name\\\"):      lines.append(f\\\"    Name         : {identity['name']}\\\"\\\n          )\\n    if identity.get(\\\"origin\\\"):    lines.append(f\\\"    Origin      \\\n          \\ : {identity['origin']}\\\")\\n    if identity.get(\\\"type\\\"):      lines.append(f\\\"\\\n          \\    Identity Type: {identity['type']}\\\")\\n    if img.get(\\\"portrayed_by\\\"\\\n          ):   lines.append(f\\\"    Portrayed By : {img['portrayed_by']}\\\")\\n    if\\\n          \\ img.get(\\\"insights\\\"):\\n        lines.append(\\\"    Insights     :\\\")\\n\\\n          \\        for s in img[\\\"insights\\\"].split(\\\". \\\"):\\n            s = s.strip()\\n\\\n          \\            if s:\\n                lines.append(f\\\"      \\\\u2022 {s}{'.'\\\n          \\ if not s.endswith('.') else ''}\\\")\\n    if img.get(\\\"caption\\\"):     \\\n          \\   lines.append(f\\\"    Caption      : {img['caption']}\\\")\\n    if img.get(\\\"\\\n          text_in_image\\\"):  lines.append(f\\\"    Text Inside  : {img['text_in_image']}\\\"\\\n          )\\n    if img.get(\\\"sentiment\\\"):      lines.append(f\\\"    Sentiment   \\\n          \\ : {img['sentiment']}\\\")\\n    tags = img.get(\\\"tags\\\") or []\\n    if tags:\\\n          \\                      lines.append(f\\\"    Tags         : {', '.join(tags)}\\\"\\\n          )\\n    return lines\\n\\ndef format_pdf(data):\\n    lines = []\\n    lines.append(section(\\\"\\\n          EXTRACTED TEXT\\\"))\\n    text = (data.get(\\\"text\\\") or \\\"\\\").strip()\\n  \\\n          \\  lines.append(text if text else \\\"  (no text found)\\\")\\n    tables = data.get(\\\"\\\n          tables\\\") or []\\n    lines.append(section(f\\\"TABLES  ({len(tables)} found)\\\"\\\n          ))\\n    if not tables:\\n        lines.append(\\\"  (no tables found)\\\")\\n\\\n          \\    else:\\n        for i, t in enumerate(tables, 1):\\n            lines.append(