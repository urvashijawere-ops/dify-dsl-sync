    nodes:
    - data:
        desc: Upload one file — PDF, image (JPG/PNG), or Excel (XLSX). ZIP not allowed.
        selected: false
        title: Start
        type: start
        variables:
        - allowed_file_extensions: []
          allowed_file_types:
          - document
          - image
          allowed_file_upload_methods:
          - local_file
          label: select_file
          max_length: 1
          options: []
          required: true
          type: file-list
          variable: select_file
      height: 149
      id: '1776006764107'
      position:
        x: 80
        y: 282
      positionAbsolute:
        x: 80
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: "import urllib.request\n\ndef main(inputs):\n    if not inputs or not\
          \ isinstance(inputs, list):\n        return {\"result\": \"empty\"}\n\n\
          \    file = inputs[0]\n    if not file:\n        return {\"result\": \"\
          empty\"}\n\n    file_name = (file.get(\"filename\") or file.get(\"name\"\
          ) or \"\").strip()\n    mime      = (file.get(\"mime_type\") or file.get(\"\
          type\") or \"\").lower().strip()\n\n    # ── VALIDATION 1: Empty file ──────────────────────────────────────\n\
          \    if not file_name:\n        return {\"result\": \"empty\"}\n\n    size\
          \ = file.get(\"size\") or file.get(\"file_size\") or 0\n    try:\n     \
          \   size = int(size)\n    except (TypeError, ValueError):\n        size\
          \ = 0\n    if size == 0 and file.get(\"size\") is not None:\n        return\
          \ {\"result\": \"empty\"}\n\n    name_lower = file_name.lower()\n\n    #\
          \ ── VALIDATION 2: Magic byte check (catches renamed ZIPs) ─────────\n \
          \   # Fetches first 16 bytes via HTTP Range header and checks file\n   \
          \ # signatures. A ZIP renamed to .png still starts with PK\\x03\\x04.\n\
          \    # XLSX/DOCX are ZIP-based office formats — intentionally exempt.\n\
          \    # Gracefully skips if network is unavailable (Dify Cloud sandbox).\n\
          \    ALLOWED_ZIP_EXT = (\n        \".xlsx\", \".xls\", \".docx\", \".doc\"\
          ,\n        \".odt\", \".pptx\", \".ppt\", \".odp\", \".ods\"\n    )\n  \
          \  if not any(name_lower.endswith(e) for e in ALLOWED_ZIP_EXT):\n      \
          \  file_url = (\n            file.get(\"url\") or file.get(\"remote_url\"\
          ) or file.get(\"path\") or \"\"\n        ).strip()\n        if file_url:\n\
          \            try:\n                req = urllib.request.Request(\n     \
          \               file_url,\n                    headers={\"Range\": \"bytes=0-15\"\
          }\n                )\n                with urllib.request.urlopen(req, timeout=5)\
          \ as resp:\n                    header = resp.read(16)\n\n             \
          \   MAGIC = [\n                    b\"PK\\x03\\x04\",          # ZIP (also\
          \ XLSX/DOCX — exempt above)\n                    b\"PK\\x05\\x06\",    \
          \      # Empty ZIP\n                    b\"PK\\x07\\x08\",          # Spanned\
          \ ZIP\n                    b\"Rar!\\x1a\\x07\",        # RAR v4\n      \
          \              b\"Rar!\\x1a\\x07\\x01\",   # RAR v5\n                  \
          \  b\"7z\\xbc\\xaf\\x27\\x1c\",# 7-Zip\n                    b\"\\x1f\\x8b\"\
          ,            # GZip\n                    b\"BZh\",                   # BZip2\n\
          \                    b\"\\xfd7zXZ\\x00\",        # XZ\n                \
          \    b\"MSCF\",                  # CAB\n                    b\"\\x04\\x22\\\
          x4d\\x18\",  # LZ4\n                    b\"\\x28\\xb5\\x2f\\xfd\",  # Zstandard\n\
          \                ]\n                for sig in MAGIC:\n                \
          \    if header[:len(sig)] == sig:\n                        return {\"result\"\
          : \"zip_blocked\"}\n            except Exception:\n                pass\
          \  # Network blocked — continue to other checks\n\n    # ── VALIDATION 3:\
          \ Executable files blocked ────────────────────────\n    BLOCKED_EXE = (\n\
          \        \".exe\", \".msi\", \".bat\", \".cmd\", \".com\", \".pif\", \"\
          .scr\",\n        \".ps1\", \".psm1\", \".psd1\", \".vbs\", \".vbe\", \"\
          .wsf\", \".wsh\", \".js\", \".jse\",\n        \".sh\", \".bash\", \".zsh\"\
          , \".fish\", \".ksh\", \".csh\",\n        \".app\", \".dmg\", \".pkg\",\
          \ \".mpkg\", \".ipa\",\n        \".apk\", \".aab\", \".xapk\",\n       \
          \ \".bin\", \".run\", \".out\", \".elf\",\n        \".dll\", \".so\", \"\
          .dylib\", \".sys\", \".drv\",\n        \".class\", \".jar\", \".war\", \"\
          .ear\",\n        \".pyc\", \".pyo\", \".pyd\",\n        \".rb\", \".pl\"\
          , \".php\", \".asp\", \".aspx\", \".cgi\",\n        \".reg\", \".lnk\",\
          \ \".url\",\n    )\n    if any(name_lower.endswith(e) for e in BLOCKED_EXE):\n\
          \        return {\"result\": \"exe_blocked\"}\n\n    BLOCKED_EXE_MIMES =\
          \ (\n        \"application/x-msdownload\", \"application/x-msdos-program\"\
          ,\n        \"application/x-ms-dos-executable\", \"application/x-executable\"\
          ,\n        \"application/x-elf\", \"application/x-mach-binary\",\n     \
          \   \"application/x-dosexec\", \"application/x-sh\",\n        \"application/x-bat\"\
          , \"application/x-msi\",\n    )\n    if any(mime.startswith(m) for m in\
          \ BLOCKED_EXE_MIMES):\n        return {\"result\": \"exe_blocked\"}\n\n\
          \    # ── VALIDATION 4: ZIP / archive by MIME ───────────────────────────\n\
          \    BLOCKED_MIMES = (\n        \"application/zip\", \"application/x-zip\"\
          ,\n        \"application/x-zip-compressed\", \"application/x-rar-compressed\"\
          ,\n        \"application/x-rar\", \"application/vnd.rar\",\n        \"application/x-7z-compressed\"\
          , \"application/x-tar\",\n        \"application/gzip\", \"application/x-gzip\"\
          ,\n        \"application/x-bzip2\", \"application/x-bzip\",\n        \"\
          application/x-xz\", \"application/x-lzip\",\n        \"application/x-lzma\"\
          , \"application/x-compress\",\n        \"application/x-compressed\", \"\
          application/x-apple-diskimage\",\n    )\n    if any(mime.startswith(m) for\
          \ m in BLOCKED_MIMES):\n        return {\"result\": \"zip_blocked\"}\n\n\
          \    # ── VALIDATION 5: ZIP / archive by extension ──────────────────────\n\
          \    BLOCKED_EXT = (\n        \".zip\", \".rar\", \".tar\", \".gz\", \"\
          .tgz\", \".tar.gz\",\n        \".7z\", \".bz2\", \".xz\", \".lz\", \".lzma\"\
          , \".z\", \".cab\", \".iso\",\n    )\n    if any(name_lower.endswith(e)\
          \ for e in BLOCKED_EXT):\n        return {\"result\": \"zip_blocked\"}\n\
          \n    # ── VALIDATION 6: File type detection + size limits ───────────────\n\
          \    MB = 1024 * 1024\n    SIZE_LIMITS = {\n        \"pdf\":      15 * MB,\n\
          \        \"image\":    15 * MB,\n        \"excel\":    15 * MB,\n      \
          \  \"document\": 15 * MB,\n        \"word_doc\": 15 * MB,\n    }\n\n   \
          \ if name_lower.endswith(\".pdf\"):\n        file_type = \"pdf\"\n    elif\
          \ name_lower.endswith((\".jpg\", \".jpeg\", \".png\", \".gif\", \".webp\"\
          ,\n                               \".bmp\", \".tiff\", \".tif\", \".svg\"\
          )):\n        file_type = \"image\"\n    elif name_lower.endswith((\".xlsx\"\
          , \".xls\")):\n        file_type = \"excel\"\n    elif name_lower.endswith((\"\
          .doc\", \".docx\")):\n        file_type = \"word_doc\"\n    elif name_lower.endswith((\"\
          .txt\", \".csv\", \".htm\", \".html\",\n                               \"\
          .md\", \".rtf\", \".odt\")):\n        file_type = \"document\"\n    else:\n\
          \        return {\"result\": \"unsupported\"}\n\n    if size > 0 and file_type\
          \ in SIZE_LIMITS and size > SIZE_LIMITS[file_type]:\n        size_mb  =\
          \ round(size / MB, 1)\n        limit_mb = SIZE_LIMITS[file_type] // MB\n\
          \        return {\"result\": f\"size_exceeded|{file_type}|{size_mb}|{limit_mb}\"\
          }\n\n    return {\"result\": file_type}\n"
        code_language: python3
        desc: 'Single node: magic byte check + all file validation + type detection.
          Returns pdf | image | excel | document | zip_blocked (archive by magic bytes,
          MIME, or extension) | exe_blocked | word_unsupported | empty | size_exceeded|type|mb|limit
          | unsupported.'
        outputs:
          result:
            children: null
            type: string
        selected: false
        title: Detect File Type
        type: code
        variables:
        - value_selector:
          - '1776006764107'
          - select_file
          value_type: array[file]
          variable: inputs
