        desc: 'Processes the complete Excel content using the configured Gemini model.
          Receives full spreadsheet data + chart XML metadata + image info via visual_content
          variable. Produces excel_images JSON for the Formatter. Mirrors OCR node
          pattern: single system prompt, vision disabled, no API key needed — uses
          platform-configured model credentials.'
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: excel-llm-system-v1
          role: system
          text: ''
        - id: 6a22ae27-ae3f-46a5-bac0-a0055cea2699
          role: user
          text: 'EXCEL CONTENT:

            {{#context#}}


            TASK: Analyse the complete Excel content above. Return 1 JSON object.
            No fences. No prose.


            You have the full spreadsheet data (CSV), chart metadata extracted from
            XML (type, title, axes, series names, and actual data values), and raster
            image info.


            RULES:

            - For each CHART: use the exact chart_type, title, axis labels, series
            names, and data values from the metadata above. Write a precise, data-driven
            description. Never invent data — only use what is in the metadata.

            - For each RASTER IMAGE: describe based on its name, sheet context, and
            format. Be clear if visual pixel content is unavailable.

            - If no charts or images exist, return image_count:0 with an empty images
            array.

            - language_detected: scan all text labels in the metadata. Set "ja" ONLY
            if Japanese script is clearly present as the primary language. Set "en"
            for everything else.


            For EACH chart or image:

            - index: 1-based integer, charts first then images

            - name: from metadata

            - sheet: from metadata

            - chart_type: bar|line|pie|scatter|area|table|photo|illustration|other

            - title: exact title from metadata, or ""

            - description: 2-3 sentences — what this chart/image shows and how it
            relates to the spreadsheet data

            - data_summary: key insight from the actual data values (2 sentences)

            - axes: {"x_label":"","y_label":""} if chart else {}

            - series: array of series names from metadata, else []

            - language_detected: "en" or "ja" only

            - sentiment: positive|negative|neutral|informational

            - tags: 3-5 keyword tags


            OUTPUT SCHEMA (no extras):

            {"source_type":"excel_images","image_count":0,"images":[{"index":1,"name":"","sheet":"","chart_type":"","title":"","description":"","data_summary":"","axes":{},"series":[],"language_detected":"en","sentiment":"","tags":[]}]}'
