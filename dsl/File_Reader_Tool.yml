          text: 'DOCUMENT CONTENT:

            {{#context#}}


            TASK: Analyse DOCUMENT CONTENT above only. Return 1 JSON object.


            RULES:

            - text: copy ALL content verbatim from DOCUMENT CONTENT; do NOT invent

            - do NOT translate

            - language_detected: scan text. Set "ja" ONLY if Japanese script (hiragana
            ひ, katakana ア, kanji 漢) is clearly the primary language. Set "en" for
            everything else. Never guess "ja".

            - ja accuracy: preserve 漢字 ひらがな カタカナ 句読点 exactly; never romanize

            - doc_type: report|letter|article|form|data|spreadsheet|webpage|notes|other

            - word_count: count words in DOCUMENT CONTENT

            - summary: 2-3 sentences in English about DOCUMENT CONTENT

            - tables: every table/grid in DOCUMENT CONTENT; [] if none

            - CSV: headers = first row; all rows → table format

            - HTML: visible text only, strip tags

            - Word (.doc/.docx): extract all text verbatim; preserve heading hierarchy
            (Heading 1 / Heading 2 …) as section markers; extract all tables; preserve
            numbered and bulleted lists; ignore headers/footers/watermarks


            OUTPUT SCHEMA (no extras):

            {"source_type":"document","language_detected":"en","doc_type":"","word_count":0,"summary":"","text":"","tables":[]}'
