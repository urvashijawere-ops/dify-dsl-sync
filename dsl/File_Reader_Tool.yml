    - data:
        context:
          enabled: false
          variable_selector: []
        desc: Extracts text + tables + image insights from any PDF. English and Japanese
          with kanji/kana accuracy. Vision disabled.
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: gemini-2.5-pro
          provider: langgenius/gemini/google
        prompt_template:
        - id: pdf-prompt-v4
          role: system
          text: "PDF: {{#1776006764107.select_file#}}\n\nTASK: Extract everything.\
            \ Return 1 JSON object. No fences. No prose.\n\nRULES:\n- text: all text\
            \ verbatim, original line breaks kept\n- language: preserve text in its\
            \ ORIGINAL language — do NOT translate\n- language_detected: scan ALL\
            \ visible text. Set \"ja\" ONLY if Japanese script (hiragana ひ, katakana\
            \ ア, kanji 漢) is clearly and intentionally present as the primary written\
            \ language. Set \"en\" for everything else including English, mixed, numeric-only,\
            \ symbol-only, or unrecognised content. Never guess \"ja\".\n- ja accuracy:\
            \ preserve 漢字 (kanji) ひらがな (hiragana) カタカナ (katakana) 句読点 exactly; never\
            \ romanize; use full-width chars as printed\n- tables: every table/grid\
            \ found; [] if none\n- images: every image/photo/chart/logo/illustration\
            \ found; [] if none\n\nFOR EACH IMAGE:\n- index: 1-based integer\n- page:\
            \ page number\n- type: photo|illustration|chart|diagram|logo|screenshot|infographic|other\n\
