          \                lang    = \"\"\n            else:\n                body\
          \    = format_image(parsed)\n                success = True\n          \
          \      lang    = parsed.get(\"language_detected\", \"\")\n            source\
          \ = \"IMAGE\"\n\n        # ── Document branch (txt/doc/docx/csv) ─────────────────────────\n\
          \        elif doc_raw:\n            parsed, err = parse_json(doc_raw)\n\
          \            if err:\n                body = format_error(\n           \
          \         f\"Could not parse document response.\\n  {err}\\n\\n  Raw preview:\\\
