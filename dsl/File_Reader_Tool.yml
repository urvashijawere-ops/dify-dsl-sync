    - data:
        code: "\nimport zipfile, io, json, base64\nimport xml.etree.ElementTree as\
          \ ET\nimport urllib.request\n\n# ── Namespaces ────────────────────────────────────────────────────────────────\n\
          NS_SS  = \"http://schemas.openxmlformats.org/spreadsheetml/2006/main\"\n\
          NS_R   = \"http://schemas.openxmlformats.org/officeDocument/2006/relationships\"\
          \nNS_XDR = \"http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing\"\
          \nNS_A   = \"http://schemas.openxmlformats.org/drawingml/2006/main\"\nNS_C\
          \   = \"http://schemas.openxmlformats.org/drawingml/2006/chart\"\n\nMAX_ROWS\
          \      = 2000   # rows per sheet for table rendering\nMAX_CSV_ROWS  = 200\
          \    # rows per sheet sent to the LLM\n\n\ndef _resolve(base_dir, target):\n\
          \    import posixpath\n    # Absolute path (leading '/') — strip slash,\
          \ use as-is\n    # e.g. '/xl/worksheets/sheet1.xml' -> 'xl/worksheets/sheet1.xml'\n\
          \    if target.startswith('/'):\n        return target.lstrip('/')\n   \
          \ # Relative path — join with base_dir\n    # e.g. 'worksheets/sheet1.xml'\
          \ (Google Sheets) -> 'xl/worksheets/sheet1.xml'\n    # e.g. '../media/image.png'\
          \   (drawing rels)   -> 'xl/media/image.png'\n    return posixpath.normpath(posixpath.join(base_dir,\
          \ target))\n\n\ndef _col_idx(col_str):\n    \"\"\"'A'→0, 'B'→1, 'Z'→25,\
          \ 'AA'→26 …\"\"\"\n    n = 0\n    for ch in col_str.upper():\n        n\
          \ = n * 26 + (ord(ch) - 64)\n    return n - 1\n\n\ndef _col_letter(idx):\n\
          \    \"\"\"0→'A', 1→'B', 25→'Z', 26→'AA' … (inverse of _col_idx)\"\"\"\n\
          \    label = ''\n    n = idx + 1\n    while n:\n        n, rem = divmod(n\
          \ - 1, 26)\n        label = chr(65 + rem) + label\n    return label\n\n\n\
          def _shared_strings(zf, names):\n    ss = []\n    if 'xl/sharedStrings.xml'\
          \ in names:\n        for si in ET.parse(zf.open('xl/sharedStrings.xml')).getroot()\
          \ \\\n                     .findall(f'.//{{{NS_SS}}}si'):\n            ss.append(''.join(t.text\
          \ or '' for t in si.findall(f'.//{{{NS_SS}}}t')))\n    return ss\n\n\ndef\
          \ _sheet_info(zf, names):\n    \"\"\"Return [(sheet_name, ws_path), …] in\
          \ workbook order.\"\"\"\n    wb_rels = {}\n    if 'xl/_rels/workbook.xml.rels'\
          \ in names:\n        for rel in ET.parse(zf.open('xl/_rels/workbook.xml.rels')).getroot():\n\
          \            wb_rels[rel.get('Id', '')] = _resolve('xl', rel.get('Target',\
          \ ''))\n    info = []\n    if 'xl/workbook.xml' in names:\n        for s\
          \ in ET.parse(zf.open('xl/workbook.xml')).getroot() \\\n               \
          \     .findall(f'.//{{{NS_SS}}}sheet'):\n            path = wb_rels.get(s.get(f'{{{NS_R}}}id',\
          \ ''), '')\n            if path:\n                info.append((s.get('name',\
          \ 'Sheet'), path))\n    return info\n\n\ndef _extract_cell_data(zf, names,\
          \ shared, sheet_info):\n    \"\"\"\n    Parse every worksheet and return:\n\
          \      processed_sheets  – dict matching the Process Excel node JSON schema\n\
          \      csv_map           – dict sheet_name → CSV text (for LLM context)\n\
          \    \"\"\"\n    processed, csv_map = {}, {}\n\n    for sname, ws_path in\
          \ sheet_info:\n        if ws_path not in names:\n            continue\n\
          \        root = ET.parse(zf.open(ws_path)).getroot()\n\n        row_map\
          \ = {}\n        for row_el in root.findall(f'.//{{{NS_SS}}}row'):\n    \
          \        rnum  = int(row_el.get('r', 0))\n            cells = {}\n     \
          \       for c in row_el.findall(f'{{{NS_SS}}}c'):\n                ref =\
          \ c.get('r', '')\n                col = _col_idx(''.join(ch for ch in ref\
          \ if ch.isalpha()))\n                ct  = c.get('t', '')\n            \
          \    val = ''\n\n                if ct == 'inlineStr':\n               \
          \     # Inline string: value in <is><t>…</t></is>, not <v>\n           \
          \         is_el = c.find(f'{{{NS_SS}}}is')\n                    if is_el\
          \ is not None:\n                        val = ''.join(\n               \
          \             t.text or ''\n                            for t in is_el.findall(f'.//{{{NS_SS}}}t')\n\
          \                        )\n                else:\n                    v\
          \ = c.find(f'{{{NS_SS}}}v')\n                    if v is not None:\n   \
          \                     raw = v.text or ''\n                        if ct\
          \ == 's':\n                            # shared string — some writers emit\
          \ '0.0' not '0'\n                            try:\n                    \
          \            val = shared[int(float(raw))]\n                           \
          \ except (ValueError, IndexError):\n                                val\
          \ = raw\n                        elif ct == 'b':\n                     \
          \       val = 'TRUE' if raw == '1' else 'FALSE'\n                      \
          \  else:\n                            # number, formula result (str), error\
          \ (e)\n                            val = raw\n\n                # Only store\
          \ non-empty values — prevents blank cells\n                # from masking\
          \ real header values in hdr_row lookup\n                if val.strip():\n\
          \                    cells[col] = val.strip()\n\n            if cells:\n\
          \                row_map[rnum] = cells\n\n        if not row_map:\n    \
          \        processed[sname] = {\n                'records': [], 'total_rows':\
          \ 0, 'loaded_rows': 0,\n                'truncated': False, 'truncation_note':\
          \ '',\n            }\n            csv_map[sname] = ''\n            continue\n\
          \n        all_cols    = sorted({c for row in row_map.values() for c in row})\n\
          \        sorted_rows = sorted(row_map.keys())\n        hdr_row     = row_map[sorted_rows[0]]\n\
          \        headers     = [\n            str(hdr_row.get(c, '')).strip() or\
          \ _col_letter(c)\n            for c in all_cols\n        ]\n\n        records,\
          \ csv_lines = [], [','.join(f'\"{h}\"' for h in headers)]\n        for rn\
          \ in sorted_rows[1:]:\n            rc = row_map[rn]\n            if not\
          \ any(str(rc.get(c, '')).strip() for c in all_cols):\n                continue\n\
          \            rec = {headers[i]: str(rc.get(c, '')).strip()\n           \
          \        for i, c in enumerate(all_cols)}\n            records.append(rec)\n\
          \            csv_lines.append(','.join(f'\"{rec.get(h, \"\")}\"' for h in\
          \ headers))\n\n        total   = len(records)\n        trunc   = total >\
          \ MAX_ROWS\n        preview = records[:MAX_ROWS]\n\n        processed[sname]\
          \ = {\n            'records':         preview,\n            'total_rows':\
          \      total,\n            'loaded_rows':     len(preview),\n          \
          \  'truncated':       trunc,\n            'truncation_note': (\n       \
          \         f'Large file: showing first {MAX_ROWS} of {total} rows. '\n  \
          \              f'{total - MAX_ROWS} rows omitted.'\n            ) if trunc\
          \ else '',\n        }\n        csv_map[sname] = '\\n'.join(csv_lines)\n\n\
          \    return processed, csv_map\n\n\nCHART_LABEL = {\n    'barChart': 'Bar',\
          \ 'bar3DChart': 'Bar 3D',\n    'lineChart': 'Line', 'line3DChart': 'Line\
          \ 3D',\n    'pieChart': 'Pie', 'pie3DChart': 'Pie 3D', 'doughnutChart':\
          \ 'Doughnut',\n    'scatterChart': 'Scatter', 'bubbleChart': 'Bubble',\n\
          \    'areaChart': 'Area', 'area3DChart': 'Area 3D',\n    'radarChart': 'Radar',\
          \ 'stockChart': 'Stock', 'surfaceChart': 'Surface',\n}\n\n\ndef _parse_chart(zf,\
          \ chart_path):\n    \"\"\"Return structured chart metadata dict from chart\
          \ XML.\"\"\"\n    root = ET.fromstring(zf.read(chart_path))\n    C, A =\
          \ f'{{{NS_C}}}', f'{{{NS_A}}}'\n\n    # Type\n    chart_type = 'Other'\n\
          \    for tag, label in CHART_LABEL.items():\n        if root.find(f'.//{C}{tag}')\
          \ is not None:\n            chart_type = label\n            break\n\n  \
          \  # Title\n    title = ''\n    t_el = root.find(f'.//{C}title')\n    if\
          \ t_el is not None:\n        parts = t_el.findall(f'.//{A}t') or t_el.findall(f'.//{C}v')\n\
          \        title = ''.join(p.text or '' for p in parts).strip()\n\n    # Axis\
          \ labels\n    x_label, y_label = '', ''\n    for ax_tag, side in [('catAx',\
          \ 'x'), ('valAx', 'y'), ('dateAx', 'x')]:\n        for ax in root.findall(f'.//{C}{ax_tag}'):\n\
          \            ax_t = ax.find(f'.//{C}title')\n            if ax_t is not\
          \ None:\n                parts = ax_t.findall(f'.//{A}t') or ax_t.findall(f'.//{C}v')\n\
          \                lbl = ''.join(p.text or '' for p in parts).strip()\n  \
          \              if side == 'x' and not x_label:\n                    x_label\
          \ = lbl\n                elif side == 'y' and not y_label:\n           \
          \         y_label = lbl\n\n    # Series: name + up to 10 values + categories\n\
          \    series = []\n    for ser in root.findall(f'.//{C}ser'):\n        tx\
          \    = ser.find(f'.//{C}tx')\n        sname = ''\n        if tx is not None:\n\
          \            parts = tx.findall(f'.//{A}t') or tx.findall(f'.//{C}v')\n\
          \            sname = ''.join(p.text or '' for p in parts).strip()\n    \
          \    vals = [v.text for v in ser.findall(f'.//{C}val//{C}v')  if v.text][:10]\n\
          \        cats = [v.text for v in ser.findall(f'.//{C}cat//{C}v')  if v.text][:10]\n\
          \        series.append({'name': sname, 'values': vals, 'categories': cats})\n\
          \n    return {\n        'chart_type': chart_type,\n        'title':    \
          \  title,\n        'x_label':    x_label,\n        'y_label':    y_label,\n\
          \        'series':     series,\n    }\n\n\ndef _extract_visuals(zf, names,\
          \ sheet_info):\n    \"\"\"\n    Discover all charts and raster images embedded\
          \ in the workbook.\n    Charts are fully parsed from their XML (type, title,\
          \ axes, series + values).\n    Raster images: metadata only (name, sheet,\
          \ format, size).\n    Returns (charts_list, images_list) — 1-based index,\
          \ ordered by sheet.\n    \"\"\"\n    charts, images = [], []\n    chart_idx,\
          \ image_idx = 1, 1\n\n    # Build worksheet rels mapping once\n    for sname,\
          \ ws_path in sheet_info:\n        if ws_path not in names:\n           \
          \ continue\n        ws_rels_path = ws_path.replace(\n            'xl/worksheets/',\
          \ 'xl/worksheets/_rels/') + '.rels'\n        if ws_rels_path not in names:\n\
          \            continue\n\n        draw_paths   = []\n        direct_chart\
          \ = []   # chart sheets linked directly from worksheet\n        for rel\
          \ in ET.parse(zf.open(ws_rels_path)).getroot():\n            typ = rel.get('Type',\
          \ '').lower()\n            tgt = _resolve('xl/worksheets', rel.get('Target',\
          \ ''))\n            if 'drawing' in typ and tgt in names:\n            \
          \    draw_paths.append(tgt)\n            elif 'chart' in typ and tgt in\
          \ names:\n                direct_chart.append(tgt)\n\n        # Direct chart\
          \ references (rare but valid)\n        for chart_path in direct_chart:\n\
          \            meta = _parse_chart(zf, chart_path)\n            charts.append({\n\
          \                'index': chart_idx, 'name': f'Chart {chart_idx}',\n   \
          \             'sheet': sname, **meta,\n            })\n            chart_idx\
          \ += 1\n\n        for draw_path in draw_paths:\n            draw_rels =\
          \ draw_path.replace(\n                'xl/drawings/', 'xl/drawings/_rels/')\
          \ + '.rels'\n            rid_to_media, rid_to_chart = {}, {}\n         \
          \   if draw_rels in names:\n                for rel in ET.parse(zf.open(draw_rels)).getroot():\n\
          \                    typ = rel.get('Type', '').lower()\n               \
          \     tgt = _resolve('xl/drawings', rel.get('Target', ''))\n           \
          \         if 'image' in typ:\n                        rid_to_media[rel.get('Id',\
          \ '')] = tgt\n                    elif 'chart' in typ and tgt in names:\n\
          \                        rid_to_chart[rel.get('Id', '')] = tgt\n\n     \
          \       d_root = ET.parse(zf.open(draw_path)).getroot()\n\n            for\
          \ tag in ['oneCellAnchor', 'twoCellAnchor', 'absoluteAnchor']:\n       \
          \         for anchor in d_root.findall(f'{{{NS_XDR}}}{tag}'):\n\n      \
          \              # ── Charts via graphicFrame ───────────────────────────\n\
          \                    for gf in anchor.findall(f'.//{{{NS_XDR}}}graphicFrame'):\n\
          \                        # Correct lookup: c:chart element carries r:id\n\
          \                        chart_el = gf.find(f'.//{{{NS_C}}}chart')\n   \
          \                     if chart_el is not None:\n                       \
          \     rid = chart_el.get(f'{{{NS_R}}}id', '')\n                        \
          \    if rid and rid in rid_to_chart:\n                                meta\
          \  = _parse_chart(zf, rid_to_chart[rid])\n                             \
          \   nv    = gf.find(\n                                    f'{{{NS_XDR}}}nvGraphicFramePr'\n\
          \                                    f'/{{{NS_XDR}}}cNvPr')\n          \
          \                      cname = (nv.get('name', '') if nv is not None\n \
          \                                        else '') or f'Chart {chart_idx}'\n\
          \                                charts.append({\n                     \
          \               'index': chart_idx, 'name': cname,\n                   \
          \                 'sheet': sname, **meta,\n                            \
          \    })\n                                chart_idx += 1\n\n            \
          \        # ── Raster images via pic ─────────────────────────────\n    \
          \                for pic in anchor.findall(f'.//{{{NS_XDR}}}pic'):\n   \
          \                     nv    = pic.find(f'{{{NS_XDR}}}nvPicPr')\n       \
          \                 cnvpr = nv.find(f'{{{NS_XDR}}}cNvPr') if nv is not None\
          \ else None\n                        pname = (cnvpr.get('name', '') if cnvpr\
          \ is not None\n                                 else '') or f'Image {image_idx}'\n\
          \                        bf    = pic.find(f'{{{NS_XDR}}}blipFill')\n   \
          \                     blip  = bf.find(f'{{{NS_A}}}blip') if bf is not None\
          \ else None\n                        embed = blip.get(f'{{{NS_R}}}embed',\
          \ '') if blip is not None else ''\n                        media = rid_to_media.get(embed,\
          \ '')\n                        if media and media in names:\n          \
          \                  raw = zf.read(media)\n                            ext\
          \ = media.rsplit('.', 1)[-1].lower()\n                            mime =\
          \ {\n                                'png': 'image/png', 'jpg': 'image/jpeg',\n\
          \                                'jpeg': 'image/jpeg', 'gif': 'image/gif',\n\
          \                                'bmp': 'image/bmp', 'tiff': 'image/tiff',\n\
          \                                'tif': 'image/tiff', 'webp': 'image/webp',\n\
          \                            }.get(ext, 'image/png')\n                 \
          \           images.append({\n                                'index':  \
          \     image_idx,\n                                'name':        pname,\n\
          \                                'sheet':       sname,\n               \
          \                 'format':      ext,\n                                'mime_type':\
          \   mime,\n                                'size_bytes':  len(raw),\n  \
          \                              'base64_data': base64.b64encode(raw).decode(),\n\
          \                            })\n                            image_idx +=\
          \ 1\n\n    return charts, images\n\n\ndef _build_visual_content(fname, sheet_names,\
          \ csv_map, charts, images):\n    \"\"\"\n    Build the rich structured text\
          \ block that the LLM node will receive.\n    Includes: spreadsheet CSV data\
          \ + full chart XML metadata + image info.\n    The LLM uses this to produce\
          \ accurate, data-driven descriptions.\n    \"\"\"\n    SEP = '=' * 60\n\
          \    lines = [\n        f'EXCEL FILE: {fname}',\n        f'SHEETS: {\",\
          \ \".join(sheet_names)}',\n        '',\n        SEP,\n        'SPREADSHEET\
          \ DATA (CSV — actual cell values per sheet):',\n        SEP,\n    ]\n\n\
          \    for sname, csv_text in csv_map.items():\n        if not csv_text.strip():\n\
          \            lines.append(f'\\n[Sheet: {sname}] — empty')\n            continue\n\
          \        csv_rows = csv_text.split('\\n')\n        lines.append(f'\\n[Sheet:\
          \ {sname}]')\n        for row in csv_rows[:MAX_CSV_ROWS]:\n            lines.append(row)\n\
          \        if len(csv_rows) > MAX_CSV_ROWS:\n            lines.append(f'…\
          \ ({len(csv_rows) - MAX_CSV_ROWS} more rows omitted)')\n\n    if charts:\n\
          \        lines += ['', SEP, f'EMBEDDED CHARTS ({len(charts)} found):', SEP]\n\
          \        for ch in charts:\n            lines.append(f'\\nChart {ch[\"index\"\
          ]}: {ch[\"name\"]}')\n            lines.append(f'  Sheet      : {ch[\"sheet\"\
          ]}')\n            lines.append(f'  Type       : {ch[\"chart_type\"]}')\n\
          \            if ch.get('title'):\n                lines.append(f'  Title\
          \      : {ch[\"title\"]}')\n            if ch.get('x_label'):\n        \
          \        lines.append(f'  X Axis     : {ch[\"x_label\"]}')\n           \
          \ if ch.get('y_label'):\n                lines.append(f'  Y Axis     : {ch[\"\
          y_label\"]}')\n            for s in ch.get('series', []):\n            \
          \    sn   = s.get('name', '(unnamed)')\n                vals = ', '.join(s.get('values',\
          \ []))\n                cats = ', '.join(s.get('categories', []))\n    \
          \            row  = f'  Series     : {sn}'\n                if vals:\n \
          \                   row += f'  |  values: {vals}'\n                if cats:\n\
          \                    row += f'  |  categories: {cats}'\n               \
          \ lines.append(row)\n\n    if images:\n        lines += ['', SEP, f'EMBEDDED\
          \ RASTER IMAGES ({len(images)} found):', SEP]\n        for img in images:\n\
          \            lines.append(f'\\nImage {img[\"index\"]}: {img[\"name\"]}')\n\
          \            lines.append(f'  Sheet      : {img[\"sheet\"]}')\n        \
          \    lines.append(f'  Format     : {img[\"format\"].upper()}')\n       \
          \     lines.append(f'  MIME Type  : {img[\"mime_type\"]}')\n           \
          \ lines.append(f'  Size       : {img[\"size_bytes\"]:,} bytes')\n      \
          \      lines.append(f'  Base64     : {img[\"base64_data\"]}')\n\n    return\
          \ '\\n'.join(lines)\n\n\ndef main(select_file) -> dict:\n    EMPTY_IMAGES\
          \ = json.dumps({\n        'source_type': 'excel_images', 'image_count':\
          \ 0, 'images': [],\n    })\n\n    def _err(msg):\n        return {\n   \
          \         'excel_data': json.dumps({\n                'source_type': 'excel',\
          \ 'success': False,\n                'error_message': msg,\n           \
          \     'data': {'sheets': {}, 'sheet_names': [], 'sheet_count': 0},\n   \
          \         }),\n            'visual_content': '',\n            'note': msg,\n\
          \        }\n\n    file_list = select_file if isinstance(select_file, list)\
          \ else [select_file]\n    if not file_list:\n        return _err('No file\
          \ received.')\n\n    f        = file_list[0]\n    file_url = (f.get('url')\
          \ or f.get('remote_url') or f.get('path') or '').strip()\n    fname    =\
          \ (f.get('filename') or f.get('name') or 'workbook.xlsx').strip()\n    if\
          \ not file_url:\n        return _err('File URL not accessible.')\n\n   \
          \ # ── Fetch the entire XLSX as binary ───────────────────────────────────────\n\
          \    try:\n        req = urllib.request.Request(file_url)\n        with\
          \ urllib.request.urlopen(req, timeout=30) as r:\n            xlsx_bytes\
          \ = r.read()\n    except Exception as e:\n        return _err(f'Could not\
          \ fetch file: {e}')\n\n    # ── Parse the XLSX ZIP in memory ──────────────────────────────────────────\n\
          \    try:\n        with zipfile.ZipFile(io.BytesIO(xlsx_bytes)) as zf:\n\
          \            names      = set(zf.namelist())\n            shared     = _shared_strings(zf,\
          \ names)\n            sinfo      = _sheet_info(zf, names)\n            proc,\
          \ cmap = _extract_cell_data(zf, names, shared, sinfo)\n            charts,\
          \ imgs = _extract_visuals(zf, names, sinfo)\n    except Exception as e:\n\
          \        return _err(f'XLSX parsing failed: {e}')\n\n    sheet_names = [s[0]\
          \ for s in sinfo]\n\n    # ── Output 1: structured table data for the Formatter\
          \ ────────────────────\n    excel_data = json.dumps({\n        'source_type':\
          \ 'excel', 'success': True, 'error_message': '',\n        'data': {\n  \
          \          'sheets':      proc,\n            'sheet_names': sheet_names,\n\
          \            'sheet_count': len(sheet_names),\n        },\n    }, ensure_ascii=False)\n\
          \n    # ── Output 2: rich text for the LLM node ─────────────────────────────────\n\
          \    visual_content = _build_visual_content(fname, sheet_names, cmap, charts,\
          \ imgs)\n\n    total_visuals = len(charts) + len(imgs)\n    return {\n \
          \       'excel_data':      excel_data,\n        'visual_content':  visual_content,\n\
          \        'note': (\n            f'Extracted {len(sheet_names)} sheet(s),\
          \ '\n            f'{len(charts)} chart(s), {len(imgs)} image(s).'\n    \
          \        + ('' if total_visuals else ' No embedded visuals found.')\n  \
          \      ),\n    }\n"
        code_language: python3
