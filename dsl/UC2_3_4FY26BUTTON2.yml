\\    next_step = 8 if edit_mode else 4\\n    ui = \\\"SUMMARY\\\" if edit_mode\\\n          \\ else \\\"STEP_4\\\"\\n    existing_data[\\\"edit_mode\\\"] = False\\n    return\\\n          \\ next_step, ui, True, \\\"\\\"\\n\\ndef handle_step_4(raw_input, existing_data):\\n\\\n          \\    if raw_input in [\\\"\u6025\u3044\u3067\u3044\u306a\u3044\\\", \\\"\u81f3\u6025\u5bfe\u5fdc\u3057\u3066\u307b\u3057\u3044\\\"]:\\n        existing_data[\\\"\\\n          urgency_of_call_back\\\"] = raw_input\\n        edit_mode = existing_data.get(\\\"\\\n          edit_mode\\\", False)\\n        next_step = 8 if edit_mode else 5\\n       \\\n          \\ ui = \\\"SUMMARY\\\" if edit_mode else \\\"INPUT_NAME\\\"\\n        existing_data[\\\"\\\n          edit_mode\\\"] = False\\n        return next_step, ui, True, \\\"\\\"\\n    return\\\n          \\ 4, \\\"\\\", False, \\\"\u7dca\u6025\u6027\u30a8\u30e9\u30fc\\\"\\n\\ndef handle_step_5(raw_input, existing_data):\\n\\\n          \\    existing_data[\\\"customer_name\\\"] = raw_input\\n    edit_mode = existing_data.get(\\\"\\\n          edit_mode\\\", False)\\n    next_step = 8 if edit_mode else 6\\n    ui = \\\"\\\n          SUMMARY\\\" if edit_mode else \\\"INPUT_PHONE\\\"\\n    existing_data[\\\"edit_mode\\\"\\\n          ] = False\\n    return next_step, ui, True, \\\"\\\"\\n\\ndef handle_step_6(raw_input,\\\n          \\ existing_data):\\n \\n    phone_input = raw_input.strip()\\n \\n    # Reject\\\n          \\ alphabet or invalid special characters\\n    if re.search(r\\\"[A-Za-z]\\\"\\\n          , phone_input) or re.search(r\\\"[^\\\\d\\\\-\\\\+\\\\s]\\\", phone_input):\\n      \\\n          \\  return 6, \\\"INPUT_PHONE\\\", False, \\\"\u96fb\u8a71\u756a\u53f7\u306b\u7121\u52b9\u306a\u6587\u5b57\u304c\u542b\u307e\u308c\u3066\u3044\u307e\u3059\\\"\\n   \\n    #\\\n          \\ Extract digits only\\n    phone_digits = re.sub(r\\\"\\\\D\\\", \\\"\\\", phone_input)\\n\\\n          \\ \\n    if len(phone_digits) == 11:\\n  