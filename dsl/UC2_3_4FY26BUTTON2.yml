ate_str).strip()\\n\\\n          \\    for fmt in (\\\"%Y-%m-%d\\\", \\\"%Y/%m/%d\\\", \\\"%m/%d/%Y\\\", \\\"%Y\u5e74%m\u6708%d\u65e5\\\"\\\n          ):\\n        try: return datetime.strptime(date_str, fmt)\\n        except:\\\n          \\ continue\\n    return None\\n\\ndef is_date_in_scope(rec_dt, scope, formatted_date,\\\n          \\ start_date, end_date, discrete_dates):\\n    if not rec_dt: return False\\n\\\n          \\    try:\\n        if scope == \\\"YEAR\\\":\\n            return rec_dt.year\\\n          \\ == int(formatted_date)\\n\\n        if scope == \\\"MONTH\\\":\\n           \\\n          \\ m, y = map(int, formatted_date.split(\\\"/\\\"))\\n            return rec_dt.month\\\n          \\ == m and rec_dt.year == y\\n\\n        if scope == \\\"RANGE\\\":\\n        \\\n          \\    if \\\"/\\\" not in start_date:\\n                return int(start_date)\\\n          \\ <= rec_dt.year <= int(end_date)\\n            s_m, s_y = map(int, start_date.split(\\\"\\\n          /\\\"))\\n            e_m, e_y = map(int, end_date.split(\\\"/\\\"))\\n        \\\n          \\    start_dt = datetime(s_y, s_m, 1)\\n            end_dt = datetime(e_y,\\\n          \\ e_m, monthrange(e_y, e_m)[1])\\n            return start_dt <= rec_dt <=\\\n          \\ end_dt\\n\\n        if scope == \\\"MULTI\\\":\\n            for d in discrete_dates:\\n\\\n          \\                if \\\"/\\\" in d:\\n                    m, y = map(int, d.split(\\\"\\\n          /\\\"))\\n                    if rec_dt.month == m and rec_dt.year == y: return\\\n          \\ True\\n                elif rec_dt.year == int(d):\\n                  \\\n          \\  return True\\n    except:\\n        return False\\n    return False\\n\\n\\\n          def select_latest_per_group(records):\\n    latest = {}\\n    for r in records:\\n\\\n          \\        dt = r.get(\\\"_dt\\\")\\n        key = (r.get(COL[\\\"PROD\\\"]), r.get(COL[\\\"\\\n          REP_CAT\\\"]))\\n        if key not in latest or (dt and (not latest[key][0]\\\n          \\ or dt > latest[key][0])):\\n            latest[key] = (dt, r)\\n    return\\\n          \\ [v[1] for v in latest.values()]\\n\\ndef empty_response(e_flag, r_flag):\\n\\\n          \\    return {\\n        \\\"mode\\\": \\\"EQUIPMENT\\\",\\n        \\\"aggregated_result\\\"\\\n          : \\\"[]\\\",\\n        \\\"pdf_list\\\": [],\\n        \\\"matching_reports\\\": [],\\n\\\n          \\        \\\"count\\\": 0,\\n        \\\"equipment_present\\\": e_flag,\\n       \\\n          \\ \\\"report_present\\\": r_flag,\\n        \\\"available_equipments\\\": []\\n  \\\n          \\  }\\n\\n# --- MAIN ---\\n\\ndef main(report_records, query_input):\\n\\n   \\\n          \\ # \u2705 Detect user selection\\n    selected_input = \\\"\\\"\\n    try:\\n     \\\n          \\   if isinstance(query_input, dict):\\n            selected_input = str(query_input.get(\\\"\\\n          query\\\", \\\"\\\")).strip()\\n        else:\\n            selected_input = str(query_input).strip()\\n\\\n          \\    except:\\n        selected_input = \\\"\\\"\\n\\n    # --- Input Parsing ---\\n\\\n          \\    if isinstance(report_records, str):\\n        try: report_records =\\\n          \\ json.loads(report_records)\\n        except: report_records = []\\n\\n  \\\n          \\  if isinstance(report_records, dict): report_records = [report_records]\\n\\\n          \\    elif not isinstance(report_records, list): report_records = []\\n\\n\\\n          \\    try: params = query_input if isinstance(query_input, dict) else json.loads(str(query_input))\\n\\\n          \\    except: params = {}\\n\\n    target_equip = set(map(str, params.get(\\\"\\\n          equipment_codes\\\", [])))\\n    target_report = set(map(str, params.get(\\\"\\\n          report_type_codes\\\", [])))\\n    scope = params.get(\\\"date_scope\\\", \\\"LATEST\\\"\\\n          )\\n\\n    parsed_reports = []\\n    available_equipments = set()\\n\\n    equipment_present_flag\\\