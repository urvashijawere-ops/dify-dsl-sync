\\n          \\ = text.translate(str.maketrans('\uff10\uff11\uff12\uff13\uff14\uff15\uff16\uff17\uff18\uff19\uff0d','0123456789-'))\\n    text\\\n          \\ = re.sub(r'[\\\\s\u3000-]', '', text)\\n    return text.strip() if text.isdigit()\\\n          \\ else \\\"\\\"\\n\\ndef get_language_text(key):\\n    MESSAGES = {\\n        \\\"\\\n          branch_prompt\\\": \\\"\u652f\u5e97\u30b3\u30fc\u30c9\uff082\u6841\u306e\u6570\u5b57\uff09\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\\\\n\u4f8b: 11\\\",\\n        \\\"branch_error\\\"\\\n          : \\\"\u652f\u5e97\u30b3\u30fc\u30c9\u304c\u7121\u52b9\u3067\u3059\u30022\u6841\u306e\u6570\u5b57\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\\\\n\u4f8b: 11\\\",\\n        \\\"customer_prompt\\\":\\\n          \\ \\\"\u9867\u5ba2\u756a\u53f7\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\\\",\\n        \\\"customer_error\\\": \\\"\u9867\u5ba2\u756a\u53f7\u304c\u7121\u52b9\u3067\u3059\u30025\u6841\u306e\u6570\u5b57\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\\\\\\\n          n\u4f8b: 10001\\\",\\n        \\\"rating_prompt\\\": \\\"\u6700\u5f8c\u306b\u3001\u8a55\u4fa1\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\\\",\\n       \\\n          \\ \\\"rating_error\\\": \\\"\u5165\u529b\u3055\u308c\u305f\u8a55\u4fa1\u304c\u7121\u52b9\u3067\u3059\u3002\u8a55\u4fa1\u306f\u300cResolved\uff08\u89e3\u6c7a\u6e08\u307f\uff09\u300d\u307e\u305f\u306f\u300cNot Resolved\uff08\u672a\u89e3\u6c7a\uff09\u300d\u306e\u3044\u305a\u308c\u304b\u3067\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\\\"\\\n          ,\\n        \\\"rating_submit\\\": \\\"\u8a55\u4fa1\u306f\u6b63\u5e38\u306b\u9001\u4fe1\u3055\u308c\u307e\u3057\u305f\u3002\\\",\\n        \\\"option_submit\\\"\\\n          : \\\"\u6b63\u3057\u3044\u9078\u629e\u3092\u3057\u307e\u3057\u305f\u3002\\\",\\n        \\\"unknown_state_error\\\": \\\"\u51e6\u7406\u72b6\u614b\u304c\u4e0d\u660e\u3067\u3059\u3002\u652f\u5e97\u30b3