ed free-text input instead of selecting a button\n          option.\n        selected: false\n        title: Button 3 Option Selected\n        type: if-else\n      height: 249\n      id: '1770714467312'\n      position:\n        x: 1853.11881700428\n        y: 1033.9608617917065\n      positionAbsolute:\n        x: 1853.11881700428\n        y: 1033.9608617917065\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        code: \"import json\\nfrom datetime import datetime\\n \\n# -------------------------------\\n\\\n          # DB Field Name Constants\\n# -------------------------------\\nSCHEDULED_DATE_FIELD\\\n          \\ = \\\"scheduledworkdate\\\"\\nBEGIN_DATETIME_FIELD = \\\"begindatetime\\\"\\nEND_DATETIME_FIELD\\\n          \\ = \\\"enddatetime\\\"\\nMODEL_CODE_FIELD = \\\"modelcode\\\"\\nGOKI_FIELD = \\\"goki\\\"\\\n          \\nWORKNAME_FIELD = \\\"workname\\\"\\n \\n# -------------------------------\\n\\\n          # Utility Functions\\n# -------------------------------\\n\\n# Convert date\\\n          \\ string to Japanese format (YYYY\u5e74MM\u6708DD\u65e5)\\ndef format_date_jp(date_str):\\n\\\n          \\    try:\\n        if \\\"/\\\" in date_str:\\n            dt = datetime.strptime(date_str,\\\n          \\ \\\"%m/%d/%Y\\\")\\n        else:\\n            dt = datetime.strptime(date_str,\\\n          \\ \\\"%Y-%m-%d\\\")\\n        return dt.strftime(\\\"%Y\u5e74%m\u6708%d\u65e5\\\")\\n    except Exception:\\n\\\n          \\        return \\\"\u65e5\u4ed8\u4e0d\u660e\\\"\\n \\n# Convert ISO datetime string to HH\u6642MM\u5206 format\\n\\\n          def format_time_jp(dt_str):\\n    if not dt_str:\\n        return \\\"\\\"\\n \\\n          \\   try:\\n        if isinstance(dt_str, str):\\n            if dt_str.endswith(\\\"\\\n          Z\\\"):\\n                dt_str = dt_str.replace(\\\"Z\\\", \\\"+00:00\\\")\\n    \\\n          \\        if dt_str.endswith(\\\"+00\\\"):\\n                dt_str = dt_str +\\\n          \\ \\\":00\\\"\\n            if \\\"T\\\" not in dt_str and \\\" \\\" in dt_str:\\n   \\\n          \\             dt_str = dt_str.replace(\\\" \\\", \\\"T\\\")\\n        dt = datetime.fromisoformat(dt_str)\\n\\\n          \\        return dt.strftime(\\\"%H\u6642%M\u5206\\\")\\n    except Exception:\\n       \\\n          \\ return \\\"\\\"\\n \\n# -------------------------------\\n# Main Processing Function\\n\\\n          # -------------------------------\\ndef main(gms_records, kanri_no, jigyou_cd):\\n\\\n          \\n    try:\\n        kanri_no = str(kanri_no).strip()\\n        jigyou_cd\\\n          \\ = str(jigyou_cd).strip()\\n \\n        # Parse DB JSON input\\n        gms\\\n          \\ = json.loads(gms_records)\\n \\n        # Device type mapping\\n        model_map\\\n          \\ = {\\n            \\\"1\\\": \\\"\u30a8\u30ec\u30d9\u30fc\u30bf\u30fc\\\",\\n            \\\"2\\\": \\\"\u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc\\\",\\n\\\n          \\            \\\"3\\\": \\\"\u7a7a\u8abf\u8a2d\u5099\\\",\\n            \\\"4\\\": \\\"\u30d3\u30eb\u7ba1\u7406\u8a2d\u5099\\\"\\n        }\\n\\\n          \\ \\n        today = datetime.now().date()\\n        inspections = []\\n \\n\\\n          \\        # Filter future or current inspections\\n        for g in gms:\\n\\\n          \\n            try:\\n                work_date_str = g.get(SCHEDULED_DATE_FIELD,\\\n          \\ \\\"\\\")\\n                if not work_date_str:\\n                    continue\\n\\\n          \\ \\n                # Parse scheduled work date\\n                if \\\"/\\\"\\\n          \\ in work_date_str:\\n                    work_date = datetime.strptime(work_date_str,\\\n          \\ \\\"%m/%d/%Y\\\").date()\\n                else:\\n                    work_date\\\n          \\ = datetime.strptime(work_date_str, \\\"%Y-%m-%d\\\").date()\\n \\n         \\\n          \\   except (TypeError, ValueError):\\n                continue\\n \\n     \\\n          \\       if work_date >= today:\\n                inspections.append(g)\\n\\\n          \\ \\n        if not inspections:\\n            return {\\\"result\\\": [\\\"\u6b21\u56de\u70b9\u691c\u4e88\u5b9a\u306f\u3042\u308a\u307e\u305b\u3093\u3002\\\"\\\n          ]}\\n \\n        # Sort inspections by scheduled date\\n        def parse_date(x):\\n\\\n          \\            d = x.get(SCHEDULED_DATE_FIELD)\\n            if \\\"/\\\" in d:\\n\\\n          \\                return datetime.strptime(d, \\\"%m/%d/%Y\\\")\\n           \\\n          \\ return datetime.strptime(d, \\\"%Y-%m-%d\\\")\\n \\n        inspections.sort(key=parse_date)\\n\\\n          \\ \\n        grouped_data = {}\\n        ordered_keys = []\\n \\n        # Build\\\n          \\ response grouped by date/time header\\n        for g in inspections:\\n\\n\\\n          \\            date_part = format_date_jp(g.get(SCHEDULED_DATE_FIELD))\\n \\\n          \\           start_time = format_time_jp(g.get(BEGIN_DATETIME_FIELD))\\n \\\n          \\           end_time = format_time_jp(g.get(END_DATETIME_FIELD))\\n \\n  \\\n          \\          header = f\\\"{date_part}\u3000{start_time}\uff5e{end_time}\\\"\\n \\n      \\\n          \\      model = model_map.get(str(g.get(MODEL_CODE_FIELD)), \\\"\u8a2d\u5099\\\")\\n\\n \\\n          \\           raw_goki = g.get(GOKI_FIELD, 'N/A')\\n\\n            try:\\n  \\\n          \\              unit = f\\\"{int(raw_goki):0>2}\u53f7\u6a5f\\\"\\n            except:\\n\\\n          \\                unit = f\\\"{raw_goki}\u53f7\u6a5f\\\"\\n \\n            inspection_label\\\n          \\ = \\\"\u5b9a\u671f\u70b9\u691c\\\"\\n \\n            equipment_detail = f\\\"{model} / {unit} / {inspection_label}\\\"\\\n          \\n \\n            if header not in grouped_data:\\n                grouped_data[header]\\\n          \\ = [equipment_detail]\\n                ordered_keys.append(header)\\n  \\\n          \\          else:\\n                grouped_data[header].append(equipment_detail)\\n\\\n          \\ \\n        final_results = []\\n \\n        for key in ordered_keys:\\n  \\\n          \\          details = \\\" | \\\".join(grouped_data[key])\\n            final_results.append(f\\\"\\\n          {key} | {details}\\\")\\n \\n        return {\\n            \\\"result\\\": final_results\\n\\\n          \\        }\\n \\n    except Exception as e:\\n        return {\\n          \\\n          \\  \\\"result\\\": [f\\\"Error: {str(e)}\\\"]\\n        }\"\n        code_language: python3\n        desc: 'This code processes inspection schedule data from a JSON input and\n          filters out only current and upcoming inspections based on the scheduled\n          date. It formats dates and times into a Japanese-style display and groups\n          inspection details (like equipment type and unit number) by their scheduled\n          time slots. The final output is a clean, human-readable list of upcoming\n          inspection schedules.\n\n          '\n        outputs:\n          result:\n            children: null\n            type: array[string]\n        selected: false\n        title: Button 3 Data Formatter\n        type: code\n        variables:\n        - value_selector:\n          - '17752167106220'\n          - body\n          value_type: string\n          variable: gms_records\n        - value_selector:\n          - '1765447295919'\n          - branch_code\n          value_type: string\n          variable: jigyou_cd\n        - value_selector:\n          - '1765447295919'\n          - customer_number\n          value_type: string\n          variable: kanri_no\n      height: 225\n      id: '1770715471535'\n      position:\n        x: 3413.8080287118637\n        y: 1094.716774773327\n      positionAbsolute:\n        x: 3413.8080287118637\n        y: 1094.716774773327\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        