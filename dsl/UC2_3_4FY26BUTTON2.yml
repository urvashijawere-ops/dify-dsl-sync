ed:\\n        dt = r[\\\"_dt\\\"]\\n        w_month\\\n          \\ = dt.strftime(\\\"%Y/%m\\\") if dt else \\\"N/A\\\"\\n\\n        if w_month not\\\n          \\ in grouped:\\n            b_name = next((r.get(normalize_key(col)) for\\\n          \\ col in COL[\\\"BUIL\\\"] if r.get(normalize_key(col))), \\\"\\\")\\n          \\\n          \\  grouped[w_month] = {\\n                \\\"\u652f\u793e\u30b3\u30fc\u30c9\\\": r.get(COL[\\\"OFFICE\\\"\\\n          ]),\\n                \\\"\u304a\u5ba2\u3055\u307e\u756a\u53f7\\\": r.get(COL[\\\"CUST\\\"]),\\n               \\\n          \\ \\\"\u30d3\u30eb\u540d\\\": b_name,\\n                \\\"\u4f5c\u696d\u6708\\\": w_month,\\n                \\\"\\\n          \u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\": set(),\\n                \\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\": set()\\n            }\\n\\n\\\n          \\        grouped[w_month][\\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\"].add(REPORT_CATEGORY_MAP.get(r.get(COL[\\\"\\\n          REP_CAT\\\"]), \\\"Unknown\\\"))\\n        grouped[w_month][\\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\"].add(PRODUCT_SERVICE_CATEGORY_MAP.get(r.get(COL[\\\"\\\n          PROD\\\"]), \\\"Unknown\\\"))\\n\\n        fname = r.get(COL[\\\"FILE\\\"])\\n      \\\n          \\  if fname and fname not in pdf_seen:\\n            pdf_seen.add(fname)\\n\\\n          \\            pdf_list.append({\\\"filename\\\": fname, \\\"content\\\": fname})\\n\\\n          \\n    # --- Step 4: Final Output ---\\n    final_output = [\\n        {\\n\\\n          \\            **v,\\n            \\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\": \\\", \\\".join(sorted(v[\\\"\u30ec\u30dd\u30fc\u30c8\u7a2e\u985e\\\"\\\n          ])),\\n            \\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\": \\\", \\\".join(sorted(v[\\\"\u88fd\u54c1\u30fb\u30b5\u30fc\u30d3\u30b9\u5206\u985e\\\"]))\\n\\\n          \\        }\\n        for k, v in sorted(grouped.items())\\n    ]