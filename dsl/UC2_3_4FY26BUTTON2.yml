6a5f\n\n            III \u2192 003\u53f7\u6a5f\n\n            ES1 \u2192 ES1\u53f7\u6a5f\n\n            NO1 \u2192 NO1\u53f7\u6a5f\n\n            R-1 \u2192 R-1 \u53f7\u6a5f\n\n            2-1 \u2192 2-1 \u53f7\u6a5f\n\n            unit -002 \u2192 002\u53f7\u6a5f\n\n\n            Don''t change alphanumeric Unit numbers. Keep them as it is\n\n\n            ==============================\n\n            MULTIPLE RULE\n\n            ==============================\n\n            If multiple equipments or multiple units:\n\n            \u2192 return ONLY equipment name\n\n\n            ==============================\n\n            INVALID\n\n            ==============================\n\n            Completely unrelated \u2192 (No equipment found)\n\n\n            ==============================\n\n            FINAL\n\n            ==============================\n\n            - Return ONLY one line\n\n            - No explanation\n\n\n            NEW FINAL RULE (VERY IMPORTANT)\n\n            - Never output UNIT_ONLY if previous equipment exists \u2192 combine instead'\n        - id: af2b0fcb-d7b2-48aa-ac6d-3a480d00847b\n          role: user\n          text: '{{#sys.query#}}'\n        selected: false\n        title: Japanese Language Handler\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 203\n      id: '1769155077062'\n      position:\n        x: 2258.840242297094\n        y: 184.2900312379885\n      positionAbsolute:\n        x: 2258.840242297094\n        y: 184.2900312379885\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        context:\n          enabled: true\n          variable_selector:\n          - '1765447295919'\n          - option_text\n        desc: This node analyzes free-text user input (Japanese, English, or mixed)\n          and normalizes it to a single predefined menu option by intent. It returns\n          the exact matching Japanese button text when the intent is clear and unambiguous;\n          otherwise, it returns an empty string.\n        model:\n          completion_params:\n            temperature: 0\n          mode: chat\n          name: gemini-3-pro-preview\n          provider: langgenius/gemini/google\n        prompt_template:\n        - id: 256f571b-d6f4-4f84-85db-dd0276bc9226\n          role: system\n          text: \"You are a normalization and intent-matching engine.\\nYour task:\\n\\\n            - Analyze the user's input text: {{#context#}}\\n- The input may be in\\\n            \\ Japanese, or any mixture of Japanese scripts.\\n- The input may be free\\\n            \\ text or may exactly match a button label.\\n- Determine whether the input\\\n            \\ semantically matches EXACTLY ONE of the predefined menu options below.\\n\\\n            \\nIf it matches:\\n- Output ONLY the EXACT Japanese button text listed\\\n            \\ below.\\n\\nIf it does NOT clearly and unambiguously match exactly one\\\n            \\ option:\\n- Output an empty string.\\n\\nIMPORTANT OUTPUT RULES:\\n- Output\\\n            \\ ONLY one line.\\n- Output ONLY the exact button text listed below OR\\\n            \\ an empty string.\\n- Do NOT add explanations, prefixes, suffixes, punctuation,\\\n            \\ or whitespace.\\n- Do NOT repeat or echo the user input.\\n- Do NOT translate\\\n            \\ into new wording.\\n- Do NOT return multiple options.\\n- Do NOT guess\\\n            \\ when intent is unclear.\\n\\nPredefined Menu Options (OUTPUT MUST MATCH\\\n            \\ EXACTLY ONE OF THESE STRINGS):\\n\\n1. \u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\n2. \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\n3. \u70b9\u691c\u65e5\u6642\u3092\u5909\u66f4\u3057\u305f\u3044\\n\\\n            4. \u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\n5. \u898b\u7a4d\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n6. \u5951\u7d04\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n7. \u305d\u306e\u4ed6\\n\\nMatching\\\n            \\ Guidelines:\\n- Treat synonyms, paraphrases, and polite variations as\\\n            \\ matches.\\n- Ignore tense, politeness, particles, and filler words.\\n\\\n            - Focus strictly on the user's core intent.\\n- If multiple intents appear\\\n            \\ or intent is ambiguous, return an empty string.\\n- If the input is unrelated\\\n            \\ to these options, return an empty string.\\n\\nIntent Mapping Examples\\\n            \\ (FOR UNDERSTANDING ONLY \u2014 DO NOT OUTPUT THESE):\\n\\n\\\"\u70b9\u691c\u7d50\u679c\u3092\u6559\u3048\u3066\u304f\u3060\u3055\u3044\\\"\\\n            \\ \u2192 \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\n\\\"\u70b9\u691c\u306f\u3044\u3064\u3067\u3059\u304b\\\" \u2192 \u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\n\\\"\u70b9\u691c\u306e\u65e5\u7a0b\u3092\u5909\u66f4\u3057\u305f\u3044\\\" \u2192 \u70b9\u691c\u65e5\u6642\u3092\u5909\u66f4\u3057\u305f\u3044\\n\\\n            \\\"\u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\\" \u2192 \u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\n\\\"\u898b\u7a4d\u304c\u6b32\u3057\u3044\\\" \u2192 \u898b\u7a4d\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n\\\"\u5951\u7d04\u66f8\u3092\u304f\u3060\u3055\u3044\\\"\\\n            \\ \u2192 \u5951\u7d04\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\n\\\"\u5b9a\u671f\u70b9\u691c\\\" \u2192 \u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\n\\\"\u305d\u306e\u4ed6\\\" \u2192  \u305d\u306e\u4ed6\\n\\nIf anything even\\\n            \\ remotely related to the buttons is entered, then it should correspond\\\n            \\ to that button.\\n\\nInvalid output cases:\\nIf the input contains multiple\\\n            \\ buttons text in any combination with any or no separator, it is invalid\\n\\\n            Example \\\"\u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044 \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\\" \\nThis input should return \u305d\u306e\u4ed6 as it is\\\n            \\ combination of multiple intents.\\n\\nIf the input does NOT clearly correspond\\\n            \\ to exactly one menu option:\\n\u2192 Output an \u305d\u306e\u4ed6.\"\n        - id: 99e36b32-1922-4181-8359-bc127bad6f30\n          role: user\n          text: '{{#1765447295919.option_text#}}'\n        selected: false\n        title: Option text handler\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 229\n      id: '1769163996583'\n      position:\n        x: 624.598907439241\n        y: 836.4268364753309\n      positionAbsolute:\n        x: 624.598907439241\n        y: 836.4268364753309\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        code: \"def main(user_input: str) -> dict:\\n    # The list of valid options\\\n          \\ from your initial selection menu\\n    valid_options = [\\n        \\\"\u70b9\u691c\u65e5\u6642\u3092\u77e5\u308a\u305f\u3044\\\"\\\n          , \\n        \\\"\u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\\\", \\n        \\\"\u70b9\u691c\u65e5\u6642\u3092\u5909\u66f4\u3057\u305f\u3044\\\", \\n        \\\"\u70b9\u691c\u30fb\u6545\u969c\u306e\u5bfe\u5fdc\u3092\u4f9d\u983c\u3057\u305f\u3044\\\"\\\n          , \\n        \\\"\u898b\u7a4d\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\\", \\n        \\\"\u5951\u7d04\u66f8\u3092\u9001\u4ed8\u3057\u3066\u307b\u3057\u3044\\\",\\n        \\\"\u305d\u306e\u4ed6\\\"\\\n          \\n    ]\\n    \\n    # Strip whitespace to ensure a clean comparison\\n   \\\n          \\ cleaned_input = user_input.strip() if user_input else \\\"\\\"\\n    \\n   \\\n          \\ if cleaned_input in valid_options:\\n        # If the input matches one\\\n          \\ of the menu options\\n        return {\\n            \\\"is_valid_option\\\"\\\n          : \\\"True\\\",\\n            \\\"input_value\\\": cleaned_input\\n        }\\n   \\\n          \\ else:\\n        # If the input is not in the list (Triggering an error\\\n          \\ state)\\n        return {\\n            \\\"is_valid_option\\\": \\\"False\\\",\\n\\\n          \\            \\\"input_value\\\": cleaned_input\\n        }\"\n        code_language: python3\n        desc: 'This node validates the user\u2019s input against a predefined list of menu\n          options.\n\n          It trims whitespace, checks whether the input exactly matches one of the\n          allowed options, and returns whether the input is valid along with the cleaned\n          input value.'\n        outputs:\n          input_value:\n            children: null\n            type: string\n          is_valid_option:\n            children: null\n            type: string\n        selected: false\n        title: OPTION SELECTOR\n        type: code\n        variables:\n        - value_selector:\n          - '1765447295919'\n          - option_text\n          value_type: string\n          variable: user_input\n      height: 193\n      id: '1769520574387'\n      position:\n        x: -76.98465212758799\n        y: 647.916092802925\n      positionAbsolute:\n        x: -76.98465212758799\n        y: 647.916092802925\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: contains\n            id: b6644cfa-78da-4385-866a-70ab79ebb9c7\n            value: 'True'\n            varType: string\n            variable_selector:\n            - '1769520574387'\n            - is_valid_option\n          - comparison_operator: not empty\n            id: 0bd3c676-6fe2-413a-b94f-4485f9330ac7\n            value: ''\n            varType: string\n        