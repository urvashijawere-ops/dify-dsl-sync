idth: 243\n    - data:\n        answer: '\u3044\u3064\u5b9f\u65bd\u3057\u305f\u70b9\u691c\u7d50\u679c(\u30ec\u30dd\u30fc\u30c8)\u304c\u5fc5\u8981\u3067\u3059\u304b\uff1f\n\n          \u5165\u529b\u4f8b\uff1a  \u6628\u5e74\u306e\u7a7a\u8abf\u8a2d\u5099\u306e\u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044'\n        desc: This node collects clarifying information needed to retrieve the correct\n          inspection results.\n        selected: false\n        title: Inspection Query\n        type: answer\n        variables: []\n      height: 193\n      id: '1768201126356'\n      position:\n        x: 2611.58210636089\n        y: 432.49236350122226\n      positionAbsolute:\n        x: 2611.58210636089\n        y: 432.49236350122226\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        desc: 'This node sets the option_selected variable to a specific predefined\n          menu option value(Button1).\n\n          It is used to explicitly assign or override the selected option for downstream\n          processing and routing.'\n        items:\n        - input_type: constant\n          operation: set\n          value: \u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\n          variable_selector:\n          - conversation\n          - option_selected\n          write_mode: over-write\n        selected: false\n        title: Query Assigner\n        type: assigner\n        version: '2'\n      height: 193\n      id: '17682032247030'\n      position:\n        x: 2245.1852546762593\n        y: 439.5496310804681\n      positionAbsolute:\n        x: 2245.1852546762593\n        y: 439.5496310804681\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        context:\n          enabled: true\n          variable_selector:\n          - sys\n          - query\n        desc: This node validates user's query and extracts required inspection context\n          (date, report type, or equipment), rejects invalid queries, and, when valid,\n          outputs normalized inspection date, equipment codes, and report type codes\n          in a strict JSON format.\n        model:\n          completion_params:\n            temperature: 0\n          mode: chat\n          name: gemini-3-pro-preview\n          provider: langgenius/gemini/google\n        prompt_template:\n        - id: e2305b4c-bb31-4bac-a085-a6b0694751f1\n          role: system\n          text: 'You are an Inspection Intent Extraction Engine.\n\n            Analyze user input: {{#context#}}\n\n            Extract structured intent for inspection report retrieval.\n\n\n            CORE BEHAVIOR\n\n            Be flexible in understanding Japanese input (Kanji, Hiragana, Katakana,\n            mixed forms).\n\n            Map words even if loosely or indirectly related.\n\n            Do NOT strictly rely on exact substrings.\n\n            If meaning is unclear \u2192 treat as PARTIAL.\n\n            If unrelated \u2192 treat as INVALID.\n\n            If user intent is broad (e.g., \u201call\u201d, \u201c\u5168\u90e8\u201d, \u201c\u3059\u3079\u3066\u201d) \u2192 treat as FULL input.\n\n\n            STEP 1 \u2014 EQUIPMENT TYPE\n\n            Map to codes:\n\n            1: \u30a8\u30ec\u30d9\u30fc\u30bf\u30fc / \u6607\u964d\u6a5f\n\n            2: \u30a8\u30b9\u30ab\u30ec\u30fc\u30bf\u30fc / \u30aa\u30fc\u30c8\u30e9\u30a4\u30f3\n\n            3: \u7a7a\u8abf / \u30a8\u30a2\u30b3\u30f3\n\n            4: \u30d3\u30eb / \u5efa\u7269 / \u8a2d\u5099 / \u9632\u72af / \u6d88\u9632 / \u30ab\u30e1\u30e9 / \u81ea\u52d5\u30c9\u30a2 / \u7ba1\u7406\n\n            Rules:\n\n            Accept loosely related words.\n\n            If multiple \u2192 return unique sorted.\n\n            If none detected \u2192 return [].\n\n\n            STEP 2 \u2014 REPORT TYPE\n\n            Map to codes:\n\n            1: \u30e1\u30f3\u30c6\u30ca\u30f3\u30b9 / \u6574\u5099 / \u4f5c\u696d / \u70b9\u691c\u7d50\u679c\n\n            2: \u30d8\u30ea\u30aa\u30b9 / \u9060\u9694\u76e3\u8996\n\n            3: \u70b9\u691c / \u691c\u67fb / \u6cd5\u5b9a / \u5b9a\u671f\n\n            4: \u76e3\u8996\u5831\u544a / \u76e3\u67fb\u5831\u544a\u66f8\n\n            5: \u5199\u771f\n\n            Rules:\n\n            Flexible matching allowed.\n\n            If \u201c\u9060\u9694\u76e3\u8996\u201d present \u2192 include 2 and 4.\n\n            If none detected \u2192 return [].\n\n\n            STEP 3 \u2014 DATE\n\n            Extract any date/time expression as-is.\n\n            Examples: YYYY, YYYY\u5e74, \u5148\u6708, last year etc.\n\n            If words like \u6700\u65b0 / \u6700\u8fd1 / \u524d\u56de \u2192 return null.\n\n            If none \u2192 null.\n\n\n            STEP 4 \u2014 PARTIAL DETECTION\n\n            Mark as PARTIAL if:\n\n            User intent exists BUT missing key info (equipment/report/date)\n\n            Examples:\n\n            \u201c\u30ec\u30dd\u30fc\u30c8\u3092\u51fa\u529b\u3057\u3066\u201d \u2192 PARTIAL\n\n            \u201cPDF\u3067\u51fa\u3057\u3066\u201d \u2192 PARTIAL\n\n            \u201c\u70b9\u691c\u7d50\u679c\u898b\u305b\u3066\u201d \u2192 NOT PARTIAL\n\n            If PARTIAL:\n\n            Return extracted values as-is.\n\n\n            Rules:\n\n            - Keep detected equipment_codes\n\n            - Keep detected report_type_codes\n\n            - Keep detected inspection_date\n\n            - Only missing fields remain empty or null\n\n\n            Example:\n\n            \u30d8\u30ea\u30aa\u30b9\u30ec\u30dd\u30fc\u30c8 \u2192\n\n            {\n\n            \"valid\": true,\n\n            \"isPartial\": true,\n\n            \"inspection_date\": null,\n\n            \"equipment_codes\": [],\n\n            \"report_type_codes\": [2]\n\n            }\n\n\n            STEP 5 \u2014 FULL INPUT\n\n            If user clearly requests:\n\n            \u201c\u5168\u90e8\u201d\n\n            \u201c\u3059\u3079\u3066\u201d\n\n            \u201call reports\u201d\n\n            Then:\n\n            Treat as FULL input\n\n            equipment_codes = [1,2,3,4]\n\n            report_type_codes = [1,2,3,4,5]\n\n            inspection_date = null\n\n            If user doesn''t give all or similar then input is considered FULL INPUT\n            only when all three parameters are given.\n\n            equipment_codes = [1,2,3,4]\n\n            report_type_codes = [1,2,3,4,5]\n\n            inspection_date = \"exact extracted text\"\n\n\n            STEP 6 \u2014 INVALID\n\n            If:\n\n            Input unrelated to inspection\n\n            OR user fails to clarify after ambiguity (assume previous attempt failed)\n\n            Return:\n\n            {\n\n            \"valid\": false,\n\n            \"isPartial\": false,\n\n            \"reason\": \"User query does not match inspection-related intent.\"\n\n            }\n\n\n            STEP 7 \u2014 OUTPUT FORMAT\n\n            VALID:\n\n            {\n\n            \"valid\": true,\n\n            \"isPartial\": false,\n\n            \"inspection_date\": \"<text or null>\",\n\n            \"equipment_codes\": [numbers],\n\n            \"report_type_codes\": [numbers]\n\n            }\n\n\n            STRICT RULES\n\n            Output ONLY JSON\n\n            No explanation\n\n            No extra text\n\n            Sorted unique integer arrays only\n\n            Field order:\n\n            valid, isPartial, inspection_date, equipment_codes, report_type_codes\n\n\n            IMPORTANT STATE RULES:\n\n\n            - Extract ONLY from current user input.\n\n            - DO NOT consider previous conversation.\n\n            - DO NOT merge or remember anything.\n\n            - If information is unclear or missing \u2192 mark isPartial = true.\n\n            - If user input is unrelated \u2192 mark valid = false.\n\n            - If user uses words like \"\u5168\u90e8\", \"\u3059\u3079\u3066\", \"all\" \u2192 treat as full input.\n\n\n            You must ONLY output JSON.'\n        - id: efd61aaf-438d-4eb2-8075-322f8b87f82f\n          role: user\n          text: '{{#sys.query#}}'\n        selected: false\n        title: INSPECTION QUERY INPUT\n        type: llm\n        variables: []\n        vision:\n          enabled: false\n      height: 213\n      id: '1768211570966'\n      position:\n        x: 3004.599434978268\n        y: 597.6631982241332\n      positionAbsolute:\n        x: 3004.599434978268\n        y: 597.6631982241332\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        cases:\n        - case_id: 'true'\n          conditions:\n          - comparison_operator: contains\n            id: ce46dd3d-19ae-4ac4-8a48-3d86d53a5bb9\n            value: complete\n            varType: string\n            variable_selector:\n            - '1775027245783'\n            - status\n          id: 'true'\n          logical_operator: and\n        - case_id: dd08c401-f8ad-4229-8ff8-5a7d651c24d7\n          conditions:\n          - comparison_operator: contains\n            id: ffee5b9d-0e35-45eb-a82f-ac9a071a308b\n            value: partial\n            varType: string\n            variable_selector:\n            - '1775027245783'\n            - status\n          id: dd08c401-f8ad-4229-8ff8-5a7d651c24d7\n          logical_operator: and\n        - case_id: c044da91-9bce-4a3b-b2bb-6347011a20fc\n          conditions:\n          - comparison_operator: contains\n            id: 6cfcb961-d6b3-4dd2-8c64-dc9ea795bffb\n            value: invalid\n            varType: string\n            variable_selector:\n            - '1775027245783'\n            - status\n          id: c044da91-9bce-4a3b-b2bb-6347011a20fc\n          logical_operator: and\n        desc: This node checks whether the output from Inspection Query Input node\n          is complete, partial or invalid.\n        selected: false\n        title: Query Input Validator\n        type: if-else\n      height: 281\n      id: '1768212707505'\n      position:\n        x: 3571.2988178206792\n        y: 563.646242438604\n      positionAbsolute:\n        x: 3571.2988178206792\n        y: 563.646242438604\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        answer: '\u6b63\u3057\u3044\u5165\u529b\u3092\u63d0\u4f9b\u3057\u3066\u304f\u3060\u3055\u3044\u3002\n\n          \u4f8b\uff1a\u6628\u5e74\u306e\u7a7a\u8abf\u8a2d\u5099\u306e\u691c\u67fb\u5831\u544a\u66f8\u306e\u70b9\u691c\u7d50\u679c\u3092\u77e5\u308a\u305f\u3044\n\n          '\n        desc: This node displays the message for scenarios when invalid query input\n          is entered for inspection results.\n        selected: false\n        title: Invalid Input Message\n        type: answer\n        variables: []\n      height: 193\n      id: '1768218902888'\n      position:\n        x: 4343.239974771515\n        y: 785.7025702366794\n      positionAbsolute:\n        x: 4343.239974771515\n        y: 785.7025702366794\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        code: \"import json\\nimport re\\nfrom datetime import datetime\\n\\ndef main(input_json):\\n\\\n          \\    # 1. Parse Input\\n    try:\\n        result = json.loads(input_json)\\\n          \\ if isinstance(input_json, str) else input_json\\n    except (json.JSONDecodeError,\\\n          \\ TypeError):\\n        return {\\\"error\\\": \\\"Invalid JSON input\\\"}\\n\\n  \\\n          \\  raw_date_str = str(result.get(\\\"inspection_date\\\", \\\"\\\") or \\\"\\\")\\n \\\n          \\   now = datetime.now()\\n\\n    # Default output structure\\n    output_defaults\\\n          \\ = {\\n        \\\"formatted_date\\\": \\\"\\\",\\n        \\\"start_date\\\": \\\"\\\",\\n\\\n          \\        \\\"end_date\\\": \\\"\\\",\\n        \\\"date_scope\\\": \\\"LATEST\\\",\\n    \\\n          \\    \\\"discrete_dates\\\": []\\n    }\\n\\n    # =====================================================\\n\\\n          \\    # 1. RELATIVE DATE DETECTION (Highest Priority)\\n    # =====================================================\\n\\\n          \\    relative_year = None\\n    relative_month_offset = None\\n\\n    # Year\\\n          \\ Keywords\\n    if \\\"\u4eca\u5e74\\\" in raw_date_str:\\n        relative_year = now.year\\n\\\n          \\    elif any(k in raw_date_str for k in [\\\"\u6628\u5e74\\\", \\\"\u53bb\u5e74\\\"]):\\n        relative_year\\\n          \\ = now.year - 1\\n    elif \\\"\u4e00\u6628\u5e74\\\" in raw_date_str:\\n        relative_year\\\n          \\ = now.year - 2\\n    \\n    # X\u5e74\u524d Match\\n    year_ago_match = re.search(r\\\"\\\n          (\\\\d+)\u5e74\u524d\\\", raw_date_str)\\n    if year_ago_match:\\n        relative_year\\\n          \\ = now.year - int(year_ago_match.group(1))\\n\\n    # Month Keywords\\n  \\\n          \\  if \\\"\u4eca\u6708\\\" in raw_date_str:\\n        relative_month_offset = 0\\n    elif\\\n          \\ \\\"\u5148\u6708\\\" in raw_date_str:\\n        relative_month_offset = -1\\n    elif\\\n          \\ \\\"\u5148\u3005\u6708\\\" in raw_date_str:\\n        relative_month_offset = -2\\n    elif\\\n          \\ \\\"\u518d\u6765\u6708\\\" in raw_date_str:\\n        relative_month_offset = 1\\n\\n    # X\u30f6\u6708\u524d\\\n          \\ Match\\n    months_ago_match = re.search(r\\\"(\\\\d+)(?:\u30f6\u6708|\u304b\u6708|\u30ab\u6708)\u524d\\\", raw_date_str)\\n\\\n          \\    if months_ago_match:\\n        relative_month_offset = -int(months_ago_match.group(1))\\n\\\n          \\n    # Apply relative calculation\\n    if relative_month_offset is not\\\n          \\ None:\\n        # Proper year/month rollover math\\n        total_months\\\n          \\ = now.year * 12 + (now.month - 1) + relative_month_offset\\n        calc_year\\\n          \\ = total_months // 12\\n        calc_month = total_months % 12 + 1\\n   \\\n          \\     \\n        output_defaults.update({\\n            \\\"date_scope\\\": \\\"\\\n          MONTH\\\",\\n            \\\"formatted_date\\\": f\\\"{calc_month:02d}/{calc_year}\\\"\\\n          \\n        })\\n    elif relative_year is not None:\\n        month_match =\\\n          \\ re.search(r\\\"(\\\\d{1,2})\u6708\\\", raw_date_str)\\n        if month_match:\\n \\\n          \\           output_defaults.update({\\n                \\\"date_scope\\\": \\\"\\\n          MONTH\\\",\\n                \\\"formatted_date\\\": f\\\"{int(month_match.group(1)):02d}/{relative_year}\\\"\\\n          \\n            })\\n        else:\\n            output_defaults.update({\\n\\\n          \\                \\\"date_scope\\\": \\\"YEAR\\\",\\n                \\\"formatted_date\\\"\\\n          : str(relative_year)\\n            })\\n\\n    # Return immediately if relative\\\n          \\ detection triggered\\n    if output_defaults[\\\"date_scope\\\"] != \\\"LATEST\\\"\\\n          :\\n        result.update(output_defaults)\\n        return {\\\"result\\\": json.dumps(result,\\\n          \\ ensure_ascii=False)}\\n\\n    # =====================================================\\n\\\n          \\    # 2. COLLECTING DATE COMPONENTS (Ranges, Months, Years)\\n    # =====================================================\\n\\\n          \\    \\n    # Range Collection\\n    collected_ranges = []\\n    # Year Range:\\\n          \\ 2022\u5e74\u304b\u30892024\u5e74\\n    for m in re.finditer(r\\\"(\\\\d{4})\u5e74?\\\\s*(?:\u304b\u3089|\u301c|\uff5e|-|\u30fc|to)\\\\\\\n          s*(\\\\d{4})\u5e74?\\\", raw_date_str):\\n        collected_ranges.append((\\\"RANGE\\\"\\\n          , str(m.group(1)), str(m.group(2))))\\n    \\n    # Month Range: 2024\u5e741\u6708\u304b\u30893\u6708\\n\\\n          \\    if not collected_ranges:\\n        for m in re.finditer(r\\\"(\\\\d{4})\u5e74\\\\\\\n          s*(\\\\d{1,2})\u6708\\\\s*(?:\u304b\u3089|\u301c|\uff5e|-|\u30fc|to)\\\\s*(\\\\d{1,2})\u6708\\\", raw_date_str):\\n  \\\n          \\          y, s_m, e_m = m.group(1), int(m.group(2)), int(m.group(3))\\n\\\n          \\            collected_ranges.append((\\\"RANGE\\\", f\\\"{s_m:02d}/{y}\\\", f\\\"\\\n          {e_m:02d}/{y}\\\"))\\n\\n    # Single Month/Year Collection\\n    collected_months\\\n          \\ = re.findall(r\\\"(\\\\d{4})\u5e74\\\\s*(\\\\d{1,2})\u6708\\\", raw_date_str)\\n    \\n    #\\\n          \\ Standalone Years: Filter out years that were already part of a month match\\n\\\n          \\    found_years = re.findall(r\\\"(\\\\d{4})\u5e74?\\\", raw_date_str)\\n    month_years\\\n          \\ = {y for y, m in collected_months}\\n    collected_years = sorted(list(set(y\\\n          \\ for y in found_years if y not in month_years)))\\n\\n    # =====================================================\\n\\\n          \\    # 3. DECISION LOGIC (Exact Priority Preserved)\\n    # =====================================================\\n\\\n          \\    if collected_ranges:\\n        scope, start, end = \\\"RANGE\\\", collected_ranges[0][1],\\\n          \\ collected_ranges[0][2]\\n        output_defaults.update({\\\"date_scope\\\"\\\n          : scope, \\\"start_date\\\": start, \\\"end_date\\\": end})\\n\\n    elif len(collected_months)\\\n          \\ > 1:\\n        output_defaults.update({\\n            \\\"date_scope\\\": \\\"\\\n          MULTI\\\",\\n            \\\"discrete_dates\\\": [f\\\"{int(m):02d}/{y}\\\" for y,\\\n          \\ m in collected_months]\\n        })\\n\\n    elif len(collected_months) ==\\\n          \\ 1:\\n        y, m = collected_months[0]\\n        output_defaults.update({\\\"\\\n          date_scope\\\": \\\"MONTH\\\", \\\"formatted_date\\\": f\\\"{int(m):02d}/{y}\\\"})\\n\\n\\\n          \\    elif len(collected_years) > 1:\\n        output_defaults.update({\\\"\\\n          date_scope\\\": \\\"MULTI\\\", \\\"discrete_dates\\\": collected_years})\\n\\n    elif\\\n          \\ len(collected_years) == 1:\\n        output_defaults.update({\\\"date_scope\\\"\\\n          : \\\"YEAR\\\", \\\"formatted_date\\\": collected_years[0]})\\n\\n    # Final Merge\\\n          \\ and Output\\n    result.update(output_defaults)\\n    return {\\\"result\\\"\\\n          : json.dumps(result, ensure_ascii=False)}\"\n        code_language: python3\n        desc: This node parses a free-text inspection date input and normalizes it\n          into a structured format, identifying whether it represents a specific month,\n          year, date range, latest, or a relative time period, and outputs standardized\n          date fields and scope.\n        outputs:\n          result:\n            children: null\n            type: string\n        selected: false\n        title: Inspection Date Extractor\n        type: code\n        variables:\n        - value_selector:\n          - conversation\n          - button2_inspection_state\n          value_type: object\n          variable: input_json\n      height: 177\n      id: '1768387673605'\n      position:\n        x: 4206.7334967269735\n        y: 394.3008680785606\n      positionAbsolute:\n        x: 4206.7334967269735\n        y: 394.3008680785606\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 243\n    - data:\n        desc: ''\n        error_handle_mode: terminated\n        height: 198.58388539353666\n        is_parallel: false\n        iterator_input_type: array[object]\n        iterator_selector:\n        - '17679567286580'\n        - pdf_list\n        output_selector:\n        - '1768412970709'\n        - files\n        output_type: array[file]\n        parallel_nums: 10\n        selected: false\n        start_node_id: 1768412892468start\n        title: Iteration\n        type: iteration\n        width: 688\n      height: 199\n      id: '1768412892468'\n      position: