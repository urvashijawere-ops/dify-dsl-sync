        selected: false
        title: Answer
        type: answer
        variables: []
      height: 149
      id: answer
      position:
        x: 732.4004765929358
        y: 282
      positionAbsolute:
        x: 732.4004765929358
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: "import requests\n\ndef main(from_cur: str, to_cur: str, amount: float,\
          \ api_key: str) -> dict:\n    #api_key = env.get(\"EXCHANGE_API_KEY\")\n\
          \    #api_key = \"9b49904ae724c1f2cc47c482\"\n    \n    if not api_key:\n\
          \        raise ValueError(\"Missing EXCHANGE_API_KEY in environment variables\"\
          )\n\n    url = f\"https://v6.exchangerate-api.com/v6/{api_key}/pair/{from_cur}/{to_cur}/{amount}\"\
          \n    \n    try:\n        response = requests.get(url, timeout=10)\n   \
          \     response.raise_for_status()\n        data = response.json()\n    except\
          \ requests.RequestException as e:\n        return {\n            \"success\"\
          : False,\n            \"error\": str(e)\n        }\n\n    # API-specific\
          \ handling\n    if data.get(\"result\") != \"success\":\n        return\
          \ {\n            \"success\": False,\n            \"error\": data.get(\"\
          error-type\", \"Unknown API error\"),\n            \"raw\": data\n     \
          \   }\n\n    return {\"result\" : {\n        \"success\": True,\n      \
          \  \"from\": from_cur,\n        \"to\": to_cur,\n        \"amount\": amount,\n\
          \        \"converted_amount\": data.get(\"conversion_result\"),\n      \
          \  \"rate\": data.get(\"conversion_rate\")\n    }}\n"
        code_language: python3
        desc: ''
        outputs:
          result:
            children: null
            type: object
