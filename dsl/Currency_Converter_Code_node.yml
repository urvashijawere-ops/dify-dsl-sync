app:
  description: Converts any currency pair using ExchangeRate-API. Enter the source
    currency, target currency, and amount — the converted value is returned instantly.
  icon: 💱
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: Currency Converter Code node
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
workflow:
  conversation_variables: []
  environment_variables:
  - description: ''
    id: f9397188-09a1-4268-bc2f-e6d8f8f1f313
    name: EXCHANGE_API_KEY
    selector:
    - env
    - EXCHANGE_API_KEY
    value: 9b49904ae724c1f2cc47c482
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 50
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: '💱 **Currency Converter**


      Please fill in the three fields to convert between any two currencies:

      - **From Currency** — e.g. `EUR`

      - **To Currency**   — e.g. `GBP`

      - **Amount**        — e.g. `100`

      '
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - EUR → GBP, amount 100
    - USD → INR, amount 500
    - GBP → JPY, amount 250
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInLoop: false
        sourceType: start
        targetType: code
      id: 1776686402897-source-1777007058293-target
      source: '1776686402897'
      sourceHandle: source
      target: '1777007058293'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInLoop: false
        sourceType: code
        targetType: answer
      id: 1777007058293-source-answer-target
      source: '1777007058293'
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: User provides source currency, target currency, and amount
        selected: false
        title: Start
        type: start
        variables:
        - label: From Currency
          max_length: 10
          required: true
          type: text-input
          variable: from_currency
        - label: To Currency
          max_length: 10
          required: true
          type: text-input
          variable: to_currency
        - label: Amount
          required: true
          type: number
          variable: amount
