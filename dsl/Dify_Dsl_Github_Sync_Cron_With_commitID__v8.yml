 selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n    - data:\n        code: \"import httpx\\n\\ndef main(DIFY_ACCESS_TOKEN: str, DIFY_HOST: str):\\n\\\n          \\    # Standardize the host URL\\n    host = DIFY_HOST.rstrip('/')\\n    url\\\n          \\ = f\\\"{host}/console/api/apps?page=1&limit=10\\\"\\n    \\n    headers = {\\n\\\n          \\        \\\"Authorization\\\": f\\\"Bearer {DIFY_ACCESS_TOKEN}\\\",\\n        \\\"\\\n          Content-Type\\\": \\\"application/json\\\"\\n    }\\n    \\n    try:\\n        with\\\n          \\ httpx.Client(timeout=30.0) as client:\\n            resp = client.get(url,\\\n          \\ headers=headers)\\n            \\n            # If status is not 200, this\\\n          \\ will trigger the 'except' block\\n            resp.raise_for_status()\\n\\\n          \\            \\n            data = resp.json()\\n            apps = data.get('data',\\\n          \\ [])\\n\\n            # Get the total count of all apps in the workspace\\n\\\n          \\            total_count = len(apps)\\n            \\n            return {\\n\\\n          \\                \\\"apps_list\\\": apps,\\n                \\\"total_apps_in_workspace\\\"\\\n          : total_count,\\n                \\\"status\\\": \\\"Success\\\" if apps else \\\"\\\n          No Apps Found\\\"\\n            }\\n    except Exception as e:\\n        # This\\\n          \\ will now return the actual error message from the server\\n        error_detail\\\n          \\ = \\\"\\\"\\n        if hasattr(e, 'response'):\\n            error_detail =\\\n          \\ f\\\" | Details: {e.response.text}\\\"\\n            \\n        return {\\n \\\n          \\           \\\"apps_list\\\": [],\\n            \\\"total_apps_in_workspace\\\"\\\n          : 0,\\n            \\\"status\\\": f\\\"Error: {str(e)}{error_detail}\\\"\\n     \\\n          \\   }\"\n        code_language: python3\n        desc: Fetches the appli