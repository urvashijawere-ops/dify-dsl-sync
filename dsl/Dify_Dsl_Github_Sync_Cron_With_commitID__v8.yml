idth: 359\n      zIndex: 1\n    - data:\n        desc: ''\n        isInIteration: true\n        selected: false\n        title: ''\n        type: iteration-start\n      draggable: false\n      height: 48\n      id: 1777946437156start\n      parentId: '1777946437156'\n      position:\n        x: 24\n        y: 68\n      positionAbsolute:\n        x: 2228.7516789098563\n        y: 848.4443632996573\n      selectable: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom-iteration-start\n      width: 44\n      zIndex: 1002\n    - data:\n        code: \"import httpx\\nimport base64\\n\\ndef main(DIFY_ACCESS_TOKEN: str, DIFY_HOST:\\\n          \\ str, GITHUB_TOKEN: str, GITHUB_REPO: str, GITHUB_OWNER: str, app_id: dict,\\\n          \\ app_name: dict):\\n    # 1. Extract IDs from the iteration objects\\n  \\\n          \\  actual_id = app_id.get('id')\\n    actual_name = app_name.get('name')\\n\\\n          \\    \\n    # Setup Headers\\n    dify_headers = {\\\"Authorization\\\": f\\\"Bearer\\\n          \\ {DIFY_ACCESS_TOKEN}\\\"}\\n    github_headers = {\\n        \\\"Authorization\\\"\\\n          : f\\\"Bearer {GITHUB_TOKEN}\\\",\\n        \\\"Accept\\\": \\\"application/vnd.github+json\\\"\\\n          \\n    }\\n\\n    # Setup File Paths\\n    clean_name = \\\"\\\".join(c for c in\\\n          \\ actual_name if c.isalnum() or c in (' ', '_')).strip().replace(' ', '_')\\n\\\n          \\    file_path = f\\\"dsl/{clean_name}.yml\\\"\\n    github_url = f\\\"https://api.github.com/repos/{GITHUB_OWNER}/{GITHUB_REPO}/contents/{file_path}\\\"\\\n          \\n\\n    try:\\n        with httpx.Client(timeout=120.0) as client:\\n    \\\n          \\        # --- STEP A: FETCH FROM DIFY ---\\n            dify_url = f\\\"{DIFY_HOST}/console/api/apps/{actual_id}/export\\\"\\\n          \\n            dify_resp = client.get(dify_url, headers=dify_headers)\\n \\\n          \\           dify_resp.raise_for_status()\\n            new_content = dify_resp.text\\n\\\n          \\n            # --- STEP B: CHECK GITHUB FOR SHA ---\\n            sha =\\\n          \\ None\\n            get_resp = client.get(github_url, headers=github_headers)\\n\\\n          \\            \\n            if get_resp.status_code == 200:\\n           \\\n          \\     data = get_resp.json()\\n                sha = data['sha']\\n      \\\n          \\          remote_raw = base64.b64decode(data['content']).decode('utf-8')\\n\\\n          \\                \\n                # Compare content to skip unnecessary\\\n          \\ commits\\n                if remote_raw.strip() == new_content.strip():\\n\\\n          \\                    return {\\\"result\\\": {\\\"app\\\": actual_name, \\\"status\\\"\\\n          : \\\"Skipped\\\", \\\"commit_id\\\": \\\"N/A\\\"}}\\n\\n            # --- STEP C: PUSH\\\n          \\ TO GITHUB ---\\n            payload = {\\n                \\\"message\\\": f\\\"\\\n          sync: {actual_name}\\\",\\n                \\\"content\\\": base64.b64encode(new_content.encode('utf-8')).decode('utf-8'),\\n\\\n          \\                \\\"branch\\\": \\\"main\\\"\\n            }\\n            if sha:\\\n          \\ payload[\\\"sha\\\"] = sha\\n                \\n            put_resp = client.put(github_url,\\\n          \\ headers=github_headers, json=payload)\\n            put_resp.raise_for_status()\\n\\\n          \\            new_sha = put_resp.json().get('commit', {}).get('sha', 'Unknown')[:7]\\n\\\n          \\            \\n            return {\\n                \\\"result\\\": {\\n   \\\n          \\                 \\\"app\\\": actual_name,\\n                    \\\"status\\\"\\\n          : \\\"Success\\\",\\n                    \\\"commit_id\\\": new_sha\\n           \\\n          \\     }\\n            }\\n\\n    except Exception as e:\\n        return {\\n\\\n          \\            \\\"result\\\": {\\n                \\\"app\\\": actual_name,\\n    \\\n          \\            \\\"status\\\": \\\"Error\\\",\\n                \\\"commit_id\\\": str(e)[:100]\\\n          \\ # Limit error length\\n            }\\n        }\"\n        code_language: python3\n        desc: ''\n        isInIteration: true\n        isInLoop: false\n        iteration_id: '1777946437156'\n        outputs:\n          result:\n            children: null\n            type: object\n        selected: false\n        title: FETCH_DSL_AND_GIT_PUSH\n        type: code\n        variables:\n        - value_selector:\n          - '1777946437156'\n          - item\n          value_type: object\n          variable: app_id\n        - value_selector:\n          - '1777946437156'\n          - item\n          value_type: object\n          variable: app_name\n        - value_selector:\n          - env\n          - DIFY_ACCESS_TOKEN\n          value_type: secret\n          variable: DIFY_ACCESS_TOKEN\n        - value_selector:\n          - env\n          - DIFY_HOST\n          value_type: string\n          variable: DIFY_HOST\n        - value_selector:\n          - env\n          - GITHUB_TOKEN\n          value_type: secret\n          variable: GITHUB_TOKEN\n        - value_selector:\n          - env\n          - GITHUB_REPO\n          value_type: string\n          variable: GITHUB_REPO\n        - value_selector:\n          - env\n          - GITHUB_OWNER\n          value_type: string\n          variable: GITHUB_OWNER\n      height: 53\n      id: '1777953472507'\n      parentId: '1777946437156'\n      position:\n        x: 94.40051930470781\n        y: 65\n      positionAbsolute:\n        x: 2299.152198214564\n        y: 845.4443632996573\n      selected: false\n      sourcePosition: right\n      targetPosition: left\n      type: custom\n      width: 244\n      zIndex: 1002\n    viewport:\n      x: -731.2568124966992\n      y: 83.180085591568\n      zoom: 0.44563016405360695\n"}
