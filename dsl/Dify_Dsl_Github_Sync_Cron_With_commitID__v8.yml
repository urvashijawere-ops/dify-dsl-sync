(time.perf_counter() - t0) * 1000, 2)\\n\\t\\texcept SyntaxError\\\n          \\ as exc:\\n\\t\\t\\tentry['parse_ms'] = round((time.perf_counter() - t0) *\\\n          \\ 1000, 2)\\n\\t\\t\\tentry['errors'].append(f'SyntaxError line {exc.lineno}:\\\n          \\ {exc.msg}')\\n\\t\\t\\tentry['status'] = 'FAIL'\\n\\t\\t\\ttotal_err += 1\\n\\t\\t\\\n          \\tresults[filename] = entry\\n\\t\\t\\tcontinue\\n\\n\\t\\t# Stage 2 \u2014 AST quality\\\n          \\ checks (in-memory AST walk, no disk access)\\n\\t\\tfor node in ast.walk(tree):\\n\\\n          \\t\\t\\tif isinstance(node, ast.ExceptHandler) and node.type is None:\\n\\t\\t\\\n          \\t\\tentry['warnings'].append(f'line {node.lineno}: {WARN_BARE_EXCEPT}')\\n\\\n          \\t\\t\\tif (isinstance(node, ast.Call)\\n\\t\\t\\t\\t\\tand isinstance(getattr(node,\\\n          \\ 'func', None), ast.Name)\\n\\t\\t\\t\\t\\tand node.func.id == 'print'):\\n\\t\\t\\\n          \\t\\tentry['warnings'].append(f'line {node.lineno}: {WARN_PRINT_STMT}')\\n\\\n          \\t\\tfor i, line in enumerate(source.splitlines(), 1):\\n\\t\\t\\ts = line.lstrip()\\n\\\n          \\t\\t\\tif s.startswith('#') and any(kw in s.upper() for kw in ('TODO', 'FIXME')):\\n\\\n          \\t\\t\\t\\tentry['warnings'].append(f'line {i}: {WARN_TODO}')\\n\\t\\ttotal_wrn\\\n          \\ += len(entry['warnings'])\\n\\n\\t\\tif entry['warnings'] and entry['status']\\\n          \\ == 'PASS':\\n\\t\\t\\tentry['status'] = 'WARN'\\n\\n\\t\\tresults[filename] =\\\n          \\ entry\\n\\n\\toverall  = 'PASS' if total_err == 0 else 'FAIL'\\n\\tpass_cnt\\\n          \\ = sum(1 for r in results.values() if r['status'] != 'FAIL')\\n\\n\\trows\\\n          \\ = [\\n\\t\\t'\u256f\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u256e',\\n\\t\\t'\u2551   CODE\\\n          \\ COMPILATION REPORT                \u2551',\\n\\t\\t'\u2559\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255b',\\n\\\n          \\t\\t'',\\n\\t\\tf'  Overall  : {overall}',\\n\\t\\tf'  Files    : {pass_cnt}/{len(results)}\\\n          \\ passed',\\n\\t\\tf'  Errors   : {total_err}',\\n\\t\\tf'  Warnings : {total_wrn}',\\n\\\n          \\t\\t'',\\n\\t\\t'\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500',\\n\\t]\\n\\tfor fname,\\\n          \\ r in results.items():\\n\\t\\ticon = '\u2713' if r['status'] == 'PASS' else ('\u26a0'\\\n          \\ if r['status'] == 'WARN' else '\u2717')\\n\\t\\trows.append(\\n\\t\\t\\tf\\\"  {icon}\\\n          \\ {fname:<22} [{r['status']:<4}]  \\\"\\n\\t\\t\\tf\\\"{r['lines']:>4} lines  \\\"\\\n          \\n\\t\\t\\tf\\\"parse {r['parse_ms']:>6.2f}ms\\\"\\n\\t\\t)\\n\\t\\tfor e in r['errors']:\\n\\\n          \\t\\t\\trows.append(f'      ERROR   : {e}')\\n\\t\\tfor w in r['warnings']:\\n\\\n          \\t\\t\\trows.append(f'      WARNING : {w}')\\n\\trows += ['\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500',\\\n          \\ '']\\n\\tif overall == 'PASS' and total_wrn == 0:\\n\\t\\trows.append('  All\\\n          \\ files parsed cleanly \u2014 no errors or warnings.')\\n\\telif overall == 'PASS':\\n\\\n          \\t\\trows.append(f'  Parsing passed. {total_wrn} warning(s) to review.')\\n\\\n          \\telse:\\n\\t\\tro