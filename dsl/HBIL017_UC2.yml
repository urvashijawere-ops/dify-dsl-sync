            the rules below.


            Japanese Keys

            支社コード

            お客さま番号

            ビル名

            作業月

            レポート種類

            製品・サービス分類


            DATE FORMATTING (MANDATORY)

            Work Month / 作業月 must be converted to YYYY/MM

            Example: 11/20/2026 → 2026/11


            AGGREGATION RULE (CRITICAL – MUST FOLLOW)

            When MULTIPLE records share the SAME Work Month:

            Output ONLY ONE object

            Merge values as follows:

            Report Type / レポート種類 → comma-separated (unique values only)

            Product/Service Category / 製品・サービス分類 → comma-separated (unique values
            only)

            All other fields (Branch Code / 支社コード, Customer Number / お客さま番号, Building
            Name / ビル名, Work Month / 作業月) must use the shared value

            When Work Month differs:

            Output separate objects, one per Work Month


            OUTPUT STRUCTURE (STRICT)

            Top-level JSON key:

            Japanese: "点検結果はこちらになります"

            Rules:

            Output ONLY valid JSON

            Use double quotes for all keys and values

            No extra text, no explanations, no Markdown

            Preserve exact key names


            EXAMPLES (REFERENCE ONLY – FORMAT MUST MATCH)

            OUTPUT_LANGUAGE === Japanese（同一作業月を統合）

