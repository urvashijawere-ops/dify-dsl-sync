    - data:
        code: "import json\n\ndef main(\n    response_text: str,\n    result: list,\n\
          \    user_input: str\n) -> dict:\n    \n    # Initialize default state\n\
          \    error_message_out = \"\"\n    is_validation_success = True\n    next_step\
          \ = 5 \n    filtered_result = []\n    equipment_list = []\n    \n    # Standard\
          \ Error Phrases\n    JAPANESE_EQUIPMENT_ERROR_PHRASE = \"選択された設備が無効です。\"\
          \n    ENGLISH_EQUIPMENT_ERROR_PHRASE = \"the selected equipment is invalid\"\
          \n    \n    clean_user_input = user_input.strip()\n    response_lower =\
          \ response_text.lower()\n\n    # 1. Japanese (Input text example)\n    JAPANESE_RATING_ERROR_PHRASE\
          \ = \"入力された評価が無効です。\" \n    # 2. English (From the System Prompt example:\
          \ \"Your rating input was invalid.\")\n    ENGLISH_RATING_ERROR_PHRASE =\
          \ \"your rating input was invalid\"\n    \n    # Convert response_text to\
          \ lowercase for a case-insensitive English check\n    response_lower = response_text.lower()\n\
          \    \n\n    # --- 1. EXTRACT EQUIPMENT NAMES & VALIDATE ---\n    for block\
          \ in result:\n        # Extract Equipment Name for the output list (used\
          \ for buttons)\n        # Assuming format: \"Equipment Name: [Name]\\n\"\
          \n        for line in block.split('\\n'):\n            if line.startswith(\"\
          Equipment Name:\"):\n                name = line.replace(\"Equipment Name:\"\
          , \"\").strip()\n                if name not in equipment_list and name\
          \ != \"N/A\":\n                    equipment_list.append(name)\n\n     \
          \   # Check if the specific Equipment Name matches the user_input\n    \
          \    if f\"Equipment Name: {clean_user_input}\" in block:\n            filtered_result.append(block)\n\
          \    \n    # --- 2. TRIGGER ERROR LOGIC ---\n    # --- 1. CRITICAL CHECK:\
          \ Rating Input Error (Highest Priority) ---\n    # Check for either the\
          \ Japanese or the English error phrase\n    if JAPANESE_RATING_ERROR_PHRASE\
          \ in response_text or ENGLISH_RATING_ERROR_PHRASE in response_lower:\n \
          \       error_message_out = \"RATING_ERROR_TRIGGER\"\n        is_validation_success\
          \ = False\n        next_step = 5  # Stay on Step 5 (Rating step)\n\n   \
          \ elif not filtered_result or (JAPANESE_EQUIPMENT_ERROR_PHRASE in response_text\
          \ or ENGLISH_EQUIPMENT_ERROR_PHRASE in response_lower):\n        error_message_out\
          \ = JAPANESE_EQUIPMENT_ERROR_PHRASE\n        is_validation_success = False\n\
          \        next_step = 4  # Stay on the selection step\n\n    # Final list\
          \ logic: if successful, only show the one; if failed, show all options\n\
          \    final_output_list = filtered_result if is_validation_success else result\n\
          \n    return {\n        \"error_message\": error_message_out, \n       \
          \ \"is_validation_success\": str(is_validation_success).lower(), \n    \
          \    \"next_step\": next_step,\n        \"filtered_result\": final_output_list,\n\
          \        \"equipment_list\": equipment_list  # This returns the array of\
          \ names for your buttons\n    }"
        code_language: python3
