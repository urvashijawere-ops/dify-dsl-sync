          \ = 1 \n\n        else:\n            output_message = get_language_text(\"\
          rating_error\", language)\n            # Retain previous values on failure\
          \ (which are already in updated_X_code)\n            state_update = {\n\
          \                \"branch_code\": branch_code_current,\n               \
          \ \"customer_number\": customer_number_current,\n                \"rating\"\
          : None,\n\t\t\t\t\"option\": None,\n                \"step\": 4\n      \
          \      }\n            is_final = 0\n\t\t\t\n    # --- Fallback Logic ---\n\
          \    else:\n        output_message = get_language_text(\"unknown_state_error\"\
          , language)\n        state_update = {\n            \"branch_code\": None,\n\
          \            \"customer_number\": None,\n            \"rating\": None,\n\
          \t\t\t\"option\": None,\n\t\t\t\"option\": None,\n            \"step\":\
          \ 1\n        }\n        # The 'updated' variables for final return should\
          \ reflect the reset\n        updated_branch_code = None\n        updated_customer_number\
          \ = None\n        is_final = 0\n\n    final_state_json = f\"STATE_UPDATE:\
          \ {json.dumps(state_update)}\"\n\n    # The local variables are now guaranteed\
          \ to have a value (None or a collected code)\n    return {\n        \"output_message\"\
          : output_message,\n        \"state_json\": final_state_json,\n        \"\
          is_final\": is_final,\n        \"branch_code_current\": updated_branch_code,\n\
          \        \"customer_number_current\": updated_customer_number\n    }\n\n\
