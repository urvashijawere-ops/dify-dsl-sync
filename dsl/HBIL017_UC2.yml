    - data:
        code: "import json\nimport re\n\n# --- Utility Functions (unchanged) ---\n\
          \ndef normalize_branch_code_input(text):\n    if not isinstance(text, str):\n\
          \        return \"\"\n    \n    # Reject input immediately if it contains\
          \ decimal points or commas (as per original prompt)\n    if re.search(r'[.,]',\
          \ text):\n        return \"\"\n        \n    # Normalize full-width to half-width\
          \ numbers/hyphen\n    text = text.translate(str.maketrans('０１２３４５６７８９－','0123456789-'))\n\
          \n    \n    # Remove all internal spaces (as added in your previous version)\n\
          \    text = text.replace(' ', '').replace('  ', '')\n    \n    # Final check:\
          \ After normalization, the branch code must ONLY contain digits (0-9).\n\
          \    # If any remaining hyphen or other character exists, reject the input.\n\
          \    if re.search(r'[^\\d]', text):\n        return \"\" \n        \n  \
          \  return text.strip()\n\ndef normalize_customer_num_input(text):\n    if\
          \ not isinstance(text, str):\n        return \"\"\n        \n    # Reject\
          \ input immediately if it contains decimal points or commas\n    if re.search(r'[.,]',\
          \ text):\n        return \"\"\n        \n    # Normalize full-width to half-width\
          \ numbers/hyphen\n    text = text.translate(str.maketrans('０１２３４５６７８９－','0123456789-'))\n\
          \n    text = text.replace(' ', '').replace('　', '').replace('-', '').strip()\n\
          \    \n    if re.search(r'[^\\d]', text):\n        # This catches Japanese\
          \ text, emojis, etc. -> INVALID\n        return \"\"\n    #After normalization\
          \ and cleaning, the customer number must ONLY contain digits.\n    if re.search(r'[^\\\
          d]', text):\n        return \"\"\n        \n    return text.strip()\n\n\n\
          \ndef get_language_text(key, lang):\n    \"\"\"Simple function to handle\
          \ language-specific messages.\"\"\"\n    MESSAGES = {\n        \"branch_prompt\"\
          : {\n            \"English\": \"Please enter your 2-digit branch code:\\\
          nExample: 11\",\n            \"Japanese\": \"支店コード（2桁の数字）を入力してください。\\n例:\
          \ 11\"\n        },\n        \"branch_error\": {\n            \"English\"\
          : \"Invalid branch code. Please enter a 2-digit number: \\nExample: 11\"\
          ,\n            \"Japanese\": \"支店コードが無効です。2桁の数字を入力してください。\\n例: 11\"\n  \
          \      },\n        \"customer_prompt\": {\n            \"English\": \"Please\
          \ enter your customer number:\",\n            \"Japanese\": \"顧客番号を入力してください。\"\
          \n        },\n        \"customer_error\": {\n            \"English\": \"\
          Invalid customer number. Please enter a 5-digit number:\\nExample: 10001\"\
          ,\n            \"Japanese\": \"顧客番号が無効です。5桁の数字を入力してください。\\n例: 10001\"\n\
          \        },\n        \"rating_prompt\": {\n            \"English\": \"Please\
          \ provide a final rating.\",\n            \"Japanese\": \"最後に、評価を入力してください。\"\
          \n        },\n        \"rating_error\": {\n            \"English\": \"Your\
          \ rating input was invalid. Please provide your rating as either **Resolved**\
          \ or **Not Resolved**\",\n            \"Japanese\": \"入力された評価が無効です。評価は「Resolved（解決済み）」または「Not\
          \ Resolved（未解決）」のいずれかで入力してください\"\n        },\n        \"rating_submit\"\
          : {\n            \"English\": \"Your rating is submitted successfully.\"\
          ,\n            \"Japanese\": \"評価は正常に送信されました。\"\n        },\n\t\t\n\t\t\"\
          option_error\": {\n            \"English\": \"Your option input was invalid.\
          \ Please provide choose or type correct option\",\n            \"Japanese\"\
          : \"入力された選択肢は無効です。正しい選択肢を選択するか、正しく入力してください。\"\n        },\n        \"option_submit\"\
          : {\n            \"English\": \"You have selected correct option.\",\n \
          \           \"Japanese\": \"正しい選択をしました。\"\n        },\n        \"unknown_state_error\"\
          : {\n            \"English\": \"Unknown process state. Please restart by\
          \ entering your 2-digit branch code:\\nExample: 11\",\n            \"Japanese\"\
          : \"処理状態が不明です。支店コード（2桁の数字）を入力して再開してください。\\n例: 11\"\n        }\n    }\n \
          \   lang_key = \"Japanese\" if lang.lower() in [\"japanese\", \"ja\"] else\
          \ \"English\"\n    return MESSAGES.get(key, {}).get(lang_key)\n\n# --------------------------------------------------------------------------\n\
          # --- CORE LOGIC FUNCTION ---\n# --------------------------------------------------------------------------\n\
          \ndef process_state(\n    current_step: int, \n    user_input: str, \n \
          \   language: str,\n    branch_code_current: str,\n    customer_number_current:\
          \ str\n):\n    \"\"\"\n    Handles state transition, validation, and output\
