    - data:
        code: "def main(customer_data: list[dict], customer_no: str, branch_code:\
          \ str) -> dict:\n    building_name = \"\"\n    branch_match_found = \"False\"\
          \n    customer_match_found = \"False\"\n    combination_found = \"False\"\
          \n\n    for data in customer_data:\n        field_data = {}\n        content\
          \ = data.get(\"content\", \"\")\n\n        for field in content.split(\"\
          ;\"):\n            if '=' in field:\n                key, value = field.split('=',\
          \ 1)\n            elif ':' in field:\n                key, value = field.split(':',\
          \ 1)\n            else:\n                continue\n            field_data[key.strip()]\
          \ = value.strip()\n        \n        current_branch = field_data.get(\"\
          JIGYOU_UNIQUE_CD\", \"\")\n        current_customer = field_data.get(\"\
          KANRI_NO\", \"\")\n\n        if current_branch == branch_code:\n       \
          \     branch_match_found = \"True\"\n        if current_customer == customer_no:\n\
          \            customer_match_found = \"True\"\n\n        if current_branch\
          \ == branch_code and current_customer == customer_no:\n            building_name\
          \ = field_data.get(\"BUIL_NAME\", \"\")\n            combination_found =\
          \ \"True\"\n            break\n\n    # Determine specific error message\
          \ using String comparisons\n    error_message = \"\"\n    \n    # Corrected\
          \ check: In Python, \"False\" (string) is Truthy, \n    # so we must explicitly\
          \ check for the value \"False\".\n    if combination_found == \"False\"\
          :\n        if branch_match_found == \"False\" and customer_match_found ==\
          \ \"False\":\n            error_message = \"BOTH_FIELDS_MISSING\"\n    \
          \    elif branch_match_found == \"False\":\n            error_message =\
          \ \"BRANCH_CODE_NOT_FOUND\"\n        elif customer_match_found == \"False\"\
          :\n            error_message = \"CUSTOMER_NO_NOT_FOUND\"\n        else:\n\
          \            error_message = \"COMBINATION_NOT_IN_LIST\"\n\n    return {\n\
          \        \"building_name\": building_name,\n        \"is_found\": combination_found,\
          \ \n        \"error_message\": error_message\n    }"
        code_language: python3
        desc: 'This node validates the provided customer_no and branch_code against
          the customer_data list, checks whether each value exists individually and
          as a matching pair, and retrieves the corresponding building_name when a
          valid combination is found.

          '
        outputs:
          building_name:
            children: null
            type: string
          error_message:
            children: null
            type: string
          is_found:
            children: null
            type: string
