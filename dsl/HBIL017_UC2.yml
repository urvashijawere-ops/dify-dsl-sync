    - data:
        code: "import json\nfrom datetime import datetime\n\n# --- Utility Functions\
          \ ---\n\ndef format_work_date(date_str):\n    if not date_str:\n       \
          \ return \"N/A\"\n    try:\n        dt = datetime.strptime(date_str, \"\
          %m/%d/%Y\")\n        return dt.strftime(\"%B %d, %Y (%A)\")\n    except:\n\
          \        return date_str\n\ndef format_time(dt_str):\n    if not dt_str\
          \ or dt_str in [\"N/A\", None, \"\"]:\n        return \"N/A\"\n    try:\n\
          \        if dt_str.endswith(\"+00\"):\n            dt_str = dt_str + \"\
          :00\"\n        dt_str = dt_str.replace(\"Z\", \"+00:00\")\n        dt =\
          \ datetime.fromisoformat(dt_str)\n        try:\n            return dt.strftime(\"\
          %-I:%M %p\")   # Linux/macOS\n        except ValueError:\n            return\
          \ dt.strftime(\"%#I:%M %p\")  # Windows\n    except:\n        return \"\
          N/A\"\n\n# --- MAIN FUNCTION (CUSTOM TOOL SIGNATURE) ---\n\ndef main(building_name,\
          \ gms_records, kanri_no, jigyou_cd):\n    try:\n        if not building_name:\n\
          \            building_name = \"\"\n        if not gms_records:\n       \
          \     gms_records = []\n\n        gms = [json.loads(g) for g in gms_records]\n\
          \n        kanri_no = str(kanri_no).strip()\n        jigyou_cd = str(jigyou_cd).strip()\n\
          \        \n        # Mapping for Model Code to Japanese Text\n        model_code_map\
          \ = {\n            \"1\": \"エレベーター\",\n            \"2\": \"エスカレーター\",\n\
          \            \"3\": \"空調設備\",\n            \"4\": \"ビル管理設備\"\n        }\n\
          \        \n        # Get current date for comparison\n        today = datetime.now().date()\n\
          \n        # --- Match GMS data (FILTERED BY FUTURE DATE) ---\n        matching_gms\
          \ = []\n        for g in gms:\n            try:\n                # Safely\
          \ handle customer number conversion\n                g_kanri = str(int(float(g.get(\"\
          okyakusamabango\", 0))))\n            except:\n                g_kanri =\
          \ \"\"\n                \n            is_id_match = g_kanri == kanri_no\n\
          \            is_branch_match = str(g.get(\"shishacode\", \"\")).strip()\
          \ == jigyou_cd\n            \n            if is_id_match and is_branch_match:\n\
          \                work_date_str = g.get(\"scheduledworkdate\")\n        \
          \        if work_date_str:\n                    try:\n                 \
          \       work_date = datetime.strptime(work_date_str, \"%m/%d/%Y\").date()\n\
          \                        if work_date >= today:\n                      \
          \      matching_gms.append(g)\n                    except:\n           \
          \             continue\n\n        combined_matches = []\n\n        # Combine\
          \ logic\n        if building_name and matching_gms:\n                for\
          \ gm in matching_gms:\n                    combined_matches.append({\n \
          \                       \"kanri_no\": kanri_no,\n                      \
          \  \"jigyou_cd\": jigyou_cd,\n                        \"BUIL_NAME\": building_name,\n\
          \                        # \"BUIL_ADD\": cust.get(\"BUIL_ADD\"),\n     \
          \                   \"scheduledworkdate\": gm.get(\"scheduledworkdate\"\
          ),\n                        \"begindatetime\": gm.get(\"begindatetime\"\
          ),\n                        \"enddatetime\": gm.get(\"enddatetime\"),\n\
          \                        \"goki\": gm.get(\"goki\"),\n                 \
          \       \"modelcode\": str(gm.get(\"modelcode\", \"\"))\n              \
          \      })\n        # elif building_name:\n        #         combined_matches.append({\n\
          \        #             \"kanri_no\": kanri_no,\n        #             \"\
          jigyou_cd\": jigyou_cd,\n        #             \"BUIL_NAME\": building_name,\n\
          \        #             # \"BUIL_ADD\": cust.get(\"BUIL_ADD\"),\n       \
          \ #             \"scheduledworkdate\": None,\n        #             \"begindatetime\"\
          : None,\n        #             \"enddatetime\": None,\n        #       \
          \      \"goki\": None,\n        #             \"modelcode\": None\n    \
          \    #         })\n        # elif matching_gms:\n        #     for gm in\
          \ matching_gms:\n        #         combined_matches.append({\n        #\
          \             \"kanri_no\": kanri_no,\n        #             \"jigyou_cd\"\
          : jigyou_cd,\n        #             \"BUIL_NAME\": None,\n        #    \
          \         # \"BUIL_ADD\": None,\n        #             \"scheduledworkdate\"\
          : gm.get(\"scheduledworkdate\"),\n        #             \"begindatetime\"\
          : gm.get(\"begindatetime\"),\n        #             \"enddatetime\": gm.get(\"\
          enddatetime\"),\n        #             \"goki\": gm.get(\"goki\"),\n   \
          \     #             \"modelcode\": str(gm.get(\"modelcode\", \"\"))\n  \
          \      #         })\n\n        # --- Convert to result strings and gather\
          \ Equipment List ---\n        result_strings = []\n        equipment_list\
          \ = []\n        \n        for item in combined_matches:\n            s_date\
          \ = item.get('scheduledworkdate')\n            start_time = format_time(item.get('begindatetime'))\n\
