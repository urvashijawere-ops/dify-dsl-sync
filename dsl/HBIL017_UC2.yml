    - data:
        code: "import json\nimport re\nfrom datetime import datetime, timedelta\n\n\
          def main(input_json):\n\n    # -----------------------------------\n   \
          \ # Parse Input\n    # -----------------------------------\n    try:\n \
          \       result = json.loads(input_json) if isinstance(input_json, str) else\
          \ input_json\n    except:\n        return {\"error\": \"Invalid JSON input\"\
          }\n\n    raw_date_str = str(result.get(\"inspection_date\", \"\") or \"\"\
          )\n    now = datetime.now()\n\n    # -----------------------------------\n\
          \    # Initialize Outputs\n    # -----------------------------------\n \
          \   scope = \"LATEST\"\n    formatted_date = \"\"\n    start_date = \"\"\
          \n    end_date = \"\"\n    discrete_dates = []\n\n    collected_years =\
          \ []\n    collected_months = []\n    collected_ranges = []\n\n# =====================================================\n\
          # 1. RELATIVE DATE DETECTION (Highest Priority)\n# =====================================================\n\
          \n    relative_year = None\n    relative_month_offset = None\n    \n   \
          \ # ------------------------\n    # Year Keywords\n    # ------------------------\n\
          \    \n    if \"今年\" in raw_date_str:\n        relative_year = now.year\n\
          \    \n    elif \"昨年\" in raw_date_str or \"去年\" in raw_date_str:\n    \
          \    relative_year = now.year - 1\n    \n    elif \"一昨年\" in raw_date_str:\n\
          \        relative_year = now.year - 2\n    \n    \n    # ------------------------\n\
          \    # X年前  (e.g., 3年前)\n    # ------------------------\n    \n    year_ago_match\
          \ = re.search(r\"(\\d+)年前\", raw_date_str)\n    if year_ago_match:\n   \
          \     years_ago = int(year_ago_match.group(1))\n        relative_year =\
          \ now.year - years_ago\n    \n    \n    # ------------------------\n   \
          \ # Month Keywords\n    # ------------------------\n    \n    if \"今月\"\
          \ in raw_date_str:\n        relative_month_offset = 0\n    \n    elif \"\
          先月\" in raw_date_str:\n        relative_month_offset = -1\n    \n    elif\
          \ \"先々月\" in raw_date_str:\n        relative_month_offset = -2\n    \n \
          \   elif \"再来月\" in raw_date_str:\n        relative_month_offset = 1\n \
          \   \n    \n    # ------------------------\n    # Xヶ月前 (e.g., 3ヶ月前)\n  \
          \  # ------------------------\n    \n    months_ago_match = re.search(r\"\
          (\\d+)ヶ月前\", raw_date_str)\n    if months_ago_match:\n        relative_month_offset\
          \ = -int(months_ago_match.group(1))\n    \n    \n    # =====================================================\n\
          \    # APPLY RELATIVE CALCULATION\n    # =====================================================\n\
          \    \n    # If month offset exists → calculate full year/month properly\n\
          \    if relative_month_offset is not None:\n    \n        base_date = now.replace(day=1)\n\
          \        calculated_date = base_date + timedelta(days=relative_month_offset\
          \ * 30)\n    \n        scope = \"MONTH\"\n        formatted_date = calculated_date.strftime(\"\
          %m/%Y\")\n    \n    # If relative year exists\n    elif relative_year is\
          \ not None:\n    \n        # Check if month also specified (例: 去年の11月)\n\
          \        month_match = re.search(r\"(\\d{1,2})月\", raw_date_str)\n    \n\
          \        if month_match:\n            month = int(month_match.group(1))\n\
          \            scope = \"MONTH\"\n            formatted_date = f\"{month:02d}/{relative_year}\"\
          \n        else:\n            scope = \"YEAR\"\n            formatted_date\
          \ = str(relative_year)\n    \n    \n    # If detected → return immediately\n\
          \    if scope != \"LATEST\":\n        result.update({\n            \"formatted_date\"\
          : formatted_date,\n            \"start_date\": \"\",\n            \"end_date\"\
          : \"\",\n            \"date_scope\": scope,\n            \"discrete_dates\"\
          : []\n        })\n    \n        return {\"result\": json.dumps(result, ensure_ascii=False)}\n\
          \n\n\n    # =====================================================\n    #\
          \ 2. YEAR RANGE\n    # e.g., 2022年から2024年まで\n    # =====================================================\n\
          \    for match in re.finditer(\n        r\"(\\d{4})年?\\s*(?:から|〜|～|-|ー|to)\\\
          s*(\\d{4})年?\",\n        raw_date_str\n    ):\n        collected_ranges.append((\"\
          YEAR_RANGE\",\n                                 int(match.group(1)),\n \
          \                                int(match.group(2))))\n\n    # =====================================================\n\
          \    # 3. MONTH RANGE\n    # e.g., 2024年1月から3月\n    # =====================================================\n\
          \    for match in re.finditer(\n        r\"(\\d{4})年\\s*(\\d{1,2})月\\s*(?:から|〜|～|-|ー|to)\\\
          s*(\\d{1,2})月\",\n        raw_date_str\n    ):\n        collected_ranges.append((\"\
          MONTH_RANGE\",\n                                 int(match.group(1)),\n\
          \                                 int(match.group(2)),\n               \
          \                  int(match.group(3))))\n\n    # =====================================================\n\
          \    # 4. YEAR + MONTH\n    # e.g., 2024年3月\n    # =====================================================\n\
          \    for match in re.finditer(\n        r\"(\\d{4})年\\s*(\\d{1,2})月\",\n\
          \        raw_date_str\n    ):\n        collected_months.append(\n      \
          \      (int(match.group(1)), int(match.group(2)))\n        )\n\n    # =====================================================\n\
          \    # 5. STANDALONE YEARS (NO \\b)\n    # =====================================================\n\
          \    for match in re.finditer(r\"(\\d{4})年?\", raw_date_str):\n        collected_years.append(int(match.group(1)))\n\
          \n    # Remove duplicate years caused by month captures\n    if collected_months:\n\
          \        years_from_months = [y for y, _ in collected_months]\n        collected_years\
          \ = [y for y in collected_years if y not in years_from_months]\n\n    #\
          \ Remove duplicate years\n    collected_years = list(set(collected_years))\n\
          \n    # =====================================================\n    # DECISION\
          \ LOGIC\n    # =====================================================\n\n\
          \    # ---- RANGE has priority over MULTI ----\n    if collected_ranges:\n\
          \n        r = collected_ranges[0]\n\n        if r[0] == \"YEAR_RANGE\":\n\
          \            scope = \"RANGE\"\n            start_date = str(r[1])\n   \
          \         end_date = str(r[2])\n\n        elif r[0] == \"MONTH_RANGE\":\n\
          \            scope = \"RANGE\"\n            year = r[1]\n            start_date\
          \ = f\"{r[2]:02d}/{year}\"\n            end_date = f\"{r[3]:02d}/{year}\"\
          \n\n    # ---- MULTIPLE MONTHS (Exact) ----\n    elif len(collected_months)\
          \ > 1:\n        scope = \"MULTI\"\n        discrete_dates = [\n        \
          \    f\"{m:02d}/{y}\" for y, m in collected_months\n        ]\n\n    # ----\
          \ SINGLE MONTH ----\n    elif len(collected_months) == 1:\n        scope\
          \ = \"MONTH\"\n        y, m = collected_months[0]\n        formatted_date\
          \ = f\"{m:02d}/{y}\"\n\n    # ---- MULTIPLE YEARS (Exact) ----\n    elif\
          \ len(collected_years) > 1:\n        scope = \"MULTI\"\n        discrete_dates\
          \ = sorted([str(y) for y in collected_years])\n\n    # ---- SINGLE YEAR\
          \ ----\n    elif len(collected_years) == 1:\n        scope = \"YEAR\"\n\
          \        formatted_date = str(collected_years[0])\n\n    # ---- NO DATE\
          \ → LATEST ----\n    else:\n        scope = \"LATEST\"\n\n    # =====================================================\n\
          \    # FINAL OUTPUT\n    # =====================================================\n\
          \n    result.update({\n        \"formatted_date\": formatted_date,\n   \
          \     \"start_date\": start_date,\n        \"end_date\": end_date,\n   \
          \     \"date_scope\": scope,\n        \"discrete_dates\": discrete_dates\n\
          \    })\n\n    return {\"result\": json.dumps(result, ensure_ascii=False)}"
        code_language: python3
