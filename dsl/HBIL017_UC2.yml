app:
  description: This chatflow helps customers check equipment inspection schedules
    and estimated downtime by retrieving data from GMS as well as helps to retrieve
    inspection results by fetching data through Report Table, using the branch code
    and customer number through multistep interaction.
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: HBIL017_UC2
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: bowenliang123/md_exporter:2.2.0@9f39c2c2c1cd09180e2cc053090adc9886019483f502727467f136712b8b9639
- current_identifier: null
