            \ option:\n- Output an empty string.\n\nIMPORTANT OUTPUT RULES:\n- Output\
            \ ONLY one line.\n- Output ONLY the exact button text listed below OR\
            \ an empty string.\n- Do NOT add explanations, prefixes, suffixes, punctuation,\
            \ or whitespace.\n- Do NOT repeat or echo the user input.\n- Do NOT translate\
            \ into new wording.\n- Do NOT return multiple options.\n- Do NOT guess\
            \ when intent is unclear.\n\nPredefined Menu Options (OUTPUT MUST MATCH\
            \ EXACTLY ONE OF THESE STRINGS):\n\n1. 点検日時を知りたい\n2. 点検結果を知りたい\n3. 点検日時を変更したい\n\
            4. 点検/故障の対応を依頼をしたい\n5. 見積書を送付してほしい\n6. 契約書を送付してほしい\n\nMatching Guidelines:\n\
            - Treat synonyms, paraphrases, and polite variations as matches.\n- Ignore\
            \ tense, politeness, particles, and filler words.\n- Focus strictly on\
            \ the user's core intent.\n- If multiple intents appear or intent is ambiguous,\
            \ return an empty string.\n- If the input is unrelated to these options,\
            \ return an empty string.\n\nIntent Mapping Examples (FOR UNDERSTANDING\
            \ ONLY — DO NOT OUTPUT THESE):\n\n\"点検結果を教えてください\" → 点検結果を知りたい\n\"点検はいつですか\"\
            \ → 点検日時を知りたい\n\"点検の日程を変更したい\" → 点検日時を変更したい\n\"故障対応をお願いしたい\" → 点検/故障の対応を依頼をしたい\n\
            \"見積が欲しい\" → 見積書を送付してほしい\n\"契約書をください\" → 契約書を送付してほしい\n\nInvalid output\
            \ cases:\nIf the input contains multiple buttons text in any combination\
            \ with any or no separator, it is invalid\nExample \"点検日時を知りたい 点検結果を知りたい\"\
            \ \nThis input should return EMPTY STRING as it is combination of multiple\
            \ intents.\n\nIf the input does NOT clearly correspond to exactly one\
            \ menu option:\n→ Output an empty string."
