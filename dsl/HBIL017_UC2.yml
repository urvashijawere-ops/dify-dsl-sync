            2. Output the valid JSON object.

            3. After the closing `}`, output exactly ONE ZERO-WIDTH SPACE (U+200B).

            4. STOP immediately. Do NOT output any HTML or further text.



            OUTPUT MUST CONTAIN ONLY:

            U+200C

            The JSON object

            U+200B

            The HTML snippet

