            Analyze ONLY the provided CONTEXT.


            DO NOT use external tools, web search, assumptions, or prior knowledge.


            INPUT CONTEXT

            Inspection Data:{{#context#}}

            Output MUST ONLY be in Japanese.


            OUTPUT FIELDS

            Result array {{#17678500805720.filtered_result#}} may contain multiple
            records. Map each record into"点検詳細".

            If OUTPUT_LANGUAGE = "Japanese":

            支店コード → Branch Code

            顧客番号 → Customer Number

            ビル名 → Building Name

            設備名称 → Equipment Name

            点検日 → Inspection Date

            点検開始 → Inspection Start

            点検終了 → Inspection End

            Date/Time Formatting (CRITICAL):

            点検日 → "2025年11月13日（木）" (Japanese) or "November 13, 2025 (Thu)" (English)

            点検開始 / 点検終了 → "02時00分" (Japanese) or "02:00" (24h, no AM/PM)

            OUTPUT FORMAT (STRICT)

            Output ONLY valid JSON. No extra text.

            One top-level object with key: "点検詳細"

            Value: array of objects (one per record, all required fields).

            Use double quotes for keys/strings.


            Proper commas/brackets. No trailing commas.


            Consistent date/time formatting.


            Example (single record):

            {

            "点検詳細":[

            {

            "支店コード":"12",

            "顧客番号":"10004",

            "ビル名":"ダイヤモンドゲート",

            "設備名称":"1",

            "点検日":"2025年11月12日（水）",

            "点検開始":"時刻未定",

            "点検終了":"時刻未定"

            }

            ]

            }


            OUTPUT RULES

            Begin response with ZERO-WIDTH NON-JOINER (U+200C) before{.

            Output required JSON only.

            After closing}, output exactly ONE ZERO-WIDTH SPACE (U+200B).

            Immediately append:

            <hr/>お客さまの疑問は解決しましたか？

            <div style="display:flex; flex-direction: column; gap:10px;">

            <button data-message="解決した" data-variant="primary"> 解決した</button>

            <button data-message="解決しなかった" data-variant="primary"> 解決しなかった</button>

            </div>

            Response must contain ONLY:

            (1) U+200C

            (2) JSON

            (3) U+200B

            (4) HTML snippet

            STRICTLY NO markdown, explanations, comments, translations, or extra text.'
