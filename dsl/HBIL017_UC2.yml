          \  updated_customer_number = None\n            is_final = 0\n    \n\n  \
          \  # --- Step 2 (Customer No) ---\n    elif current_step == 2:\n       \
          \ new_customer_number = normalize_customer_num_input(user_input)\n     \
          \   \n        if re.fullmatch(r'\\d{5}', new_customer_number):\n       \
          \     output_message = get_language_text(\"rating_prompt\", language)\n\n\
          \            # Success: Store new customer_number, keep branch_code, move\
          \ to step 3\n            state_update = {\n                \"branch_code\"\
          : branch_code_current,\n                \"customer_number\": new_customer_number,\n\
          \                \"rating\": None,\n\t\t\t\t\"option\": None,\n        \
          \        \"step\": 3\n            }\n            # Update the local variable\
          \ for final return\n            updated_customer_number = new_customer_number\n\
          \            is_final = 0\n\n        else:\n            output_message =\
          \ get_language_text(\"customer_error\", language)\n\n            # Failure:\
          \ Retain previous branch_code, clear customer_number, stay on step 2\n \
          \           state_update = {\n                \"branch_code\": branch_code_current,\n\
          \                \"customer_number\": None,\n                \"rating\"\
          : None,\n\t\t\t\t\"option\": None,\n                \"step\": 2\n      \
          \      }\n            # Update the local variable for final return\n   \
          \         updated_customer_number = None\n            is_final = 0\n\t\n\
          \t# --- Step 3 (Option details) ---\n    elif current_step == 3:\n     \
          \   option_text = user_input.lower().strip()\n        \n        # if option_text\
          \ in [\"点検日時を知りたい\", \"点検結果を知りたい\", \"点検日時を変更したい\", \"点検/故障の対応を依頼をしたい\"\
          , \"見積書を送付してほしい\", \"契約書を送付してほしい\"]:\n        # option_value = user_input.strip()\n\
          \        \n            \n        output_message = output_message = get_language_text(\"\
          option_submit\", language)\n            \n        state_update = {\n   \
          \             \"branch_code\": branch_code_current,\n                \"\
          customer_number\": customer_number_current,\n                \"rating\"\
          : None,\n\t\t\t\t# \"option\": option_value,\n                \"option\"\
          :option_text,\n                \"step\": 4\n            }\n            #\
          \ The 'updated' variables for final return should reflect the reset\n  \
          \      updated_branch_code = None\n        updated_customer_number = None\n\
          \        is_final = 0 \n\n\n        # else:\n        #     output_message\
          \ = get_language_text(\"option_error\", language)\n        #     # Retain\
          \ previous values on failure (which are already in updated_X_code)\n   \
          \     #     state_update = {\n        #         \"branch_code\": branch_code_current,\n\
          \        #         \"customer_number\": customer_number_current,\n     \
          \   #         \"rating\": None,\n\t\t# \t\t\"option\": None,\n        #\
          \         \"step\": 3\n        #     }\n        #     is_final = 0\n   \
          \ # --- Step 4 (Equipment) ---\n    elif current_step == 4:\n        input_lower\
          \ = user_input.lower().strip()\n        \n        if input_lower:\n    \
          \        equipment_value = user_input.strip()\n            \n          \
          \  output_message = \"\"\n            \n            # Reset state variables\
          \ to null\n            state_update = {\n                \"branch_code\"\
          : branch_code_current,\n                \"customer_number\": customer_number_current,\n\
          \                \"rating\": None,\n\t\t\t\t\"option\": None,\n        \
          \        \"step\": 5\n            }\n            # The 'updated' variables\
          \ for final return should reflect the reset\n            updated_branch_code\
          \ = None\n            updated_customer_number = None\n            is_final\
          \ = 0 \n\n        else:\n            output_message = get_language_text(\"\
          rating_error\", language)\n            # Retain previous values on failure\
          \ (which are already in updated_X_code)\n            state_update = {\n\
          \                \"branch_code\": branch_code_current,\n               \
          \ \"customer_number\": customer_number_current,\n                \"rating\"\
          : None,\n\t\t\t\t\"option\": None,\n                \"step\": 4\n      \
          \      }\n            is_final = 0\n\t\n\t# --- Step 5 (Rating) ---\n  \
          \  elif current_step == 5:\n        input_lower = user_input.lower().strip()\n\
