            }

            ]

            }


            STRICT PROHIBITIONS

            Do NOT output Markdown

            Do NOT add explanations

            Do NOT invent or translate keys

            Do NOT output duplicate values in comma-separated fields

            Do NOT output multiple objects for the same Work Month


            **FINAL OUTPUT ENVELOPE RULE (MANDATORY)**

            1. The response MUST begin with a ZERO-WIDTH NON-JOINER (U+200C) before
