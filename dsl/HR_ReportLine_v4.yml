          \ Logic\n    if len(id_list) > 1:\n        return {\n            \"result\"\
          : \"Please enter one Transferee Id\",\n            \"is_valid\": \"false\"\
          \n        }\n    \n    if len(id_list) == 0:\n        return {\n       \
          \     \"result\": \"Please enter a Transferee Id\",\n            \"is_valid\"\
          : \"false\"\n        }\n\n    # 4. Final Clean Output\n    # This returns\
          \ just the first (and only) ID found\n    return {\n        \"result\":\
          \ id_list[0],\n        \"is_valid\": \"true\"\n    }"
