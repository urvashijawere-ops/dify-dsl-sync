    - data:
        code: "import re\n\ndef main(user_input: str, transferee_ids: list, language:\
          \ str):\n    # Define response templates\n    messages = {\n        'english':\
          \ {\n            'undefined': \"Please enter a transferee ID\",\n      \
          \      'single_input': \"please enter each transferee at once\",\n     \
          \       'invalid_id': \"user id is invalid, please enter valid 8 digit ldap\"\
          ,\n            'exists': \"user already existed\",\n            'success':\
          \ \"Success\"\n        },\n        'japanese': {\n            'undefined':\
          \ \"譲受人IDを入力してください\",\n            'single_input': \"各譲受人を一度に入力してください\"\
          ,\n            'invalid_id': \"ユーザーIDが無効です。有効な8桁のLDAPを入力してください\",\n    \
          \        'exists': \"ユーザーは既に存在します\",\n            'success': \"成功\"\n  \
          \      }\n    }\n\n    # Normalize language input\n    lang = language.lower()\
          \ if language.lower() in messages else 'english'\n    msg = messages[lang]\n\
          \n    # --- NEW CHECK STARTS HERE ---\n    # Check if the input contains\
          \ \"undefined\" before doing regex work\n    if 'undefined' in user_input.lower():\n\
          \        return {\n            \"id\": -1,\n            \"result\": msg['undefined']\n\
          \        }\n    # --- NEW CHECK ENDS HERE ---\n\n    extracted = re.findall(r'\\\
          d+', user_input)\n    \n    if len(extracted) != 1:\n        return {\n\
          \            \"result\": msg['single_input'], \n            \"id\": -1\n\
          \        }\n\n    user_id = extracted[0]\n    \n    # Note: Logic check\
          \ for 7 vs 8 digits\n    if len(user_id) != 7:\n        return {\n     \
          \       \"result\": msg['invalid_id'], \n            \"id\": -1\n      \
          \  }\n\n    user_id_int = int(user_id)\n    if user_id_int in transferee_ids:\n\
          \        return {\n            \"result\": msg['exists'],\n            \"\
          id\": -1\n        }\n\n    return {\n        \"result\": msg['success'],\n\
          \        \"id\": user_id_int\n    }"
        code_language: python3
        desc: ''
        outputs:
          id:
            children: null
            type: number
          result:
            children: null
            type: string
