        en: 'Please choose the session from where you want to start with.


          1. <button type="button" data-message="1">Session 1</button>&emsp;&emsp;2.
          <button type="button" data-message="2">Session 2</button>'
        ja: '開始するセッションを選択してください。


          1. <button type="button" data-message="1">セッション 1</button>&emsp;&emsp;2.
          <button type="button" data-message="2">セッション 2</button>'
      currency_detected:
        en: 'Multiple currencies were detected in the BU documents.

          Please confirm if all figures should be converted from **USD** to **JPY**


          ***


          1. <button type="button" data-message="1">Yes</button>&emsp;&emsp;2. <button
          type="button" data-message="2">No</button>'
        ja: 'BU資料で複数の通貨が検出されました。

          すべての数値を **USD**から **JPY** に換算しますか？


          ***


          1. <button type="button" data-message="1">はい</button>&emsp;&emsp;2. <button
          type="button" data-message="2">いいえ</button>'
      enter_currency_rate:
        en: 'Please enter the **currency conversion rate** you would like to use to
          convert all figures from **USD to JPY** across the entire document.

          **Example:**

          If **1 USD = 150 JPY**, please enter **150**.'
        ja: 'USD から JPY に換算するために使用する **為替レート** を入力してください。

          **例:**

          **1 USD = 150 JPY** の場合は、**150** と入力してください。'
