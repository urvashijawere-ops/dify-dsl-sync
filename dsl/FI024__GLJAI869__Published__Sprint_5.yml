    - data:
        code: "def main(generate_summary: str, generate_questions: str, generate_number_table:\
          \ str, generate_summary_modification: str, prompt_text: dict, query: str,\
          \ selected_language: str) -> dict:\n    # 1. Normalize Inputs (Treating\
          \ \"1\" as True/Active)\n    s = str(generate_summary) if generate_summary\
          \ else \"0\"\n    t = str(generate_number_table) if generate_number_table\
          \ else \"0\"\n    q = str(generate_questions) if generate_questions else\
          \ \"0\"\n    m = str(generate_summary_modification) if generate_summary_modification\
          \ else \"0\"\n    \n    lang = str(selected_language) if selected_language\
          \ else \"en\"\n    user_input = str(query).strip()\n\n    # 2. Update States\
          \ based on User Action\n    if user_input == \"1\":\n        s = \"1\"\n\
          \        m = \"1\"  # User chose summary; enter Modification Loop (m=1)\n\
          \    elif user_input == \"2\":\n        t = \"1\"\n        m = \"2\"  #\
          \ Switching tasks exits the summary modification loop\n    elif user_input\
          \ == \"3\":\n        q = \"1\"\n        m = \"2\"  # Switching tasks exits\
          \ the summary modification loop\n    elif user_input == \"end_of_summary\"\
          :\n        m = \"2\"  # Finalize summary; hide the 'eos' options\n    elif\
          \ m == \"1\":\n        # If any other text is typed while m=1, stay in summary\
          \ loop\n        pass \n\n    # 3. Identify Remaining Options (Options where\
          \ variable is \"0\")\n    # This determines the numerical suffix (1, 2,\
          \ 3)\n    remaining = []\n    if s == \"0\": remaining.append(\"1\")\n \
          \   if t == \"0\": remaining.append(\"2\")\n    if q == \"0\": remaining.append(\"\
          3\")\n    \n    num_suffix = \"_\".join(remaining)\n\n    # 4. Apply Truth\
          \ Table Logic for the Prompt Key\n    prompt_key_base = \"select_report_type\"\
          \n    \n    if s == \"1\" and t == \"1\" and q == \"1\" and m == \"2\":\n\
          \        # All tasks done and summary finalized\n        prompt_key = f\"\
          {prompt_key_base}_finish\"\n    elif m == \"1\":\n        # Use the \"eos\"\
          \ mapping from your table\n        if not num_suffix:\n            prompt_key\
          \ = f\"{prompt_key_base}_eos\"\n        else:\n            prompt_key =\
          \ f\"{prompt_key_base}_eos_{num_suffix}\"\n    else:\n        # Standard\
          \ mapping for remaining buttons\n        if not num_suffix:\n          \
          \  prompt_key = prompt_key_base # Default to full menu if error\n      \
          \  elif num_suffix == \"1_2_3\":\n            prompt_key = prompt_key_base\n\
          \        else:\n            prompt_key = f\"{prompt_key_base}_{num_suffix}\"\
          \n\n    # 5. Fetch Final String\n    prompt_entry = prompt_text.get(prompt_key,\
          \ prompt_text.get(\"select_report_type\", {}))\n    final_result = prompt_entry.get(lang,\
          \ prompt_entry.get(\"en\", \"\"))\n\n    return {\n        \"result\": str(final_result),\n\
          \        \"generate_summary\": s,\n        \"generate_number_table\": t,\n\
          \        \"generate_questions\": q,\n        \"generate_summary_modification\"\
          : m\n    }"
