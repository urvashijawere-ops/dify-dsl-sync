            予算 / Budget

            PL変動要因 1-9 (Include Category name and the "Contents/内容" text)

            変動計 / Total Variations

            Margin (%) / 利益率 (Ratio for the Actual row - DO NOT MISS THIS)

            実績・見通し / Actual・Forecast

            Comparison Rows: Capture every row following "Actual・Forecast" (e.g.,
            vs. Previous Forecasts). Force these into the table columns so they align
            perfectly with the Revenues/EBIT columns above them.


            Column Structure: [Row Type] | [Category/Contents] | [Q1 Metrics...] |
            [Q2 Metrics...] | [H1 Metrics...] | [Q3 Metrics...] | [Q4 Metrics...]
            | [H2 Metrics...] | [Full Year Metrics]


