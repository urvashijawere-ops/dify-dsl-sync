            Markdown table.


            Data Source {{#1772448266175.text#}}

            Locate the data belonging to the sheet named "今回数表" (Current Number Table).


            Extraction Instructions

            Extract the performance forecast table for FY25. Focus only on the specific
            forecast and comparison columns.


            1. Column Structure (Single Table)

            The table must contain 13 columns in total (Item + 12 specific metrics).
            Use the following headers exactly:

            25/3Q: 3Q見通し, 3Q前月比, 3Q予算比, 3Q前年比

            25/下期: 下期見通し, 下期前月比, 下期予算比, 下期前年比

            25年度: 年度見通し, 年度前月比, 年度予算比, 年度前年比

            (Note: "前月比" refers to the "10月(見)比" column shown in the source image.)


            2. Row Items & Formatting

            Extract and display the following rows in this exact order:

            [Percentage Rows] Format: Round to max 2 decimal places and include the
            "%" symbol (e.g., 12.34%):

            <売上成長率>

            売上収益 (Note: This is the numeric row immediately following growth rate)

            <利益率>

            営業利益 (Note: Numeric row)

            <Adj. EBITA率>

            Adj. EBITA(25年度～) (Note: Numeric row)

            EBIT

            営業CF

            投資CF

            FCF

            <コアFCFマージン率>

            コアFCF

            [Specific Rounding Rules]

            Percentage Rows (<...率>): Format these as percentages (e.g., 12.4%) rounded
            to a maximum of 1 decimal places.

            Numeric Rows (Revenue, Profit, CF, etc.): Format as whole numbers only.
            Round to the nearest integer and remove all decimal places (e.g., 1,234).


            Output Format

            Strict Requirement: Return the data as ONE single Markdown Table. Do not
            split it into multiple tables.

            Header formatting: Use a single-row header: | Item | 3Q見通し | 3Q前月比 | 3Q予算比
            | 3Q前年比 | 下期見通し | 下期前月比 | 下期予算比 | 下期前年比 | 年度見通し | 年度前月比 | 年度予算比 | 年度前年比
            |

            If a value is "Err:502", display it exactly as "Err:502".

            Ensure the percentage rows follow the "max 2 decimal places" rule strictly.


            Context

