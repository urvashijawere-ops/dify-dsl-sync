            Critical Rule for Row Extraction:

            Capture the "Hidden" Row: You must include the row located immediately
            below the headers and above the "Budget" row, also above the "Actual・Forecast"
            row . Even though it has no text label in the first column, it contains
            decimal values (e.g., 0.044, 0.115).

            Label this row as: "Margin (%) / 利益率".


            Data Conversion: Convert these decimals to percentages (e.g., 0.0444 →
            4.4%).


            1. PL 見通し / PL Forecast (Unit: M JPY)

            Requirement: Provide ONE single table containing all periods (Q1, Q2,
            H1, Q3, Q4, H2, Full Year) as columns.

            Rows (In order):

